<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Universal AI Chat</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    html, body {
      height: 100%;
      background: #f8fafc;
    }
    .dark body {
      background: #0f172a;
    }
    .typing::after {
      content: "▍";
      animation: blink 1s infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body class="min-h-screen flex bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100">

<!-- Loader -->
<div id="loading" class="fixed inset-0 flex items-center justify-center bg-white dark:bg-slate-900 z-50 text-xl font-semibold">
  Loading App...
</div>

<!-- Sidebar -->
<div id="sidebar" class="fixed md:static inset-y-0 left-0 w-64 bg-white dark:bg-slate-800 border-r border-gray-200 dark:border-slate-700 transform -translate-x-full md:translate-x-0 transition-transform z-40 flex flex-col">
  <div class="p-3 flex items-center justify-between border-b border-gray-200 dark:border-slate-700">
    <span class="font-bold">Chats</span>
    <button id="newChatBtn" class="text-sm px-2 py-1 rounded bg-blue-500 text-white">+ New</button>
  </div>
  <div id="chatList" class="flex-1 overflow-y-auto"></div>
  <div class="p-3 border-t border-gray-200 dark:border-slate-700 space-y-2">
    <button id="settingsBtn" class="w-full text-sm px-2 py-1 rounded bg-gray-200 dark:bg-slate-700">Settings</button>
    <button id="darkToggle" class="w-full text-sm px-2 py-1 rounded bg-gray-200 dark:bg-slate-700">Toggle Dark</button>
  </div>
</div>

<!-- Main -->
<div class="flex-1 flex flex-col min-h-screen">
  <!-- Header -->
  <div class="flex items-center gap-2 p-2 border-b border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800">
    <button id="sidebarToggle" class="md:hidden px-2 py-1 rounded bg-gray-200 dark:bg-slate-700">☰</button>
    <div id="chatTitle" class="font-semibold truncate">New Chat</div>
  </div>

  <!-- Messages -->
  <div id="messages" class="flex-1 overflow-y-auto p-3 space-y-3"></div>

  <!-- Input Bar -->
  <div class="sticky bottom-0 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 p-2">
    <div class="flex gap-2">
      <textarea id="userInput" rows="1" placeholder="Message AI..."
        class="flex-1 resize-none rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-3 py-2 text-sm focus:outline-none"></textarea>
      <button id="sendBtn" class="px-4 py-2 rounded-lg bg-blue-500 text-white">Send</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="fixed inset-0 hidden items-center justify-center bg-black/40 z-50">
  <div class="bg-white dark:bg-slate-800 rounded-lg p-4 w-full max-w-md space-y-3">
    <h2 class="font-bold text-lg">Settings</h2>

    <div>
      <label class="text-sm">OpenRouter API Key</label>
      <input id="apiKeyInput" type="password" class="w-full mt-1 px-2 py-1 rounded border dark:bg-slate-700" />
    </div>

    <div>
      <label class="text-sm">Model</label>
      <input id="modelInput" class="w-full mt-1 px-2 py-1 rounded border dark:bg-slate-700" />
    </div>

    <div>
      <label class="text-sm">System Prompt</label>
      <textarea id="systemPromptInput" rows="3" class="w-full mt-1 px-2 py-1 rounded border dark:bg-slate-700"></textarea>
    </div>

    <div class="flex justify-end gap-2">
      <button id="closeSettings" class="px-3 py-1 rounded bg-gray-200 dark:bg-slate-700">Close</button>
      <button id="saveSettings" class="px-3 py-1 rounded bg-blue-500 text-white">Save</button>
    </div>
  </div>
</div>

<script>
(() => {
  const el = id => document.getElementById(id);

  const state = {
    chats: JSON.parse(localStorage.getItem("chats") || "[]"),
    activeChatId: localStorage.getItem("activeChatId") || null,
    apiKey: localStorage.getItem("apiKey") || "",
    model: localStorage.getItem("model") || "deepseek/deepseek-r1:free",
    dark: localStorage.getItem("dark") === "true"
  };

  function saveChats() {
    localStorage.setItem("chats", JSON.stringify(state.chats));
    localStorage.setItem("activeChatId", state.activeChatId || "");
  }

  function applyDark() {
    document.documentElement.classList.toggle("dark", state.dark);
    localStorage.setItem("dark", state.dark);
  }

  function createChat() {
    const id = Date.now().toString();
    const chat = { id, title: "New Chat", messages: [], systemPrompt: "" };
    state.chats.unshift(chat);
    state.activeChatId = id;
    saveChats();
    renderChats();
    renderMessages();
  }

  function getActiveChat() {
    return state.chats.find(c => c.id === state.activeChatId);
  }

  function renderChats() {
    const list = el("chatList");
    list.innerHTML = "";
    state.chats.forEach(chat => {
      const div = document.createElement("div");
      div.className = "flex items-center justify-between px-2 py-1 text-sm cursor-pointer hover:bg-gray-100 dark:hover:bg-slate-700";
      div.innerHTML = `
        <span class="truncate">${chat.title}</span>
        <div class="flex gap-1">
          <button class="rename px-1">✏️</button>
          <button class="delete px-1">🗑️</button>
        </div>
      `;
      div.onclick = e => {
        if (e.target.classList.contains("rename")) {
          const name = prompt("Rename chat:", chat.title);
          if (name) chat.title = name;
          saveChats();
          renderChats();
          return;
        }
        if (e.target.classList.contains("delete")) {
          if (confirm("Delete chat?")) {
            state.chats = state.chats.filter(c => c.id !== chat.id);
            if (state.activeChatId === chat.id) state.activeChatId = state.chats[0]?.id || null;
            saveChats();
            renderChats();
            renderMessages();
          }
          return;
        }
        state.activeChatId = chat.id;
        saveChats();
        renderMessages();
      };
      list.appendChild(div);
    });
  }

  function renderMessages() {
    const chat = getActiveChat();
    const container = el("messages");
    container.innerHTML = "";
    el("chatTitle").textContent = chat?.title || "New Chat";

    if (!chat) return;

    chat.messages.forEach(msg => {
      const div = document.createElement("div");
      div.className = msg.role === "user" ? "flex justify-end" : "flex justify-start";
      const bubble = document.createElement("div");
      bubble.className = "max-w-[80%] px-3 py-2 rounded-lg text-sm " +
        (msg.role === "user"
          ? "bg-blue-500 text-white"
          : "bg-gray-200 dark:bg-slate-700");
      bubble.innerHTML = marked.parse(msg.content || "");
      div.appendChild(bubble);
      container.appendChild(div);
    });

    container.scrollTop = container.scrollHeight;
  }

  async function sendMessage() {
    const input = el("userInput");
    const text = input.value.trim();
    if (!text) return;

    let chat = getActiveChat();
    if (!chat) createChat(), chat = getActiveChat();

    chat.messages.push({ role: "user", content: text });
    if (chat.title === "New Chat") chat.title = text.slice(0, 30);
    input.value = "";
    renderChats();
    renderMessages();
    saveChats();

    await streamAI(chat);
  }

  async function streamAI(chat) {
    const apiKey = state.apiKey;
    if (!apiKey) {
      alert("Set API key in settings.");
      return;
    }

    const container = el("messages");
    const wrap = document.createElement("div");
    wrap.className = "flex justify-start";
    const bubble = document.createElement("div");
    bubble.className = "max-w-[80%] px-3 py-2 rounded-lg text-sm bg-gray-200 dark:bg-slate-700 typing";
    wrap.appendChild(bubble);
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;

    let content = "";

    try {
      const messages = [];
      if (chat.systemPrompt) messages.push({ role: "system", content: chat.systemPrompt });
      messages.push(...chat.messages);

      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + apiKey,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: state.model,
          messages,
          stream: true
        })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        const lines = chunk.split("\n").filter(l => l.trim());

        for (const line of lines) {
          if (!line.startsWith("data:")) continue;
          const data = line.replace("data:", "").trim();
          if (data === "[DONE]") break;

          try {
            const json = JSON.parse(data);
            const token = json.choices?.[0]?.delta?.content || "";
            if (token) {
              content += token;
              bubble.innerHTML = marked.parse(content);
              container.scrollTop = container.scrollHeight;
            }
          } catch {}
        }
      }

      bubble.classList.remove("typing");
      chat.messages.push({ role: "assistant", content });
      saveChats();
    } catch (e) {
      bubble.classList.remove("typing");
      bubble.textContent = "⚠️ Error connecting to API.";
    }
  }

  // UI Events
  el("sendBtn").onclick = sendMessage;
  el("userInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  el("newChatBtn").onclick = createChat;

  el("sidebarToggle").onclick = () => {
    el("sidebar").classList.toggle("-translate-x-full");
  };

  el("settingsBtn").onclick = () => {
    el("apiKeyInput").value = state.apiKey;
    el("modelInput").value = state.model;
    const chat = getActiveChat();
    el("systemPromptInput").value = chat?.systemPrompt || "";
    el("settingsModal").classList.remove("hidden");
    el("settingsModal").classList.add("flex");
  };

  el("closeSettings").onclick = () => {
    el("settingsModal").classList.add("hidden");
    el("settingsModal").classList.remove("flex");
  };

  el("saveSettings").onclick = () => {
    state.apiKey = el("apiKeyInput").value.trim();
    state.model = el("modelInput").value.trim() || state.model;
    const chat = getActiveChat();
    if (chat) chat.systemPrompt = el("systemPromptInput").value;
    localStorage.setItem("apiKey", state.apiKey);
    localStorage.setItem("model", state.model);
    saveChats();
    el("closeSettings").click();
  };

  el("darkToggle").onclick = () => {
    state.dark = !state.dark;
    applyDark();
  };

  function init() {
    applyDark();
    if (!state.chats.length) createChat();
    renderChats();
    renderMessages();
    el("loading").style.display = "none";
  }

  init();
})();
</script>

</body>
</html>
