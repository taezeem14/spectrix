function isChatNearBottom(threshold = AUTO_SCROLL_NEAR_BOTTOM_PX) {
  if (!chat) return true;
  return chat.scrollHeight - chat.scrollTop - chat.clientHeight < threshold;
}

function scrollChatToLatest({ smooth = false, force = false } = {}) {
  if (!chat) return;
  if (!force && !autoScrollToLatest) return;

  const now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
  if (smooth && !force && now - lastAutoScrollTs < 120) return;
  lastAutoScrollTs = now;

  const targetTop = chat.scrollHeight - chat.clientHeight;
  if (Math.abs(targetTop - chat.scrollTop) < 2) return;

  if (smooth) {
    chat.scrollTo({ top: targetTop, behavior: "smooth" });
    return;
  }

  if (force) {
    chat.scrollTop = targetTop;
    return;
  }

  if (pendingChatAutoScrollRaf) return;
  pendingChatAutoScrollRaf = requestAnimationFrame(() => {
    pendingChatAutoScrollRaf = 0;
    const latestTop = chat.scrollHeight - chat.clientHeight;
    if (latestTop - chat.scrollTop > 1) {
      chat.scrollTop = latestTop;
    }
  });
}

function scrollToBottom() {
  autoScrollToLatest = true;
  scrollChatToLatest({ smooth: !isGenerating, force: true });
}

function setStopButtonVisible(visible) {
  if (!stopBtn) return;
  stopBtn.classList.toggle('hidden', !visible);
}

function stopGeneration() {
  if (!isGenerating) return;
  if (activeStreamAbortController) {
    activeStreamAbortController.abort('user-stop');
    showStatus('Stopping generation...');
  }
}

async function fetchBotAnswerViaJson(payload) {
  const res = await fetchChatApiWithFallback({
    method: "POST",
    headers: { "Content-Type": "application/json" },
    timeoutMs: 90000,
    body: JSON.stringify(payload)
  }, 1);

  const text = await res.text();
  let data;
  try {
    data = JSON.parse(text);
  } catch {
    throw new Error("Server returned invalid response");
  }

  const answer = data?.choices?.[0]?.message?.content || "";
  if (!answer.trim()) {
    throw new Error("Empty response from model");
  }
  return answer;
}

function removePendingStreamBubble() {
  const pending = chat.querySelector('.msg.bot:last-child');
  if (!pending) return;
  if (pending.querySelector('.timestamp')) return;
  pending.remove();
}

function time() {
  const d = new Date();
  return d.getHours().toString().padStart(2, '0') + ":" +
         d.getMinutes().toString().padStart(2, '0');
}

function normalizeCodeFenceMarkup(text) {
  let normalized = String(text || '');

  // Convert triple-quote style fences to markdown fences.
  normalized = normalized
    .replace(/^[ \t]*[“”"']{0,2}"""\s*([a-zA-Z0-9_#+.-]+)\s+([^\n]+)$/gm, '```$1\n$2')
    .replace(/^[ \t]*[“”"']{0,2}"""\s*([a-zA-Z0-9_#+.-]+)?\s*[“”"']{0,2}[ \t]*$/gm, (match, lang) => `\`\`\`${lang || ''}`)
    .replace(/^[ \t]*[“”"']{0,2}'''\s*([a-zA-Z0-9_#+.-]+)\s+([^\n]+)$/gm, '```$1\n$2')
    .replace(/^[ \t]*[“”"']{0,2}'''\s*([a-zA-Z0-9_#+.-]+)?\s*[“”"']{0,2}[ \t]*$/gm, (match, lang) => `\`\`\`${lang || ''}`);

  // Remove stray quotes directly attached to markdown fences.
  normalized = normalized
    .replace(/(^|\n)[ \t]*[“”"']+\s*```/g, '$1```')
    .replace(/```[ \t]*[“”"']+(?=\s*(\n|$))/g, '```')
    .replace(/^[ \t]*[“”"']+\s*```([a-zA-Z0-9_#+.-]*)\s*[“”"']+[ \t]*$/gm, '```$1');

  return normalized;
}

function normalizeFenceBoundaryLines(text) {
  const lines = String(text || '').replace(/\r\n/g, '\n').split('\n');
  const output = [];
  let inFence = false;

  for (const line of lines) {
    const trimmedStart = line.trimStart();
    const indent = line.slice(0, line.length - trimmedStart.length);

    if (!trimmedStart.startsWith('```')) {
      output.push(line);
      continue;
    }

    const rest = trimmedStart.slice(3);

    // If we are already inside a fence and the line is like
    // "``` Then run...", treat it as a closing fence followed by text.
    if (inFence && rest.trim()) {
      output.push(indent + '```');
      output.push(indent + rest.trimStart());
      inFence = false;
      continue;
    }

    output.push(line);
    inFence = !inFence;
  }

  return output.join('\n');
}

function preprocess(text) {
  const normalizedText = normalizeFenceBoundaryLines(normalizeCodeFenceMarkup(text))
    .replace(/\[CODE\]/gi, '```')
    .replace(/\[\/CODE\]/gi, '```')
    .replace(/\[code\s+lang=["']?(\w+)["']?\]/gi, '```$1')
    .replace(/[“”]\s*```/g, '```')
    .replace(/```\s*[“”]/g, '```')
    .replace(/([^\n])\s*```(?=\s|$)/g, '$1\n```')
    .replace(/<\/?(s|del|strike)>/gi, "");

  return normalizeMathMarkup(normalizedText);
}

function looksLikeMathExpression(value) {
  if (!value) return false;
  const v = String(value).trim();
  if (!v) return false;

  if (/\\(frac|sqrt|sum|int|prod|lim|theta|alpha|beta|gamma|Delta|lambda|pi|sin|cos|tan)/i.test(v)) return true;
  if (/[∫∑∏√∞≈≤≥≠π]/.test(v)) return true;
  if (/\b[a-zA-Z]\s*\^\s*\d+\b/.test(v)) return true;
  if (/\b[a-zA-Z]\s*_\s*[a-zA-Z0-9]+\b/.test(v)) return true;
  if (/\b(d\/dx|dy\/dx|dx|dy|dz)\b/i.test(v)) return true;
  if (/\$\$?[\s\S]*\$\$?/.test(v)) return true;

  return false;
}

function normalizeMathMarkup(text) {
  if (!text) return text;

  let normalized = String(text);

  // Fix common AI LaTeX mistakes: square brackets used where curly braces are required.
  // \frac[a][b] → \frac{a}{b}  (all four mixed-bracket combos)
  normalized = normalized.replace(/\\frac\[([^\]\n]*)\]\[([^\]\n]*)\]/g, '\\frac{$1}{$2}');
  normalized = normalized.replace(/\\frac\{([^}\n]*)\}\[([^\]\n]*)\]/g, '\\frac{$1}{$2}');
  normalized = normalized.replace(/\\frac\[([^\]\n]*)\]\{([^}\n]*)\}/g, '\\frac{$1}{$2}');
  // _[x] → _{x}  and  ^[x] → ^{x}  (subscript / superscript with square brackets)
  normalized = normalized.replace(/([_^])\[([^\]\n]*)\]/g, '$1{$2}');
  // _{x]  →  _{x}  and  ^{x]  →  ^{x}  (mismatched closing bracket)
  normalized = normalized.replace(/([_^])\{([^{}\]\n]*)\]/g, '$1{$2}');

  // Convert block math \[...\] → $$...$$ as a single-pass (captures full block,
  // prevents the two-pass approach from leaving dangling delimiters on malformed input)
  normalized = normalized.replace(/\\\[([\s\S]+?)\\\]/g, (_, c) => '$$' + c.trim() + '$$');
  // Convert inline math \(...\) → $...$
  normalized = normalized.replace(/\\\(([\s\S]+?)\\\)/g, (_, c) => '$' + c.trim() + '$');

  // Promote inline code `...` to $...$ if it looks like math
  normalized = normalized.replace(/`([^`\n]+)`/g, (full, inner) => {
    if (!looksLikeMathExpression(inner)) return full;
    const candidate = inner.trim().replace(/^\$+|\$+$/g, '');
    return `$${candidate}$`;
  });

  // Shield already-delimited math before the rescue pass so the rescue regex
  // cannot double-wrap content that is already inside $$...$$ or $...$.
  // (Double-wrapping previously caused $$\n$$\int...\n$$\n$$ which breaks shielding.)
  const rescueStore = [];
  let safe = normalized;
  safe = safe.replace(/\$\$([\s\S]+?)\$\$/g, (match) => {
    rescueStore.push(match);
    return '\x02R' + (rescueStore.length - 1) + '\x03';
  });
  safe = safe.replace(/\$([^\$\n]+?)\$/g, (match) => {
    rescueStore.push(match);
    return '\x02R' + (rescueStore.length - 1) + '\x03';
  });

  // Rescue bare LaTeX commands at the start of a line (unshielded text only)
  safe = safe.replace(/(^|\n)([ \t]*(?:[-*] )?)(\\(?:int|sum|prod|frac|sqrt|lim|big[lrmb]?|left|right|begin|end|text|binom|log|ln|exp|sin|cos|tan|sec|csc|cot|theta|alpha|beta|gamma|Delta|delta|lambda|pi|sigma|omega|infty|partial|nabla|forall|exists|mathbb|mathcal|mathrm|mathbf|overline|underline|vec|hat|bar|dot|ddot|tilde|cdot|times|div|pm|leq|geq|neq|approx|equiv|subset|supset|cup|cap|in|notin|to|mapsto|implies|iff|quad|qquad|hbar|ell|Re|Im|det|ker|hom|deg|arg|dim|sup|limsup|liminf|max|min|gcd|pmod|bmod|not|neg|oplus|otimes|langle|rangle|lceil|rceil|lfloor|rfloor|varphi|varepsilon|varnothing)\b[^\n]*)(?=\n|$)/gi, (full, lead, indent, expr) => {
    return `${lead}${indent}$$${expr.trim()}$$`;
  });

  // Rescue \begin{...}...\end{...} environments (unshielded text only)
  safe = safe.replace(/(^|\n)([ \t]*)(\\begin\{[^}]+\}[\s\S]*?\\end\{[^}]+\})(?=\n|$)/g, (full, lead, indent, expr) => {
    return `${lead}${indent}$$${expr.trim()}$$`;
  });

  // Restore the shielded blocks
  for (let i = 0; i < rescueStore.length; i++) {
    safe = safe.split('\x02R' + i + '\x03').join(rescueStore[i]);
  }

  return safe;
}

function promoteInlineCodeMath(container) {
  if (!container) return;

  const codeNodes = container.querySelectorAll('code');
  codeNodes.forEach((node) => {
    if (node.closest('pre')) return;

    const raw = (node.textContent || '').trim();
    if (!looksLikeMathExpression(raw)) return;

    const cleaned = raw.replace(/^\$+|\$+$/g, '');
    const replacement = document.createTextNode(`$${cleaned}$`);
    node.replaceWith(replacement);
  });
}

function applySavedTheme() {
  const savedTheme = localStorage.getItem(THEME_KEY);
  if (savedTheme === 'light') {
    document.body.classList.remove('dark');
  } else if (savedTheme === 'dark') {
    document.body.classList.add('dark');
  }
}

function sanitizeMarkdownHtml(rawHtml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(`<div>${rawHtml}</div>`, 'text/html');
  const root = doc.body.firstElementChild;
  if (!root) return '';

  const sanitizeNode = (node) => {
    if (node.nodeType === Node.TEXT_NODE) return;
    if (node.nodeType !== Node.ELEMENT_NODE) {
      node.remove();
      return;
    }

    const tag = node.tagName.toLowerCase();
    if (!ALLOWED_TAGS.has(tag)) {
      const text = doc.createTextNode(node.textContent || '');
      node.replaceWith(text);
      return;
    }

    [...node.attributes].forEach((attr) => {
      const name = attr.name.toLowerCase();
      const value = attr.value;
      const allowedForTag = ALLOWED_ATTRS[tag];

      if (name.startsWith('on')) {
        node.removeAttribute(attr.name);
        return;
      }

      if (name === 'style' || name === 'srcset') {
        node.removeAttribute(attr.name);
        return;
      }

      if (name === 'href' || name === 'src') {
        if (!/^(https?:|data:image\/|blob:|\/|#)/i.test(value.trim())) {
          node.removeAttribute(attr.name);
          return;
        }
      }

      if (allowedForTag && allowedForTag.has(name)) return;
      if ((tag === 'a' || tag === 'img') && (name === 'href' || name === 'src')) return;
      node.removeAttribute(attr.name);
    });

    if (tag === 'a') {
      node.setAttribute('target', '_blank');
      node.setAttribute('rel', 'noopener noreferrer nofollow');
    }

    if (tag === 'img') {
      if (!node.getAttribute('alt')) node.setAttribute('alt', 'Generated image');
      node.setAttribute('loading', 'lazy');
      node.setAttribute('decoding', 'async');
    }

    [...node.childNodes].forEach(sanitizeNode);
  };

  [...root.childNodes].forEach(sanitizeNode);
  return root.innerHTML;
}

// Register a custom marked.js extension so $$...$$ and $...$ math blocks
// are treated as first-class tokens and never mangled by the markdown renderer.
function ensureMathExtension() {
  if (!window.marked || window._spectrixMathExt) return;
  try {
    window.marked.use({
      extensions: [
        {
          name: 'blockMath',
          level: 'block',
          start(src) {
            const i = src.indexOf('$$');
            return i === -1 ? Infinity : i;
          },
          tokenizer(src) {
            const m = /^\$\$([\s\S]+?)\$\$/.exec(src);
            if (m) return { type: 'blockMath', raw: m[0], math: m[1] };
          },
          renderer(tok) {
            return '$$' + tok.math + '$$\n';
          }
        },
        {
          name: 'inlineMath',
          level: 'inline',
          start(src) {
            let i = src.indexOf('$');
            // Skip $$ positions (handled by blockMath)
            while (i !== -1 && src[i + 1] === '$') i = src.indexOf('$', i + 2);
            return i === -1 ? Infinity : i;
          },
          tokenizer(src) {
            const m = /^\$(?!\$)([^\$\n]+?)\$(?!\$)/.exec(src);
            if (m) return { type: 'inlineMath', raw: m[0], math: m[1] };
          },
          renderer(tok) {
            return '$' + tok.math + '$';
          }
        }
      ]
    });
    window._spectrixMathExt = true;
  } catch (e) {
    console.warn('Spectrix: marked math extension unavailable:', e);
  }
}

function renderMarkdownSafely(content) {
  const text = preprocess(String(content));
  if (!window.marked) return text;

  ensureMathExtension();

  // If the marked math extension registered, math tokens are handled natively.
  if (window._spectrixMathExt) {
    const parsed = marked.parse(text);
    return sanitizeMarkdownHtml(parsed);
  }

  // Fallback: extract all $$ / $ blocks before marked.parse() so
  // backslashes and braces are never touched by the markdown renderer.
  const mathStore = [];
  let shielded = text;

  shielded = shielded.replace(/\$\$([\s\S]+?)\$\$/g, (match) => {
    mathStore.push(match);
    return 'MATHPH' + (mathStore.length - 1) + 'ENDPH';
  });
  shielded = shielded.replace(/\$([^\$\n]+?)\$/g, (match) => {
    mathStore.push(match);
    return 'MATHPH' + (mathStore.length - 1) + 'ENDPH';
  });

  const parsed = marked.parse(shielded);
  let result = sanitizeMarkdownHtml(parsed);

  for (let i = 0; i < mathStore.length; i++) {
    const escaped = mathStore[i]
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    result = result.split('MATHPH' + i + 'ENDPH').join(escaped);
  }

  return result;
}

function formatCodeLanguageLabel(lang) {
  const key = String(lang || '').toLowerCase().trim();
  const map = {
    javascript: 'JS',
    typescript: 'TS',
    python: 'PY',
    bash: 'SHELL',
    shell: 'SHELL',
    sh: 'SHELL',
    html: 'HTML',
    css: 'CSS',
    json: 'JSON',
    markdown: 'MD',
    md: 'MD',
    jsx: 'JSX',
    tsx: 'TSX',
    csharp: 'C#',
    cpp: 'C++',
    c: 'C',
    java: 'JAVA',
    go: 'GO',
    rust: 'RUST',
    sql: 'SQL',
    yaml: 'YAML',
    yml: 'YAML',
    xml: 'XML',
    plaintext: 'TEXT',
    text: 'TEXT'
  };

  if (map[key]) return map[key];
  if (!key) return 'CODE';
  return key.slice(0, 12).toUpperCase();
}

const HTML_PREVIEW_LANGS = new Set(['html', 'htm', 'xhtml', 'xml', 'markup']);
const HTML_PREVIEW_MAX_CHARS = 120000;
const CODE_HIGHLIGHT_MAX_CHARS = 32000;
const CODE_LINE_GUTTER_MAX_LINES = 1200;

function looksLikeHtmlSnippet(codeText) {
  if (!codeText) return false;
  const snippet = String(codeText).trim();
  if (!snippet) return false;
  return /^<!doctype\s+html/i.test(snippet)
    || /<html[\s>]/i.test(snippet)
    || /<body[\s>]/i.test(snippet)
    || /<(div|section|main|header|footer|article|nav|style|script)[\s>]/i.test(snippet)
    || /<\/\w+>/.test(snippet);
}

function canUseHtmlPreview(resolvedLang, codeText) {
  if (!codeText || codeText.length > HTML_PREVIEW_MAX_CHARS) return false;
  const lang = String(resolvedLang || '').toLowerCase().trim();
  if (HTML_PREVIEW_LANGS.has(lang)) return true;
  return looksLikeHtmlSnippet(codeText);
}

function getOrCreateHtmlPreviewWrap(pre) {
  const sibling = pre.nextElementSibling;
  if (sibling && sibling.classList && sibling.classList.contains('html-preview-wrap')) {
    return sibling;
  }

  const wrap = document.createElement('div');
  wrap.className = 'html-preview-wrap';
  const frame = document.createElement('iframe');
  frame.className = 'html-preview-frame';
  frame.loading = 'lazy';
  frame.referrerPolicy = 'no-referrer';
  frame.sandbox = 'allow-scripts';
  wrap.appendChild(frame);
  pre.insertAdjacentElement('afterend', wrap);
  return wrap;
}

function buildLineNumberGutter(block, pre) {
  const existing = pre.querySelector('.line-number-gutter');
  if (existing) existing.remove();

  const normalized = String(block.textContent || '').replace(/\r\n/g, '\n').replace(/\n+$/, '');
  const lineCount = normalized ? normalized.split('\n').length : 1;

  if (lineCount > CODE_LINE_GUTTER_MAX_LINES) {
    pre.dataset.linesAvailable = 'false';
    return false;
  }

  pre.dataset.linesAvailable = 'true';

  const gutter = document.createElement('div');
  gutter.className = 'line-number-gutter';

  for (let line = 1; line <= lineCount; line++) {
    const lineEl = document.createElement('span');
    lineEl.textContent = String(line);
    gutter.appendChild(lineEl);
  }

  pre.appendChild(gutter);
  return true;
}

function syncLineNumberGutter(pre) {
  if (!pre) return;
  const gutter = pre.querySelector('.line-number-gutter');
  if (!gutter) return;
  const offsetY = Math.round(pre.scrollTop || 0);
  gutter.style.transform = `translate3d(0, ${-offsetY}px, 0)`;
}

function decorateCodeBlocks(container) {
  if (!window.hljs) return;

  const blocks = container.querySelectorAll("pre code");
  blocks.forEach((block) => {
    // Normalize common markdown fence padding so numbering starts on real content.
    const rawBlockText = String(block.textContent || '');
    const normalizedBlockText = rawBlockText
      .replace(/\r\n/g, '\n')
      .replace(/^\n+/, '')
      .replace(/\n+$/, '');
    if (normalizedBlockText !== rawBlockText) {
      block.textContent = normalizedBlockText;
    }

    const pre = block.parentElement;
    if (!pre) return;
    if (pre.dataset.enhanced === 'true') {
      if (pre.classList.contains('line-numbers')) {
        syncLineNumberGutter(pre);
      }
      return;
    }

    const shouldHighlight = normalizedBlockText.length <= CODE_HIGHLIGHT_MAX_CHARS;
    if (shouldHighlight) {
      hljs.highlightElement(block);
    } else {
      block.classList.remove('hljs');
      block.removeAttribute('data-highlighted');
    }

    const langFromClass = Array.from(block.classList)
      .find((cls) => cls.startsWith('language-'));
    const resolvedLang = langFromClass
      ? langFromClass.replace('language-', '')
      : (block.getAttribute('data-language') || 'code');
    pre.dataset.lang = formatCodeLanguageLabel(resolvedLang);

    const hasLineNumberGutter = buildLineNumberGutter(block, pre);
    pre.scrollTop = 0;
    syncLineNumberGutter(pre);

    if (pre.dataset.lineScrollBound !== 'true') {
      let syncFrameId = 0;
      pre.addEventListener('scroll', () => {
        if (syncFrameId) return;
        syncFrameId = requestAnimationFrame(() => {
          syncFrameId = 0;
          syncLineNumberGutter(pre);
        });
      }, { passive: true });
      pre.dataset.lineScrollBound = 'true';
    }

    pre.dataset.enhanced = 'true';

    const collapseBtn = document.createElement("button");
    collapseBtn.className = "collapse-btn";
    collapseBtn.textContent = "Fold";
    collapseBtn.title = "Collapse code block";
    collapseBtn.onclick = () => {
      pre.classList.toggle("collapsed");
      const isCollapsed = pre.classList.contains("collapsed");
      collapseBtn.textContent = isCollapsed ? "Unfold" : "Fold";
      collapseBtn.title = isCollapsed ? "Expand code block" : "Collapse code block";
    };

    const linesBtn = document.createElement("button");
    linesBtn.className = "lines-btn";
    linesBtn.textContent = "Lines";
    linesBtn.title = hasLineNumberGutter ? "Toggle line numbers" : "Line numbers disabled for very large code blocks";
    linesBtn.setAttribute('aria-pressed', 'false');
    if (!hasLineNumberGutter) {
      linesBtn.disabled = true;
    }
    linesBtn.onclick = () => {
      if (pre.dataset.linesAvailable !== 'true') {
        showStatus('Line numbers are disabled for very large code blocks.');
        return;
      }
      const enabled = pre.classList.toggle("line-numbers");
      linesBtn.classList.toggle('active', enabled);
      linesBtn.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    };

    const copyBtn = document.createElement("button");
    copyBtn.className = "copy-btn";
    copyBtn.textContent = "Copy";
    copyBtn.title = "Copy code";
    copyBtn.onclick = async () => {
      try {
        await navigator.clipboard.writeText(block.textContent || '');
        copyBtn.textContent = "Copied";
      } catch {
        copyBtn.textContent = "Failed";
      }
      setTimeout(() => {
        copyBtn.textContent = "Copy";
      }, 1200);
    };

    if (canUseHtmlPreview(resolvedLang, normalizedBlockText)) {
      const previewBtn = document.createElement('button');
      previewBtn.className = 'preview-btn';
      previewBtn.textContent = 'Live';
      previewBtn.title = 'Show live HTML preview';
      previewBtn.setAttribute('aria-pressed', 'false');
      previewBtn.onclick = () => {
        const wrap = getOrCreateHtmlPreviewWrap(pre);
        const frame = wrap.querySelector('iframe');
        const shouldShow = !wrap.classList.contains('active');

        wrap.classList.toggle('active', shouldShow);
        previewBtn.classList.toggle('active', shouldShow);
        previewBtn.textContent = shouldShow ? 'Hide' : 'Live';
        previewBtn.title = shouldShow ? 'Hide live HTML preview' : 'Show live HTML preview';
        previewBtn.setAttribute('aria-pressed', shouldShow ? 'true' : 'false');

        if (shouldShow && frame && wrap.dataset.loaded !== 'true') {
          const htmlSnapshot = String(block.textContent || '');
          scheduleNonCriticalTask(() => {
            frame.srcdoc = htmlSnapshot;
            wrap.dataset.loaded = 'true';
          }, 60);
        }
      };
      pre.appendChild(previewBtn);
    }

    pre.appendChild(collapseBtn);
    pre.appendChild(linesBtn);
    pre.appendChild(copyBtn);
  });
}

function scheduleNonCriticalTask(task, timeout = 180) {
  if (typeof window.requestIdleCallback === 'function') {
    window.requestIdleCallback(() => task(), { timeout });
    return;
  }
  setTimeout(task, timeout);
}

function queueCodeBlockEnhancement(container) {
  if (!container || !container.querySelector || !container.querySelector('pre code')) return;
  if (container.dataset.codeEnhanceQueued === 'true') return;
  container.dataset.codeEnhanceQueued = 'true';
  scheduleNonCriticalTask(() => {
    container.dataset.codeEnhanceQueued = 'false';
    decorateCodeBlocks(container);
  }, 220);
}

async function fetchWithTimeoutRetry(url, options = {}, retryCount = 1) {
  const timeoutMs = options.timeoutMs || 35000;
  const { timeoutMs: ignored, ...fetchOptions } = options;
  let lastError = null;

  for (let attempt = 0; attempt <= retryCount; attempt++) {
    const controller = new AbortController();
    const timeoutHandle = setTimeout(() => controller.abort(), timeoutMs);

    try {
      const response = await fetch(url, {
        ...fetchOptions,
        signal: controller.signal
      });
      clearTimeout(timeoutHandle);

      // Special handling for 429 — don't retry, the worker already retried
      if (response.status === 429) {
        let retryAfter = 30;
        try {
          const errBody = await response.clone().json();
          if (errBody.retryAfter) retryAfter = errBody.retryAfter;
        } catch {}
        const err = new Error(`Rate limited — please wait ~${retryAfter}s and try again.`);
        err.isRateLimit = true;
        err.retryAfter = retryAfter;
        throw err;
      }

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      return response;
    } catch (error) {
      clearTimeout(timeoutHandle);
      // Don't retry rate limit errors — propagate immediately
      if (error.isRateLimit) throw error;
      lastError = error;
      const status = parseHttpStatusFromError(error);
      const shouldRetry = status == null || status >= 500;
      if (attempt < retryCount && shouldRetry) {
        const backoffMs = Math.min(1000 * Math.pow(2, attempt), 8000);
        await new Promise((resolve) => setTimeout(resolve, backoffMs));
      }
    }
  }

  if (lastError && lastError.name === 'AbortError') {
    throw new Error('Request timed out. Please try again.');
  }

  throw lastError || new Error('Request failed');
}

// ===== RENDER MESSAGE =====
function render(role, content, saveIt = true, messageIndex = null) {
  const d = document.createElement("div");
  d.className = "msg " + role;
  let actions = null;

  if (typeof content === "object" && content.type === "image") {
    const img = document.createElement("img");
    img.src = content.src;
    img.className = "ai-img";
    d.appendChild(img);
  } 
  else if (typeof content === "object" && content.type === "video") {
    const video = document.createElement("video");
    video.src = content.src;
    video.controls = true;
    video.autoplay = true;
    video.loop = true;
    video.style.maxWidth = "100%";
    video.style.borderRadius = "12px";
    d.appendChild(video);
  } 
  else {
	if (window.marked) {
      d.innerHTML = renderMarkdownSafely(content);
      promoteInlineCodeMath(d);
    }
	else {
  	d.textContent = String(content);
	}
    renderMath(d);
  }

  if (role === "user" && typeof content === "string") {
    actions = document.createElement("div");
    actions.className = "msg-actions";

    let resolvedIndex = Number.isInteger(messageIndex) ? messageIndex : null;
    if (!Number.isInteger(resolvedIndex) && saveIt) {
      const session = getCurrentSession();
      if (session?.messages) {
        resolvedIndex = session.messages.length;
      }
    }

    const editBtn = document.createElement("button");
    editBtn.className = "msg-btn edit-btn";
    editBtn.textContent = "Edit";
    editBtn.onclick = () => {
      editMessage(resolvedIndex, content);
    };

    actions.appendChild(editBtn);
  }

  if (role === "bot" && typeof content === "string") {
    actions = document.createElement("div");
    actions.className = "msg-actions";

    const retryBtn = document.createElement("button");
    retryBtn.className = "msg-btn retry-btn";
    retryBtn.textContent = "Retry";
    retryBtn.onclick = retryLast;

    actions.appendChild(retryBtn);
  }

  queueCodeBlockEnhancement(d);

  const t = document.createElement("div");
  t.className = "timestamp";
  t.textContent = time();
  if (actions) {
    const meta = document.createElement("div");
    meta.className = "msg-meta";
    meta.appendChild(t);
    meta.appendChild(actions);
    d.appendChild(meta);
  } else {
    d.appendChild(t);
  }

  chat.appendChild(d);
  scrollChatToLatest({ smooth: false });

  if (saveIt) saveMessage(role, content);
  return d;
}

async function streamBotFromSSE(payload, options = {}) {
  const signal = options.signal;
  const streamCandidates = [
    activeChatStreamApiUrl,
    ...CHAT_STREAM_API_URL_CANDIDATES.filter((url) => url !== activeChatStreamApiUrl)
  ];

  const requestBody = JSON.stringify(payload);
  let res = null;
  let lastStreamError = null;

  for (let index = 0; index < streamCandidates.length; index++) {
    const url = streamCandidates[index];
    try {
      const attempt = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: requestBody,
        signal
      });

      const hasNext = index < streamCandidates.length - 1;
      if (hasNext && CHAT_ROUTE_FALLBACK_STATUSES.has(attempt.status)) {
        continue;
      }

      activeChatStreamApiUrl = url;
      res = attempt;
      break;
    } catch (error) {
      if (signal?.aborted) {
        const abortError = new Error('Generation stopped');
        abortError.isUserAbort = true;
        throw abortError;
      }

      lastStreamError = error;
      if (index < streamCandidates.length - 1) continue;
      throw error;
    }
  }

  if (!res) {
    throw lastStreamError || new Error('Streaming endpoint unavailable');
  }

  if (res.status === 429) {
    let retryAfter = 30;
    try {
      const errBody = await res.clone().json();
      if (errBody.retryAfter) retryAfter = errBody.retryAfter;
    } catch {}
    const err = new Error(`Rate limited — please wait ~${retryAfter}s and try again.`);
    err.isRateLimit = true;
    err.retryAfter = retryAfter;
    throw err;
  }

  if (!res.ok) {
    throw new Error(`HTTP ${res.status}`);
  }

  if (!res.body) {
    throw new Error("Streaming is not supported in this browser.");
  }

  const d = document.createElement("div");
  d.className = "msg bot";
  d.innerHTML = '<span class="stream-placeholder">Thinking<span class="stream-dots" aria-hidden="true"></span></span>';
  chat.appendChild(d);
  scrollChatToLatest({ smooth: false, force: true });

  const session = getCurrentSession();
  if (!session) throw new Error("No active chat session");

  let renderedText = "";
  let buffer = "";
  let streamDone = false;
  let abortedByUser = false;
  let frameScheduled = false;
  let streamTextNode = null;
  let pendingDeltaText = "";

  const decoder = new TextDecoder();
  const reader = res.body.getReader();
  const STREAM_IDLE_TIMEOUT_MS = 20000;

  const readChunkWithTimeout = async () => {
    let timeoutId;
    try {
      return await Promise.race([
        reader.read(),
        new Promise((_, reject) => {
          timeoutId = setTimeout(() => reject(new Error('Stream stalled.')), STREAM_IDLE_TIMEOUT_MS);
        })
      ]);
    } finally {
      if (timeoutId) clearTimeout(timeoutId);
    }
  };

  let lastStreamRenderAt = 0;
  const STREAM_RENDER_MIN_INTERVAL_MS = 40;
  const STREAM_RENDER_MIN_INTERVAL_WHILE_REVIEWING_MS = 85;
  const STREAM_RENDER_MIN_INTERVAL_WHILE_POINTER_ACTIVE_MS = 95;
  let streamParseEventsSinceYield = 0;
  let lastStreamParseYieldAt = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
  const STREAM_PARSE_YIELD_EVENT_COUNT = 24;
  const STREAM_PARSE_YIELD_BUDGET_MS = 8;

  const renderCurrentState = () => {
    // During stream, append incremental plain text for smoother FPS; finalize markdown once at the end.
    if (!streamTextNode) {
      d.textContent = "";
      streamTextNode = document.createTextNode("");
      d.appendChild(streamTextNode);
    }
    if (pendingDeltaText) {
      streamTextNode.appendData(pendingDeltaText);
      pendingDeltaText = "";
    }
    scrollChatToLatest({ smooth: false });
  };

  const finalizeRenderedMessage = async () => {
    if (pendingDeltaText) {
      if (!streamTextNode) {
        d.textContent = "";
        streamTextNode = document.createTextNode("");
        d.appendChild(streamTextNode);
      }
      streamTextNode.appendData(pendingDeltaText);
      pendingDeltaText = "";
    }

    await ensureMarkdownRuntimeLoaded({ timeoutMs: 1500, silent: true });
    if (window.marked) {
      d.innerHTML = renderMarkdownSafely(renderedText);
      promoteInlineCodeMath(d);
    } else {
      d.textContent = renderedText;
    }
    await renderMath(d);
    queueCodeBlockEnhancement(d);
  };

  const scheduleRender = () => {
    if (frameScheduled) return;
    frameScheduled = true;
    requestAnimationFrame(() => {
      frameScheduled = false;
      const now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
      const baseInterval = autoScrollToLatest
        ? STREAM_RENDER_MIN_INTERVAL_MS
        : STREAM_RENDER_MIN_INTERVAL_WHILE_REVIEWING_MS;
      const pointerBoostActive = now < streamPointerBoostUntil;
      const minInterval = pointerBoostActive
        ? Math.max(baseInterval, STREAM_RENDER_MIN_INTERVAL_WHILE_POINTER_ACTIVE_MS)
        : baseInterval;
      if (now - lastStreamRenderAt < minInterval) return;
      lastStreamRenderAt = now;
      renderCurrentState();
    });
  };

  while (!streamDone) {
    let chunk;
    try {
      chunk = await readChunkWithTimeout();
    } catch (error) {
      if (signal?.aborted) {
        abortedByUser = true;
        break;
      }
      throw error;
    }

    if (chunk.done) break;

    buffer += decoder.decode(chunk.value, { stream: true });
    buffer = buffer.replace(/\r\n/g, "\n");

    let boundaryIndex = buffer.indexOf("\n\n");
    while (boundaryIndex !== -1) {
      const rawEvent = buffer.slice(0, boundaryIndex).trim();
      buffer = buffer.slice(boundaryIndex + 2);

      if (rawEvent) {
        const dataLines = rawEvent
          .split("\n")
          .filter((line) => line.startsWith("data:"))
          .map((line) => line.slice(5).trimStart());

        if (dataLines.length > 0) {
          const dataRaw = dataLines.join("\n").trim();

          if (dataRaw === "[DONE]") {
            streamDone = true;
            break;
          }

          let eventData = null;
          try {
            eventData = JSON.parse(dataRaw);
          } catch {
            eventData = null;
          }

          if (eventData?.type === "error") {
            throw new Error(eventData.message || "Streaming failed");
          }

          const wrappedDelta = (eventData?.type === "delta" && typeof eventData.delta === "string")
            ? eventData.delta
            : "";
          const rawDelta = eventData?.choices?.[0]?.delta?.content;
          const nextDelta = wrappedDelta || (typeof rawDelta === "string" ? rawDelta : "");

          if (nextDelta) {
            renderedText += nextDelta;
            pendingDeltaText += nextDelta;
            scheduleRender();
          }

          if (eventData?.type === "done" || eventData?.choices?.[0]?.finish_reason) {
            streamDone = true;
            break;
          }
        }
      }

      streamParseEventsSinceYield += 1;
      const parseNow = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
      if (
        streamParseEventsSinceYield >= STREAM_PARSE_YIELD_EVENT_COUNT
        || (parseNow - lastStreamParseYieldAt) > STREAM_PARSE_YIELD_BUDGET_MS
      ) {
        streamParseEventsSinceYield = 0;
        lastStreamParseYieldAt = parseNow;
        await new Promise((resolve) => setTimeout(resolve, 0));
        if (signal?.aborted) {
          abortedByUser = true;
          streamDone = true;
          break;
        }
      }

      boundaryIndex = buffer.indexOf("\n\n");
    }
  }

  if (abortedByUser) {
    if (!renderedText.trim()) {
      d.remove();
      const abortError = new Error('Generation stopped');
      abortError.isUserAbort = true;
      throw abortError;
    }

    await finalizeRenderedMessage();
    session.messages.push({ role: "bot", content: renderedText });
    session.timestamp = Date.now();
    await saveChat(session);
    renderHistory();
    updateHeaderTitle();
    showStatus('Generation stopped');
    return renderedText;
  }

  if (!renderedText.trim()) {
    throw new Error("Empty response from model");
  }

  await finalizeRenderedMessage();

  // Play TTS once final text is complete.
  speakText(renderedText);

  session.messages.push({ role: "bot", content: renderedText });
  session.timestamp = Date.now();
  await saveChat(session);
  renderHistory();
  updateHeaderTitle();

  return renderedText;
}

// ===== FULL AUTO TITLE =====
async function generateTitle(userPrompt, botReply) {
  try {
    const res = await fetchChatApiWithFallback({
      method: "POST",
      headers: { "Content-Type": "application/json" },
      timeoutMs: 22000,
      body: JSON.stringify({
        model: localStorage.getItem('Spectrix_text_model') || "stepfun/step-3.5-flash:free",
        messages: [
          {
            role: "system",
            content: `
You are a smart assistant that generates short chat titles.
- Titles must be 3–5 words.
- Do NOT include quotes, backticks, or phrases like "Here is a chat title".
- Do NOT include "Title:"
- Keep it plain, punchy, and readable.
- Summarize the essence of the conversation, not just copy words.
- Avoid special characters or excessive punctuation.
- Keep it under 30 characters.
`
          },
          {
            role: "user",
            content: `
User said: ${userPrompt}
Assistant replied: ${botReply}

Create a concise title that captures the main topic of this conversation.
`
          }
        ]
      })
    });

    const data = await res.json();
    const rawTitle = data?.choices?.[0]?.message?.content || "";

    // ==== CLEAN & FORMAT ====
    let cleanTitle = rawTitle
      .replace(/["'`\n]/g, "")     // remove quotes, backticks, line breaks
      .replace(/\*{1,2}/g, "")     // remove bold/italic markdown
      .replace(/#{1,6}\s?/g, "")   // remove heading markers
      .replace(/\s+/g, " ")        // collapse multiple spaces
      .trim()
      .split(" ")                  // limit words
      .slice(0, 5)
      .join(" ");

    // Fallback: if title is empty, use first 5 words of user prompt
    if (!cleanTitle) {
      cleanTitle = userPrompt
        .replace(/\s+/g, " ")
        .trim()
        .split(" ")
        .slice(0, 5)
        .join(" ");
    }

    return cleanTitle || "New Chat";
  } catch (err) {
    console.error("Title generation failed:", err);

    // Final fallback
    return userPrompt
      ? userPrompt.replace(/\s+/g, " ").trim().split(" ").slice(0, 5).join(" ")
      : "New Chat";
  }
}

// ===== SEND MESSAGE =====
async function send(options = {}) {
  const {
    promptOverride = null,
    skipUserRender = false,
    skipUserSave = false
  } = options;

  if (isGenerating) {
    await showAppAlert("Generation already in progress", 'Please Wait');
    return;
  }

  let prompt = String(promptOverride ?? input.value).trim();
  if (!prompt) return;
  if (prompt.length > MAX_PROMPT_CHARS) {
    showStatus(`Message too long. Max ${MAX_PROMPT_CHARS} characters.`);
    return;
  }

  await ensureMarkdownRuntimeLoaded({ timeoutMs: 1800, silent: true });

  isGenerating = true;
  setStopButtonVisible(true);
  lastUserPrompt = prompt;

  const firstUserPrompt = prompt;
  const session = getCurrentSession();
  const shouldAutoTitle =
    !skipUserSave &&
    !session.autoTitled &&
    session.messages.filter(m => m.role === "user").length === 0 &&
    !prompt.startsWith("/img") &&
    !prompt.startsWith("/vid");

  input.value = "";
  input.style.height = "";
  charCounter.textContent = "0 chars";
  charCounter.style.color = "var(--muted)";

  const isImage = prompt.startsWith("/img ");
  const isVideo = prompt.startsWith("/vid ");

  if (isImage || isVideo) prompt = prompt.slice(5);

  if (!skipUserRender) {
    render("user", prompt);
    // Yield one frame so the user bubble paints immediately.
    await new Promise((resolve) => requestAnimationFrame(resolve));
  }

  if (ttsEnabled && 'speechSynthesis' in window) {
    // Warm up TTS after UI paint so speech setup never delays first bubble render.
    const u = new SpeechSynthesisUtterance('a');
    u.volume = 0.01;
    u.rate = 10;
    window.speechSynthesis.speak(u);
    if (window.speechSynthesis.state === 'paused') window.speechSynthesis.resume();
  }

  const loading = document.createElement("div");
  loading.className = "msg bot";
  loading.innerHTML = "<div class='spinner'></div>";
  chat.appendChild(loading);
  scrollChatToLatest({ smooth: false, force: true });

  try {
    if (isImage) {
      try {
        if (!window.puter?.ai) {
          throw new Error("Puter SDK not loaded");
        }

        const model = document.getElementById("imageModel").value;
        const img = await puter.ai.txt2img(prompt, { model, disable_safety_checker: true });
        loading.remove();
        isGenerating = false;

        img.classList.add("ai-img");
        const base64 = img.src;
        const mediaId = `img_${Date.now()}`;
        const blob = await (await fetch(base64)).blob();
        await saveMedia(mediaId, blob);
        await saveMessage("bot", { type: "image", src: base64, mediaId });

        const div = document.createElement("div");
        div.className = "msg bot";
        div.appendChild(img);
        chat.appendChild(div);
        scrollChatToLatest({ smooth: false, force: true });
      } catch (err) {
        console.error("Send error:", err);
        isGenerating = false;
        loading.remove();
        render("bot", "**Error generating response 💀** " + err.message);
      }
    }
    else if (isVideo) {
      try {
        if (!window.puter?.ai) {
          throw new Error("Puter SDK not loaded");
        }

        const video = await puter.ai.txt2vid(prompt, { model: FIXED_VIDEO_MODEL, seconds: 8 });
        loading.remove();
        isGenerating = false;

        const blob = await fetch(video.src).then(r => r.blob());
        const reader = new FileReader();
        reader.onloadend = async () => {
          const div = document.createElement("div");
          div.className = "msg bot";

          const savedVideo = document.createElement("video");
          savedVideo.src = reader.result;
          savedVideo.controls = true;
          savedVideo.autoplay = true;
          savedVideo.loop = true;
          savedVideo.style.maxWidth = "100%";
          savedVideo.style.borderRadius = "12px";

          div.appendChild(savedVideo);
          chat.appendChild(div);
          scrollChatToLatest({ smooth: false, force: true });

          const mediaId = `vid_${Date.now()}`;
          await saveMedia(mediaId, blob);
          await saveMessage("bot", { type: "video", src: reader.result, mediaId });
        };
        reader.readAsDataURL(blob);
      } catch (err) {
        console.error("Send error:", err);
        isGenerating = false;
        loading.remove();
        render("bot", "**Error generating response 💀** " + err.message);
      }
    }
    else {
      const model = FIXED_TEXT_MODEL;

      const messages = session.messages
        .filter(m => typeof m.content === "string")
        .map(m => ({ role: m.role === "bot" ? "assistant" : "user", content: m.content }));

      // 🧠 Build system prompt with memory context
      let systemPrompt = MATH_FORMAT_SYSTEM_PROMPT;
	  const memoryContext = await buildMemoryContext();
  		if (memoryContext) {
  		systemPrompt += '\n' + memoryContext;
		}
      messages.unshift({ role: "system", content: systemPrompt });

      if (!skipUserSave) {
        messages.push({ role: "user", content: prompt });
      }

// 🧠 DYNAMIC SEARCH PAYLOAD
const payload = {
  model: webSearchEnabled ? model + ":online" : model,
  messages: messages
};

if (webSearchEnabled) {
  payload.plugins = [
    {
      id: "web",
      engine: "firecrawl",
      max_results: 5
    }
  ];
}

loading.remove();
let answer;
try {
  activeStreamAbortController = new AbortController();
  answer = await streamBotFromSSE(payload, { signal: activeStreamAbortController.signal });
} catch (streamError) {
  if (streamError?.isUserAbort) {
    isGenerating = false;
    setStopButtonVisible(false);
    return;
  }
  if (streamError?.isRateLimit) {
    throw streamError;
  }

  removePendingStreamBubble();
  showStatus('Stream interrupted. Switching to standard response...');
  answer = await fetchBotAnswerViaJson(payload);
  render("bot", answer);
}
activeStreamAbortController = null;
isGenerating = false;
setStopButtonVisible(false);

     if (shouldAutoTitle) {
  // Mark as titled IMMEDIATELY to prevent double-firing
  session.autoTitled = true;
  await saveChat(session);

  const titledSessionId = currentId;
  setTimeout(async () => {
    if (currentId !== titledSessionId) return;
    try {
      const title = await generateTitle(firstUserPrompt, answer);
      if (title && sessions[titledSessionId]) {
        sessions[titledSessionId].title = title;
        await saveChat(sessions[titledSessionId]);
        renderHistory();
        if (currentId === titledSessionId) updateHeaderTitle();
      }
    } catch (err) {
      console.error("Auto-title fallback:", err);
    }
  }, 6000);
}

      // 🧠 Extract memories from this exchange (length + cooldown throttled)
      if (memoryEnabled && !incognitoEnabled && shouldExtractMemories(prompt)) {
  			setTimeout(() => {
    		extractMemories(prompt, answer).catch(err => console.warn('Memory extraction failed:', err));
 		 }, 3000);
		}
    }
  } catch (err) {
    console.error("Send error:", err);
    isGenerating = false;
    activeStreamAbortController = null;
    setStopButtonVisible(false);
    loading.remove();

    if (err.isRateLimit) {
      const secs = err.retryAfter || 30;
      const rateLimitMsg = `**⏳ Whoa, slow down bro!** The AI provider is rate-limiting us right now.\n\nTry again in about **${secs} seconds**. This usually happens when too many requests are sent in a short time.\n\n> 💡 *Tip: Wait a moment, then tap 🔄 Retry below.*`;
      render("bot", rateLimitMsg);
    } else {
      render("bot", "**Error generating response 💀** " + err.message);
    }
  }
}

function toggleTheme() {
  document.body.classList.toggle("dark");
  localStorage.setItem(THEME_KEY, document.body.classList.contains('dark') ? 'dark' : 'light');
  updateThemeColorMeta();
}

function updateThemeColorMeta() {
  if (!themeColorMeta) return;
  themeColorMeta.setAttribute('content', document.body.classList.contains('dark') ? '#020617' : '#f4f4f5');
}

function showStatus(message, timeout = 2600) {
  const banner = document.getElementById('statusBanner');
  if (!banner) return;
  banner.textContent = message;
  banner.style.display = 'block';
  clearTimeout(showStatus._timer);
  showStatus._timer = setTimeout(() => {
    banner.style.display = 'none';
  }, timeout);
}

function openAppModal({
  title = 'Notice',
  message = '',
  mode = 'alert',
  defaultValue = '',
  okText = 'OK',
  cancelText = 'Cancel',
  dontAskAgainKey = ''
} = {}) {
  return new Promise((resolve) => {
    const overlay = document.getElementById('appModalOverlay');
    const modal = document.getElementById('appModal');
    const titleEl = document.getElementById('appModalTitle');
    const bodyEl = document.getElementById('appModalBody');
    const auxEl = document.getElementById('appModalAux');
    const dontAsk = document.getElementById('appModalDontAsk');
    const cancelBtn = document.getElementById('appModalCancel');
    const okBtn = document.getElementById('appModalOk');

    if (!overlay || !modal || !titleEl || !bodyEl || !auxEl || !dontAsk || !cancelBtn || !okBtn) {
      resolve(mode === 'confirm' ? false : mode === 'prompt' ? null : true);
      return;
    }

    titleEl.textContent = title;
    bodyEl.textContent = message;
    okBtn.textContent = okText;
    cancelBtn.textContent = cancelText;
    dontAsk.checked = false;

    const isAlert = mode === 'alert';
    const isPrompt = mode === 'prompt';
    const showDontAsk = mode === 'confirm' && !!dontAskAgainKey;

    cancelBtn.style.display = isAlert ? 'none' : 'inline-flex';
    auxEl.classList.toggle('visible', showDontAsk);

    let inputEl = null;
    if (isPrompt) {
      inputEl = document.createElement('input');
      inputEl.type = 'text';
      inputEl.className = 'app-modal-input';
      inputEl.value = String(defaultValue || '');
      bodyEl.appendChild(inputEl);
    }

    const cleanup = () => {
      overlay.classList.remove('visible');
      modal.classList.remove('visible');
      document.removeEventListener('keydown', onKeyDown);
      okBtn.removeEventListener('click', onOk);
      cancelBtn.removeEventListener('click', onCancel);
      overlay.removeEventListener('click', onOverlay);
      if (inputEl) inputEl.remove();
    };

    const onOk = () => {
      if (showDontAsk && dontAsk.checked) {
        localStorage.setItem(dontAskAgainKey, 'true');
      }
      const value = isPrompt ? (inputEl ? inputEl.value : '') : true;
      cleanup();
      resolve(value);
    };

    const onCancel = () => {
      cleanup();
      resolve(isPrompt ? null : false);
    };

    const onOverlay = () => {
      if (isAlert) onOk();
      else onCancel();
    };

    const onKeyDown = (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        if (isAlert) onOk();
        else onCancel();
      }
      if (e.key === 'Enter') {

    };

    okBtn.addEventListener('click', onOk);

    overlay.classList.add('visible');
    modal.classList.add('visible');
    if (inputEl) inputEl.focus();

}

function clearChatSearchHighlights() {
  chat.querySelectorAll('.msg.chat-search-match').forEach((node) => {
    node.classList.remove('chat-search-match');
  });
}

function updateChatSearchHighlights(query) {
  clearChatSearchHighlights();
  const needle = String(query || '').trim().toLowerCase();
  if (!needle) return 0;

  let firstMatch = null;
  let count = 0;
  chat.querySelectorAll('.msg').forEach((node) => {
    const hay = (node.innerText || node.textContent || '').toLowerCase();
    if (hay.includes(needle)) {
      node.classList.add('chat-search-match');
      if (!firstMatch) firstMatch = node;
      count++;
    }
  });

  if (firstMatch) {
    firstMatch.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  return count;
}

function hideChatSearchBar() {
  if (!chatSearchBar) return;
  clearChatSearchHighlights();
  chatSearchBar.remove();
  chatSearchBar = null;
}

function showChatSearchBar() {
  if (chatSearchBar && !chat.contains(chatSearchBar)) {
    chatSearchBar = null;
  }

  if (chatSearchBar) {
    const inputEl = chatSearchBar.querySelector('.chat-search-input');
    if (inputEl) {
      inputEl.focus();
      inputEl.select();
    }
    return;
  }

  chatSearchBar = document.createElement('div');
  chatSearchBar.className = 'chat-search-bar';

  const inputEl = document.createElement('input');
  inputEl.type = 'text';
  inputEl.className = 'chat-search-input';
  inputEl.placeholder = 'Search messages...';
  inputEl.setAttribute('aria-label', 'Search messages in chat');

  closeBtn.type = 'button';
  closeBtn.className = 'chat-search-close';
  closeBtn.textContent = 'X';
  closeBtn.setAttribute('aria-label', 'Close message search');

  });

  if (e.key === "Enter") {
    if (!e.shiftKey) {
      e.preventDefault();
      send();
    } 
    // else: shift+Enter => newline, do nothing
  }
});

  let searchTimeout = null;
  searchBox.addEventListener("input", () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(renderHistory, 200);
  });

  let scrollTicking = false;
  let scrollBottomVisible = false;
  const CHAT_SCROLL_THROTTLE_MS = 40;
  chat.addEventListener("scroll", () => {
    if (scrollTicking) return;
    scrollTicking = true;
    setTimeout(() => {
      const atBottom = isChatNearBottom();
      autoScrollToLatest = atBottom;
      const nextVisible = !atBottom;
      if (nextVisible !== scrollBottomVisible) {
        scrollBottomVisible = nextVisible;
        scrollBottom.classList.toggle("visible", nextVisible);
      }
      scrollTicking = false;
    }, CHAT_SCROLL_THROTTLE_MS);
  }, { passive: true });

  document.addEventListener('pointerdown', () => {
    const now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
    streamPointerBoostUntil = now + 550;
  }, { passive: true });

  chat.addEventListener('wheel', () => {
    const now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
    streamPointerBoostUntil = now + 450;
  }, { passive: true });

  chat.addEventListener('touchmove', () => {
    const now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
    streamPointerBoostUntil = now + 450;
  }, { passive: true });

  document.addEventListener("keydown", (e) => {
    const key = String(e.key || '').toLowerCase();
    if ((e.ctrlKey || e.metaKey) && key === "f") {
      e.preventDefault();
      showChatSearchBar();
      return;
    }
    if (key === "escape" && chatSearchBar) {
      e.preventDefault();
      hideChatSearchBar();
      return;
    }
    if ((e.ctrlKey || e.metaKey) && key === "b") {
      e.preventDefault();
      newChat();
      return;
    }
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && key === "s") {
      e.preventDefault();
      toggleWebSearch();
      return;
    }
    if ((e.ctrlKey || e.metaKey) && key === "/") {
      e.preventDefault();
      searchBox.focus();
    }
  });

  window.addEventListener('resize', () => {
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    if (window.innerWidth > 768 && sidebarOverlay) {
      sidebarOverlay.style.display = 'none';
    }
  });
}

function shouldExtractMemories(userMessage) {
  const message = String(userMessage || '').trim();
  if (message.length <= MEMORY_EXTRACT_MIN_CHARS) return false;

  const last = Number(localStorage.getItem(LAST_MEMORY_EXTRACT_KEY) || 0);
  const now = Date.now();
  if (now - last < MEMORY_EXTRACT_COOLDOWN_MS) return false;

  localStorage.setItem(LAST_MEMORY_EXTRACT_KEY, String(now));
  return true;
}

async function extractMemories(userMessage, botReply) {
  try {
    const existingMemories = await getAllMemories();
    const existingFacts = existingMemories.map(m => m.content.toLowerCase());

    const res = await fetchChatApiWithFallback({
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      timeoutMs: 18000,
      body: JSON.stringify({
        model: localStorage.getItem('Spectrix_text_model') || "stepfun/step-3.5-flash:free",
        messages: [
          {
            role: 'system',
            content: `You are a memory extraction system. Analyze the conversation and extract ONLY genuinely memorable user facts.

Rules:
- Extract facts about the USER only (name, age, location, job, preferences, interests, goals, technical stack, learning topics).
- Do NOT extract facts about the AI or generic conversation topics.
- Do NOT extract greetings, pleasantries, or trivial exchanges.
- Each fact must be a concise statement (under 15 words).
- Categorize each fact using ONLY one of these exact words: personal, preference, technical, interest, context, general
- If nothing worth remembering, respond with EXACTLY: NONE
- Format: category|fact
- One fact per line. Max 3 facts.

Existing memories (avoid near-duplicates):
${existingFacts.slice(0, 20).join('\n')}`
          },
          {
            role: 'user',
            content: `User said: ${userMessage.slice(0, 500)}\nAssistant replied: ${botReply.slice(0, 500)}\n\nExtract memorable facts about the user:`
          }
        ]
      })
    });

    const data = await res.json();
    const rawOutput = data?.choices?.[0]?.message?.content?.trim();

    if (!rawOutput || rawOutput.toUpperCase() === 'NONE') return;

    const lines = rawOutput.split('\n').filter(l => l.includes('|'));
    let saved = 0;

    for (const line of lines) {
      const parts = line.split('|').map(s => s.trim());
      if (parts.length < 2) continue;

      // FIX 2: properly validate category
      const rawCat = parts[0].toLowerCase().replace(/[^a-z]/g, '');
      const category = MEMORY_CATEGORIES[rawCat] ? rawCat : 'general';
      const fact = parts[1];

      if (!fact || fact.length < 4 || fact.length > 200) continue;

      // FIX 3: stricter but fairer duplicate check (full string match, not substring)
      const factLower = fact.toLowerCase();
      const isDuplicate = existingFacts.some(ef => {
        if (ef === factLower) return true;
        // Only block if >80% of words overlap
        const efWords = new Set(ef.split(' '));
        const factWords = factLower.split(' ');
        const overlap = factWords.filter(w => w.length > 3 && efWords.has(w)).length;
        return overlap >= Math.ceil(factWords.length * 0.8);
      });

      if (isDuplicate) continue;

      const memory = {
        id: 'mem_' + Date.now() + '_' + Math.floor(Math.random() * 10000),
        content: fact,
        category,
        timestamp: Date.now(),
        source: 'auto'
      };

      await saveMemory(memory);
      existingFacts.push(factLower); // prevent within-batch duplicates
      saved++;
      if (saved >= 3) break;
    }

    if (saved > 0) {
      await updateMemoryBadge();
      console.log(`🧠 Saved ${saved} new memories`);
    }
  } catch (err) {
    console.warn('Memory extraction error:', err);
  }
}

function closeAllCustomSelectDropdowns() {

function enhanceCustomSelectDropdown(selectId) {
  const select = document.getElementById(selectId);
  if (!select || select.dataset.customEnhanced === 'true') return;

  const wrap = select.closest('.select-wrap');
  if (!wrap) return;

  select.dataset.customEnhanced = 'true';
  select.classList.add('native-select-hidden');
  wrap.classList.add('custom-select-wrap', `custom-select-${selectId}`);

  const trigger = document.createElement('button');
  trigger.type = 'button';
  trigger.className = 'custom-select-trigger';
  trigger.setAttribute('aria-haspopup', 'listbox');
  trigger.setAttribute('aria-expanded', 'false');

  const label = document.createElement('span');
  label.className = 'custom-select-label';

  const caret = document.createElement('span');
  caret.className = 'custom-select-caret';
  caret.textContent = '▾';

  trigger.appendChild(label);
  trigger.appendChild(caret);

  const panel = document.createElement('div');
  panel.className = 'custom-select-panel';
  panel.setAttribute('role', 'listbox');
  panel.setAttribute('aria-label', select.title || select.id || 'Options');

  const updateLabel = () => {
    const activeOption = select.options[select.selectedIndex] || select.options[0];
    const text = activeOption ? activeOption.textContent.trim() : '';
    label.textContent = text;
    trigger.title = text;
  };

  const syncActiveOption = () => {
    panel.querySelectorAll('.custom-select-option').forEach((btn) => {
      const isActive = btn.dataset.value === select.value;
      btn.classList.toggle('active', isActive);
      btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
  };

  const renderOptions = () => {
    panel.innerHTML = '';
    Array.from(select.options).forEach((opt) => {
      const optBtn = document.createElement('button');
      optBtn.type = 'button';
      optBtn.className = 'custom-select-option';
      optBtn.textContent = opt.textContent.trim();
      optBtn.dataset.value = opt.value;
      optBtn.setAttribute('role', 'option');
      optBtn.disabled = !!opt.disabled;

      optBtn.addEventListener('click', () => {
        if (opt.disabled) return;
        if (select.value !== opt.value) {
          select.value = opt.value;
          select.dispatchEvent(new Event('change', { bubbles: true }));
        }
        updateLabel();
        syncActiveOption();
        closeAllCustomSelectDropdowns();
      });

      panel.appendChild(optBtn);
    });
    syncActiveOption();
  };

  trigger.addEventListener('click', (e) => {
    e.stopPropagation();
    const shouldOpen = !wrap.classList.contains('open');
    closeAllCustomSelectDropdowns();
    if (shouldOpen) {
      wrap.classList.add('open');
      trigger.setAttribute('aria-expanded', 'true');
    }
  });

  trigger.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      e.preventDefault();
      closeAllCustomSelectDropdowns();
    }
  });

  select.addEventListener('change', () => {
    updateLabel();
    syncActiveOption();
  });

  wrap.appendChild(trigger);
  wrap.appendChild(panel);
  renderOptions();
  updateLabel();
}

function initCustomSelectDropdowns() {
  enhanceCustomSelectDropdown('imageModel');
  enhanceCustomSelectDropdown('textModelSelect');

  if (!customSelectDropdownEventsBound) {
    document.addEventListener('click', (e) => {

    document.addEventListener('keydown', (e) => {

async function handleMemoryRealtimeSync(snapshot) {
  if (incognitoEnabled) return;

  const localMemories = await getAllMemories();
  const localMap = new Map(localMemories.map((m) => [String(m.id), m]));
  let changed = false;

  for (const change of snapshot.docChanges()) {
    const data = change.doc.data();
    if (!data || !data.id) continue;
    const memoryId = String(data.id);

    if (change.type === 'removed') {
      if (localMap.has(memoryId)) {
        await deleteMemoryLocal(memoryId);
        localMap.delete(memoryId);
        changed = true;
      }
      continue;
    }

    const local = localMap.get(memoryId);
    if (!local) {
      await saveMemoryLocal(data);
      localMap.set(memoryId, data);
      changed = true;
      continue;
    }

    const cloudTs = Number(data.timestamp || 0);
    const localTs = Number(local.timestamp || 0);
    if (cloudTs > localTs) {
      await saveMemoryLocal(data);
      localMap.set(memoryId, data);
      changed = true;
    } else if (localTs > cloudTs) {
      await syncMemoryToCloud(local);
    }
  }

  if (changed) {
    await updateMemoryBadge();
    const panel = document.getElementById('memoryPanel');
    if (panel?.classList.contains('visible')) {
      await renderMemoryList();
    }
  }
}

async function handleRealtimeSync(snapshot) {
  if (incognitoEnabled) return;
  let changed = false;

  for (const change of snapshot.docChanges()) {
    const data = change.doc.data();

    if (change.type === 'removed') {

      const local = sessions[data.id];

        sessions[data.id] = data;
        await saveChatLocal(data);
        changed = true;
      } else {
        const cloudTs = Number(data.timestamp || 0);
        const localTs = Number(local.timestamp || 0);
        if (cloudTs > localTs) {

          await saveChatLocal(data);
          changed = true;
        } else if (localTs > cloudTs) {
          await syncChatToCloud(local);
        }
      }
    }
  }

  if (changed) {
    if (!sessions[currentId] || (sessions[currentId] && sessions[currentId].messages.length === 0 && sessions[currentId].title === "New Chat" && Object.keys(sessions).length > 1)) {
      const sorted = Object.values(sessions).sort((a, b) => b.timestamp - a.timestamp);
      let nextId = sorted[0]?.id;
      
      if (sessions[currentId] && sessions[currentId].messages.length === 0 && sessions[currentId].title === "New Chat" && nextId !== currentId) {
        const dummyId = currentId;
        delete sessions[dummyId];
        await deleteChatFromDB(dummyId);
        await deleteChatFromCloud(dummyId);
        // Recalculate next safely just in case it was the dummy we deleted
        const remaining = Object.values(sessions).sort((a, b) => b.timestamp - a.timestamp);
        nextId = remaining[0]?.id;
      }
      
      if (nextId) {
        await loadChatHandler(nextId);
      } else {
        await newChat();
      }
    } else {
      renderHistory();
      updateHeaderTitle();
      await loadChatMessages();
    }
  }
}

async function syncChats(uid) {
  if (incognitoEnabled) return;
  try {
    const dbF = firebase.firestore();
    const snap = await dbF.collection('users').doc(uid).collection('chats').get();
    
    // Simulate handleRealtimeSync by deducing changes
    let changed = false;
    const cloudIds = new Set();

    for (const d of snap.docs) {
      const data = d.data();
      if (!data || !data.id) continue;
      cloudIds.add(data.id);
      
      if (deletedChatTombstones.has(String(data.id))) continue;

      const local = sessions[data.id];
      if (!local) {
        sessions[data.id] = data;
        await saveChatLocal(data);
        changed = true;
        continue;
      }

      const cloudTs = Number(data.timestamp || 0);
      const localTs = Number(local.timestamp || 0);
      if (cloudTs > localTs) {
        sessions[data.id] = data;
        await saveChatLocal(data);
        changed = true;
      } else if (localTs > cloudTs) {
        await syncChatToCloud(local);
      }
    }

    // Identify chats that are missing from cloud
    const localIds = Object.keys(sessions);
    for (const localId of localIds) {
       if (!cloudIds.has(localId) && !deletedChatTombstones.has(String(localId))) {
          const local = sessions[localId];
        if (local) {
          // Never aggressively delete local chats on transient cloud mismatches.
          await syncChatToCloud(local);
          }
       }
    }

    if (changed) {
      if (!sessions[currentId] || (sessions[currentId] && sessions[currentId].messages.length === 0 && sessions[currentId].title === "New Chat" && Object.keys(sessions).length > 1)) {
        const sorted = Object.values(sessions).sort((a, b) => b.timestamp - a.timestamp);
        let nextId = sorted[0]?.id;
        
        if (sessions[currentId] && sessions[currentId].messages.length === 0 && sessions[currentId].title === "New Chat" && nextId !== currentId) {
          const dummyId = currentId;
          delete sessions[dummyId];
          await deleteChatFromDB(dummyId);
          await deleteChatFromCloud(dummyId);
          const remaining = Object.values(sessions).sort((a, b) => b.timestamp - a.timestamp);
          nextId = remaining[0]?.id;
        }
        
        if (nextId) {
          await loadChatHandler(nextId);
        } else {
          await newChat();
        }
      } else {
        renderHistory();
        updateHeaderTitle();
        await loadChatMessages();
      }
    }
  } catch(e) {
    console.error("Sync error: ", e);
    const msg = String(e?.message || e || '').toLowerCase();
    if (msg.includes('blocked_by_client') || msg.includes('blocked by client')) {
      showStatus('Cloud sync blocked by a browser extension. Local IndexedDB is still working.');
    }
  }
}

async function syncMemories(uid) {
  if (incognitoEnabled) return;
  try {
    const dbF = firebase.firestore();
    const memRef = dbF.collection('users').doc(uid).collection('memories');
    const snap = await memRef.get();

    const localMemories = await getAllMemories();
    const localMap = new Map(localMemories.map((m) => [String(m.id), m]));
    const cloudIds = new Set();
    let changed = false;

    for (const d of snap.docs) {
      const data = d.data();
      if (!data || !data.id) continue;
      const memoryId = String(data.id);
      cloudIds.add(memoryId);

      const local = localMap.get(memoryId);
      if (!local) {
        await saveMemoryLocal(data);
        localMap.set(memoryId, data);
        changed = true;
        continue;
      }

      const cloudTs = Number(data.timestamp || 0);
      const localTs = Number(local.timestamp || 0);
      if (cloudTs > localTs) {
        await saveMemoryLocal(data);
        localMap.set(memoryId, data);
        changed = true;
      } else if (localTs > cloudTs) {
        await syncMemoryToCloud(local);
      }
    }

    for (const local of localMemories) {
      const memoryId = String(local?.id || '');
      if (!memoryId) continue;

    for (const data of localChats) {
      if (!data || !data.id) continue;
      // Do not backup a purely empty dummy chat generated on load unless it has content.
      if (data.messages && data.messages.length === 0 && data.title === "New Chat") continue;
      
      await chatsRef.doc(String(data.id)).set(data, { merge: true });
      backedUpCount++;
    }

    if (showToast) {
      showStatus(`Backed up ${backedUpCount} chat${backedUpCount === 1 ? '' : 's'} to Google.`);
    }
  } catch (e) {
    console.error('Backup error:', e);
    if (showToast) showStatus('Backup failed. Try again.');
  }
}
</script>
</html>
