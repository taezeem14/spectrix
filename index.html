async function resolveMessageContentForDisplay(content) {
  if (!content || typeof content !== 'object') return content;
  if (content.src) return content;
  if (content.cloudUrl) {
    return { ...content, src: content.cloudUrl };
  }
  if (!content.mediaId) return content;

  const mediaId = String(content.mediaId);
  if (mediaObjectUrlById.has(mediaId)) {
    return { ...content, src: mediaObjectUrlById.get(mediaId) };
  }

  const blob = await getMedia(mediaId);
  if (!blob) return content;

  const url = URL.createObjectURL(blob);
  mediaObjectUrlById.set(mediaId, url);
  activeMediaObjectUrls.push(url);
  return { ...content, src: url };
}

function hydrateMediaMessageNode(node, role, content, options = {}) {
  if (!node || !content || typeof content !== 'object') return;
  if (content.src) return;
  if (!content.mediaId && !content.cloudUrl) return;

  const { messageIndex = null } = options;
  resolveMessageContentForDisplay(content)
    .then((resolvedContent) => {
      if (!resolvedContent || resolvedContent === content) return;
      if (!node.isConnected) return;

      const replacement = createChatMessageNode(role, resolvedContent, {
        saveIt: false,
        messageIndex
      });
      if (node.dataset.msgIndex) {
        replacement.dataset.msgIndex = node.dataset.msgIndex;
      }
      node.replaceWith(replacement);
    })
    .catch((error) => {
      console.warn('Media hydration skipped:', error);
    });
}

function createChatMessageNode(role, content, options = {}) {
  const { saveIt = false, messageIndex = null } = options;
  const d = document.createElement("div");
  d.className = "msg " + role;
  let actions = null;
  let resolvedIndex = Number.isInteger(messageIndex) ? messageIndex : null;
  if (!Number.isInteger(resolvedIndex) && saveIt) {
    const session = getCurrentSession();
    if (session?.messages) {
      resolvedIndex = session.messages.length;
    }
  }

  if (typeof content === "object" && content.type === "image") {
    if (!content.src) {
      const pending = document.createElement('div');
      pending.textContent = 'Loading image...';
      d.appendChild(pending);
    } else {
      const img = document.createElement("img");
      img.src = content.src;
      img.className = "ai-img";
      d.appendChild(img);
    }
  }
  else if (typeof content === "object" && content.type === "video") {
    if (!content.src) {
      const pending = document.createElement('div');
      pending.textContent = 'Loading video...';
      d.appendChild(pending);
    } else {
      const video = document.createElement("video");
      video.src = content.src;
      video.controls = true;
      video.autoplay = true;
      video.loop = true;
      video.style.maxWidth = "100%";
      video.style.borderRadius = "12px";
      d.appendChild(video);
    }
  }
  else {
    if (window.marked) {
      d.innerHTML = renderMarkdownSafely(content);
      promoteInlineCodeMath(d);
    }
    else {
      d.textContent = String(content);
    }
    renderMath(d);
  }

  if (role === "user" && typeof content === "string") {
    actions = document.createElement("div");
    actions.className = "msg-actions";

    const editBtn = document.createElement("button");
    editBtn.className = "msg-btn edit-btn";
    editBtn.textContent = "Edit";
    editBtn.onclick = () => {
      editMessage(resolvedIndex, content);
    };

    const branchBtn = document.createElement("button");
    branchBtn.className = "msg-btn edit-btn";
    branchBtn.textContent = "Branch";
    branchBtn.onclick = () => {
      branchConversationFromMessage(resolvedIndex);
    };

    actions.appendChild(editBtn);
    actions.appendChild(branchBtn);
  }

  if (role === "bot" && typeof content === "string") {
    actions = document.createElement("div");
    actions.className = "msg-actions";

    const retryBtn = document.createElement("button");
    retryBtn.className = "msg-btn retry-btn";
    retryBtn.textContent = "Retry";
    retryBtn.onclick = () => {
      retryMessageAt(resolvedIndex);
    };

    actions.appendChild(retryBtn);
  }

  queueCodeBlockEnhancement(d);

  const t = document.createElement("div");
  t.className = "timestamp";
  t.textContent = time();
  if (actions) {
    const meta = document.createElement("div");
    meta.className = "msg-meta";
    meta.appendChild(t);
    meta.appendChild(actions);
    d.appendChild(meta);
  } else {
    d.appendChild(t);
  }

  if (Number.isInteger(resolvedIndex)) {
    d.dataset.msgIndex = String(resolvedIndex);
    const currentHighlights = tldrHighlightsBySession.get(getTldrSessionKey()) || new Set();
    if (currentHighlights.has(resolvedIndex)) {
      d.classList.add('tldr-key-highlight');
    }
  }

  return d;
}

function resetChatWindowing() {
  chatWindowState.enabled = false;
  chatWindowState.sessionId = '';
  chatWindowState.start = 0;
  chatWindowState.end = -1;
  chatWindowingBusy = false;
}

async function renderChatWindowSlice(session, start, end, options = {}) {
  const { stickToBottom = false } = options;
  chat.innerHTML = '';

  const safeStart = Math.max(0, Number(start || 0));
  const safeEnd = Math.min(session.messages.length - 1, Number(end || 0));
  const fragment = document.createDocumentFragment();

  for (let idx = safeStart; idx <= safeEnd; idx += 1) {
    const message = session.messages[idx];
    const node = createChatMessageNode(message.role, message.content, { saveIt: false, messageIndex: idx });
    node.dataset.msgIndex = String(idx);
    fragment.appendChild(node);
    hydrateMediaMessageNode(node, message.role, message.content, { messageIndex: idx });

    if ((idx - safeStart + 1) % 12 === 0) {
      await new Promise((resolve) => requestAnimationFrame(resolve));
    }
  }

  chat.appendChild(fragment);
  refreshCurrentTldrHighlights();
  chatWindowState.enabled = true;
  chatWindowState.sessionId = String(session.id || '');
  chatWindowState.start = safeStart;
  chatWindowState.end = safeEnd;

  if (stickToBottom) {
    scrollToBottom();
  }
}

async function maybeUpdateChatWindowing() {
  if (!chatWindowState.enabled || chatWindowingBusy) return;

  const session = sessions[chatWindowState.sessionId];
  if (!session || !Array.isArray(session.messages)) return;
  if (session.messages.length <= CHAT_WINDOW_THRESHOLD) return;

  const nearTop = chat.scrollTop <= CHAT_WINDOW_EDGE_PX;
  const nearBottom = (chat.scrollHeight - (chat.scrollTop + chat.clientHeight)) <= CHAT_WINDOW_EDGE_PX;
  if (!nearTop && !nearBottom) return;

  chatWindowingBusy = true;
  try {
    const total = session.messages.length;

    if (nearTop && chatWindowState.start > 0) {
      const oldHeight = chat.scrollHeight;
      const oldTop = chat.scrollTop;
      const nextStart = Math.max(0, chatWindowState.start - CHAT_WINDOW_CHUNK);
      const nextEnd = Math.min(total - 1, nextStart + CHAT_WINDOW_MAX_DOM - 1);
      await renderChatWindowSlice(session, nextStart, nextEnd);
      const delta = chat.scrollHeight - oldHeight;
      chat.scrollTop = Math.max(0, oldTop + delta);
      return;
    }

    if (nearBottom && chatWindowState.end < total - 1) {
      const nextEnd = Math.min(total - 1, chatWindowState.end + CHAT_WINDOW_CHUNK);
      const nextStart = Math.max(0, nextEnd - CHAT_WINDOW_MAX_DOM + 1);
      await renderChatWindowSlice(session, nextStart, nextEnd, { stickToBottom: true });
    }
  } finally {
    chatWindowingBusy = false;
  }
}

function scheduleChatWindowingUpdate() {
  if (!chatWindowState.enabled || chatWindowingRaf) return;
  chatWindowingRaf = requestAnimationFrame(() => {
    chatWindowingRaf = 0;
    maybeUpdateChatWindowing().catch((err) => console.warn('Chat window update skipped:', err));
  });
}

async function loadChatMessages() {
  hideChatSearchBar();
  cleanupActiveMediaUrls();
  resetChatWindowing();
  chat.innerHTML = "";
  const baseSession = getCurrentSession();
  if (!baseSession) return;
  const session = await ensureSessionMessagesLoaded(baseSession.id);
  if (!session) return;

  const totalMessages = Array.isArray(session.messages) ? session.messages.length : 0;
  if (totalMessages === 0) return;

  if (totalMessages > CHAT_WINDOW_THRESHOLD) {
    const start = Math.max(0, totalMessages - CHAT_WINDOW_MAX_DOM);
    const end = totalMessages - 1;
    await renderChatWindowSlice(session, start, end, { stickToBottom: true });
    return;
  }

  const fragment = document.createDocumentFragment();
  for (let idx = 0; idx < totalMessages; idx += 1) {
    const message = session.messages[idx];
    const node = createChatMessageNode(message.role, message.content, { saveIt: false, messageIndex: idx });
    fragment.appendChild(node);
    hydrateMediaMessageNode(node, message.role, message.content, { messageIndex: idx });

    if ((idx + 1) % 14 === 0) {
      await new Promise((resolve) => requestAnimationFrame(resolve));
    }
  }

  chat.appendChild(fragment);
  refreshCurrentTldrHighlights();
  scrollToBottom();
}

      okText: 'Delete',
      dontAskAgainKey: DELETE_CONFIRM_SKIP_KEY
    });

  }

  deletedChatTombstones.add(String(id));
  persistDeletedChatTombstones();
  
  await deleteChatFromDB(id);
  await deleteChatFromCloud(id);
  delete sessions[id];
  
  if (id === currentId) {
    const remaining = Object.keys(sessions);
    if (remaining.length > 0) {
      await loadChatHandler(remaining[0]);
    } else {
      await newChat();
    }
  }
  renderHistory();
}

function runTldrShortcut(mode = 'bullets') {
  if (!input) return;
  const normalizedMode = String(mode || 'bullets').toLowerCase();
  if (normalizedMode === 'short' || normalizedMode === 'keypoints' || normalizedMode === 'bullets') {
    input.value = `/tldr ${normalizedMode}`;
  } else {
    input.value = '/tldr';
  }
  charCounter.textContent = `${input.value.length} chars`;
  charCounter.style.color = "var(--muted)";
  send();
}

function normalizeTldrMode(mode) {
  const value = String(mode || '').toLowerCase().trim();
  if (value === 'short' || value === 'bullets' || value === 'keypoints') return value;
  return 'bullets';
}

function parseTldrCommand(rawInput) {
  const text = String(rawInput || '').trim();
  if (!text.toLowerCase().startsWith('/tldr')) return null;

  const tokens = text.split(/\s+/).slice(1);
  let mode = 'bullets';
  let windowSize = TLDR_DEFAULT_WINDOW;

  tokens.forEach((token) => {
    const lower = String(token || '').toLowerCase().trim();
    if (!lower) return;
    if (/^\d{1,3}$/.test(lower)) {
      windowSize = Number.parseInt(lower, 10);
      return;
    }
    mode = normalizeTldrMode(lower);
  });

  const clampedWindow = Math.max(TLDR_MIN_WINDOW, Math.min(TLDR_MAX_WINDOW, windowSize));
  return {
    mode,
    windowSize: clampedWindow
  };
}

function getTldrSessionKey(sessionId = currentId) {
  return String(sessionId || '');
}

function saveTldrSummaryForSession(sessionId, payload) {
  const key = getTldrSessionKey(sessionId);
  if (!key || !payload?.summary) return;
  tldrSummaryBySession.set(key, {
    summary: String(payload.summary || ''),
    mode: normalizeTldrMode(payload.mode),
    analyzedMessages: Number(payload.analyzedMessages || 0),
    timestamp: Date.now()
  });
}

function getLatestTldrSummaryForSession(sessionId = currentId) {
  const key = getTldrSessionKey(sessionId);
  if (!key) return null;
  return tldrSummaryBySession.get(key) || null;
}

async function copyTextPortable(text) {
  const value = String(text || '');
  if (!value) return false;

  if (navigator.clipboard && window.isSecureContext) {
    try {
      await navigator.clipboard.writeText(value);
      return true;
    } catch {
      // Continue to fallback.
    }
  }

  const ta = document.createElement('textarea');
  ta.value = value;
  ta.setAttribute('readonly', '');
  ta.style.position = 'fixed';
  ta.style.top = '-1000px';
  ta.style.left = '-1000px';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  ta.setSelectionRange(0, ta.value.length);
  let copied = false;
  try {
    copied = document.execCommand('copy');
  } catch {
    copied = false;
  }
  document.body.removeChild(ta);
  return copied;
}

async function copyLatestTldrSummary() {

  let stored = getLatestTldrSummaryForSession(session.id);

    stored = {
      summary: generated.summary,
      mode: generated.meta.mode,
      analyzedMessages: generated.meta.windowAnalyzed
    };
    saveTldrSummaryForSession(session.id, stored);
  }

  const ok = await copyTextPortable(stored.summary);
  showStatus(ok ? 'TL;DR copied to clipboard.' : 'Could not copy TL;DR on this device.');
}

      analyzedMessages: generated.meta.windowAnalyzed
    };

  const blob = new Blob([stored.summary], { type: 'text/markdown' });

// ===== EXPORT/IMPORT =====
function slugifyFilename(inputName, fallback = 'chat') {
  const clean = String(inputName || '')
    .trim()
    .replace(/[^a-z0-9]+/gi, '_')
    .replace(/^_+|_+$/g, '');
  return clean || fallback;
}

function downloadBlob(blob, fileName) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  a.click();
  URL.revokeObjectURL(url);
}

function buildSessionTranscriptText(session) {
  if (!session) return '';
  const lines = [];
  lines.push(`# ${session.title || 'New Chat'}`);
  lines.push('');

  session.messages.forEach((m) => {
    const who = m.role === 'bot' ? 'SPECTRIX' : 'YOU';
    if (typeof m.content === 'string') {
      lines.push(`**${who}:**`);
      lines.push(m.content);
      lines.push('');
      return;
    }

    const mediaType = String(m?.content?.type || 'media').toUpperCase();
    lines.push(`**${who}:**`);
    lines.push(`[${mediaType}]`);
    lines.push('');
  });

  return lines.join('\n');
}

const TLDR_STOPWORDS = new Set([
  'the', 'a', 'an', 'and', 'or', 'to', 'of', 'in', 'on', 'for', 'with', 'from',
  'is', 'are', 'was', 'were', 'be', 'been', 'being', 'it', 'this', 'that', 'these',
  'those', 'as', 'at', 'by', 'if', 'then', 'than', 'but', 'so', 'can', 'could',
  'should', 'would', 'will', 'just', 'into', 'about', 'over', 'under', 'after',
  'before', 'you', 'your', 'yours', 'i', 'my', 'mine', 'we', 'our', 'ours', 'they',
  'their', 'theirs', 'he', 'she', 'his', 'her', 'hers', 'them', 'me', 'us',
  'have', 'has', 'had', 'do', 'does', 'did', 'not', 'no',
  'also', 'even', 'just', 'very', 'much', 'more', 'most',
  'some', 'any', 'all', 'each', 'when', 'where', 'what',
  'which', 'who', 'how', 'why', 'get', 'got', 'let', 'like',
  'make', 'made', 'know', 'think', 'want', 'need', 'use',
  'used', 'using', 'see', 'look', 'come', 'go', 'take',
  'give', 'work', 'way', 'thing', 'time', 'here', 'there'
]);

function truncateText(value, maxLen = 160) {
  const text = String(value || '').replace(/\s+/g, ' ').trim();
  if (text.length <= maxLen) return text;
  return `${text.slice(0, maxLen - 1).trimEnd()}...`;
}

function extractTldrKeywords(messages, limit = 6) {
  const freq = new Map();

  messages.forEach((text) => {
    const words = String(text || '')
      .toLowerCase()
      .replace(/[^a-z0-9 ]+/g, ' ')
      .split(/\s+/)
      .filter((word) => word.length >= 4 && !TLDR_STOPWORDS.has(word));

    words.forEach((word) => {
      freq.set(word, (freq.get(word) || 0) + 1);
    });
  });

  return Array.from(freq.entries())
    .sort((a, b) => b[1] - a[1])
    .slice(0, limit)
    .map(([word]) => word);
}

function sentencePreview(text) {
  const input = String(text || '').trim();
  if (!input) return '';
  return input.split(/(?<=[.!?])\s+/)[0] || input;
}

function scoreTldrMessage(text, role, keywordSet) {
  const raw = String(text || '').trim();
  if (!raw) return 0;

  const normalized = raw.toLowerCase().replace(/[^a-z0-9 ]+/g, ' ');
  const words = normalized.split(/\s+/).filter(Boolean);

  let score = 0;
  score += Math.min(4, words.length / 16);
  if (raw.includes('?')) score += 1.8;
  if (role === 'user') score += 0.7;
  if (/\b(need|want|goal|issue|bug|problem|build|create|fix|implement|plan|roadmap|priority)\b/.test(normalized)) {
    score += 2.2;
  }
  if (/```/.test(raw)) score += 1.2;

  const keywordHits = words.filter((w) => w.length >= 4 && keywordSet.has(w)).length;
  score += Math.min(3, keywordHits * 0.45);
  return score;
}

function refreshCurrentTldrHighlights() {
  const sessionKey = getTldrSessionKey();
  const indices = tldrHighlightsBySession.get(sessionKey) || new Set();

  chat.querySelectorAll('.msg.tldr-key-highlight').forEach((node) => {
    node.classList.remove('tldr-key-highlight');
  });

  if (!indices.size) return;

  chat.querySelectorAll('.msg[data-msg-index]').forEach((node) => {
    const idx = Number.parseInt(String(node.dataset.msgIndex || ''), 10);
    if (Number.isInteger(idx) && indices.has(idx)) {
      node.classList.add('tldr-key-highlight');
    }
  });
}

function applyTldrHighlightsForCurrentSession(indices = []) {
  const sessionKey = getTldrSessionKey();
  if (!sessionKey) return;

  const next = new Set((Array.isArray(indices) ? indices : [])
    .map((n) => Number(n))
    .filter((n) => Number.isInteger(n) && n >= 0));

  if (next.size) {
    tldrHighlightsBySession.set(sessionKey, next);
  } else {
    tldrHighlightsBySession.delete(sessionKey);
  }

  refreshCurrentTldrHighlights();
}

function maybeSuggestTldrForSession(session) {
  if (!session || !Array.isArray(session.messages)) return;

  const sessionKey = getTldrSessionKey(session.id);
  if (!sessionKey) return;

  const eligibleCount = session.messages.filter((msg) => (
    typeof msg?.content === 'string' && !/^\/tldr\b/i.test(String(msg.content).trim())
  )).length;

  if (eligibleCount < TLDR_AUTO_SUGGEST_MIN_MESSAGES) return;

  const lastSummary = getLatestTldrSummaryForSession(session.id);
  if (lastSummary && (eligibleCount - Number(lastSummary.analyzedMessages || 0) < 12)) return;

  const lastCheckpoint = Number(tldrSuggestCheckpointBySession.get(sessionKey) || 0);
  if (eligibleCount - lastCheckpoint < TLDR_AUTO_SUGGEST_REPEAT_GAP) return;

  tldrSuggestCheckpointBySession.set(sessionKey, eligibleCount);
  showStatus('This convo is getting long. Want a TL;DR? Try /tldr, /tldr short, /tldr bullets, or /tldr keypoints.', 5200);
}

function buildChatTldr(session, options = {}) {
  const mode = normalizeTldrMode(options.mode || 'bullets');
  const requestedWindow = Number(options.windowSize || TLDR_DEFAULT_WINDOW);
  const windowSize = Math.max(TLDR_MIN_WINDOW, Math.min(TLDR_MAX_WINDOW, requestedWindow));

  const entries = (Array.isArray(session?.messages) ? session.messages : [])
    .map((msg, idx) => ({ msg, idx }))
    .filter((entry) => typeof entry.msg?.content === 'string')
    .filter((entry) => !/^\/tldr\b/i.test(String(entry.msg.content).trim()));

  if (!entries.length) {
    return {
      summary: '### TL;DR\n- No chat content yet. Send a few messages first, then run `/tldr`.',
      highlightIndices: [],
      meta: { mode, windowAnalyzed: 0 }
    };
  }

  const windowed = entries.slice(-windowSize);
  const userMessages = windowed.filter((entry) => entry.msg.role === 'user').map((entry) => String(entry.msg.content || ''));
  const botMessages = windowed.filter((entry) => entry.msg.role === 'bot').map((entry) => String(entry.msg.content || ''));
  const keywords = extractTldrKeywords([...userMessages, ...botMessages], 7);
  const keywordSet = new Set(keywords);

  const scored = windowed.map((entry) => ({
    ...entry,
    score: scoreTldrMessage(entry.msg.content, entry.msg.role, keywordSet),
    preview: truncateText(sentencePreview(entry.msg.content), 140)
  }));

  const ranked = [...scored].sort((a, b) => b.score - a.score);
  const highlightEntries = ranked.slice(0, Math.min(4, ranked.length)).sort((a, b) => a.idx - b.idx);
  const highlightIndices = highlightEntries.map((entry) => entry.idx);

  const latestUser = truncateText(sentencePreview(userMessages[userMessages.length - 1] || ''), 150);
  const latestBot = truncateText(sentencePreview(botMessages[botMessages.length - 1] || ''), 150);
  const topicText = keywords.length ? keywords.join(', ') : 'general discussion';

  const lines = [];

  if (mode === 'short') {
    lines.push('### TL;DR (Short)');
    lines.push(`- Focus: ${topicText}.`);
    if (latestUser) lines.push(`- Latest ask: ${latestUser}`);
    if (latestBot) lines.push(`- Latest outcome: ${latestBot}`);
  } else if (mode === 'keypoints') {
    lines.push('### TL;DR (Keypoints)');
    lines.push(`1. Conversation focus: ${topicText}.`);
    lines.push(`2. Window analyzed: ${windowed.length} messages.`);
    if (latestUser) lines.push(`3. Current user direction: ${latestUser}`);
    if (latestBot) lines.push(`4. Most recent assistant output: ${latestBot}`);
    highlightEntries.slice(0, 2).forEach((entry, i) => {
      const role = entry.msg.role === 'bot' ? 'Spectrix' : 'You';
      lines.push(`${lines.length + 1}. Key moment ${i + 1} (${role}): ${entry.preview}`);
    });
  } else {
    lines.push('### TL;DR (Bullets)');
    lines.push(`- Window analyzed: ${windowed.length} messages (${userMessages.length} from you, ${botMessages.length} from Spectrix).`);
    lines.push(`- Main topics: ${topicText}.`);
    lines.push('- Key highlights:');
    highlightEntries.forEach((entry) => {
      const role = entry.msg.role === 'bot' ? 'Spectrix' : 'You';
      lines.push(`  - ${role}: ${entry.preview}`);
    });
  }

  lines.push('');
  lines.push('> Key messages in the current chat are highlighted in green.');
  lines.push('> Actions: use Quick Actions for Copy last TL;DR or Download last TL;DR.');
  lines.push('> Tip: `/tldr short`, `/tldr bullets`, `/tldr keypoints`, `/tldr 40`');

  return {
    summary: lines.join('\n'),
    highlightIndices,
    meta: {
      mode,
      windowAnalyzed: windowed.length,
      topics: keywords
    }
  };
}

const PDF_TEXT_REPLACEMENTS = new Map([
  ['\u2018', "'"],
  ['\u2019', "'"],
  ['\u201C', '"'],
  ['\u201D', '"'],
  ['\u2013', '-'],
  ['\u2014', '-'],
  ['\u2026', '...'],
  ['\u00A0', ' ']
]);

function normalizePdfExportText(value) {
  let text = String(value || '');
  if (!text) return '';

  if (typeof text.normalize === 'function') {
    text = text.normalize('NFKC');
  }

  PDF_TEXT_REPLACEMENTS.forEach((next, prev) => {
    text = text.split(prev).join(next);
  });

  // Remove control chars and invisible separators that break PDF text shaping.
  text = text
    .replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g, '')
    .replace(/[\u200B-\u200D\uFEFF]/g, '')
    .replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, '')
    .replace(/\t/g, '  ');

  // NOTE: jsPDF core fonts are Latin-1 only. Non-Latin characters
  // (CJK, Arabic, Cyrillic, etc.) are replaced with '?' intentionally.
  // To support full Unicode, switch to a jsPDF unicode font plugin.
  text = Array.from(text).map((ch) => {
    const code = ch.charCodeAt(0);
    return code <= 255 ? ch : '?';
  }).join('');

  return text
    .replace(/\r\n/g, '\n')
    .split('\n')
    .map((line) => line.replace(/ {2,}/g, ' ').trimEnd())
    .join('\n')
    .trim();
}

function exportChat() {
  const session = getCurrentSession();
  if (!session) return;
  const text = buildSessionTranscriptText(session);
  
  const blob = new Blob([text], { type: "text/markdown" });
  downloadBlob(blob, `${slugifyFilename(session.title)}.md`);

async function exportChatPdf() {
  const session = getCurrentSession();
  if (!session) return;

  const ready = await ensurePdfExportRuntimeLoaded({ timeoutMs: 3600, silent: false });
  if (!ready || !window.jspdf?.jsPDF) {
    showStatus('PDF export runtime unavailable right now.');
    return;
  }

  const transcriptRaw = buildSessionTranscriptText(session)
    .replace(/\*\*/g, '')
    .replace(/^#\s+/gm, '');
  const transcript = normalizePdfExportText(transcriptRaw);
  const safeTitle = normalizePdfExportText(session.title || 'Spectrix Chat Export') || 'Spectrix Chat Export';

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  doc.setCharSpace(0);
  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();
  const marginX = 42;
  const marginY = 46;
  const maxWidth = pageWidth - (marginX * 2);
  const lineHeight = 15;
  let y = marginY;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.text(safeTitle, marginX, y);
  y += 24;

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(11);
  const lines = doc.splitTextToSize(transcript, maxWidth);
  for (const line of lines) {
    if (y > pageHeight - marginY) {
      doc.addPage();
      y = marginY;
    }
    doc.text(line, marginX, y);
    y += lineHeight;
  }

  doc.save(`${slugifyFilename(session.title)}.pdf`);
  showStatus('Chat exported as PDF.');
}

function buildSessionExportParagraphs(session) {
  const out = [];
  session.messages.forEach((m) => {
    const who = m.role === 'bot' ? 'SPECTRIX' : 'YOU';
    if (typeof m.content === 'string') {
      const chunks = String(m.content).split(/\n{2,}/);
      chunks.forEach((chunk, idx) => {
        const text = chunk.trim();
        if (!text) return;
        if (idx === 0) out.push(`${who}: ${text}`);
        else out.push(text);
      });
      out.push('');
      return;
    }
    const mediaType = String(m?.content?.type || 'media').toUpperCase();
    out.push(`${who}: [${mediaType}]`);
    out.push('');
  });
  return out;
}

async function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      const shouldImport = await showAppConfirm("Import chats? This will merge with existing chats.", {
        title: 'Import Chats',
        okText: 'Import'
      });
      if (shouldImport) {
        let skipped = 0;
        for (const id in imported) {
          const entry = imported[id];
          const isValid =
            entry &&
            typeof entry.id === 'string' && entry.id.trim() &&
            typeof entry.title === 'string' &&
            Array.isArray(entry.messages);
          if (!isValid) {
            skipped += 1;
            continue;
          }
          if (!sessions[id]) {
            sessions[id] = entry;
            await saveChat(entry);
          } else {
            const newId = Date.now().toString() + Math.floor(Math.random() * 1000);
            entry.id = newId;
            sessions[newId] = entry;
            await saveChat(entry);
          }
        }
        if (skipped > 0) {
          showStatus(`Skipped ${skipped} invalid chat entr${skipped === 1 ? 'y' : 'ies'} during import.`, 3200);
        }
        renderHistory();
        await showAppAlert("✅ Chats imported successfully!", 'Import Complete');
      }
    } catch {
      await showAppAlert("❌ Invalid file format!", 'Import Failed');
    }
  };
  reader.readAsText(file);
}

function editTitle() {

  };

function isChatNearBottom(threshold = AUTO_SCROLL_NEAR_BOTTOM_PX) {
  if (!chat) return true;
  return chat.scrollHeight - chat.scrollTop - chat.clientHeight < threshold;
}

function scrollChatToLatest({ smooth = false, force = false } = {}) {
  if (!chat) return;
  if (!force && !autoScrollToLatest) return;

  const now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
  if (smooth && !force && now - lastAutoScrollTs < 120) return;
  lastAutoScrollTs = now;

  const targetTop = chat.scrollHeight - chat.clientHeight;
  if (Math.abs(targetTop - chat.scrollTop) < 2) return;

  if (smooth) {
    chat.scrollTo({ top: targetTop, behavior: "smooth" });
    return;
  }

  if (force) {
    chat.scrollTop = targetTop;
    return;
  }

  if (pendingChatAutoScrollRaf) return;
  pendingChatAutoScrollRaf = requestAnimationFrame(() => {
    pendingChatAutoScrollRaf = 0;
    const latestTop = chat.scrollHeight - chat.clientHeight;
    if (latestTop - chat.scrollTop > 1) {
      chat.scrollTop = latestTop;
    }
  });
}

function scrollToBottom() {
  autoScrollToLatest = true;
  scrollChatToLatest({ smooth: !isGenerating, force: true });
}

function normalizeCodeFenceMarkup(text) {
  let normalized = String(text || '');

  // Convert triple-quote style fences to markdown fences.
  normalized = normalized
    .replace(/^[ \t]*[“”"']{0,2}"""\s*([a-zA-Z0-9_#+.-]+)\s+([^\n]+)$/gm, '```$1\n$2')
    .replace(/^[ \t]*[“”"']{0,2}"""\s*([a-zA-Z0-9_#+.-]+)?\s*[“”"']{0,2}[ \t]*$/gm, (match, lang) => `\`\`\`${lang || ''}`)
    .replace(/^[ \t]*[“”"']{0,2}'''\s*([a-zA-Z0-9_#+.-]+)\s+([^\n]+)$/gm, '```$1\n$2')
    .replace(/^[ \t]*[“”"']{0,2}'''\s*([a-zA-Z0-9_#+.-]+)?\s*[“”"']{0,2}[ \t]*$/gm, (match, lang) => `\`\`\`${lang || ''}`);

  // Remove stray quotes directly attached to markdown fences.
  normalized = normalized
    .replace(/(^|\n)[ \t]*[“”"']+\s*```/g, '$1```')
    .replace(/```[ \t]*[“”"']+(?=\s*(\n|$))/g, '```')
    .replace(/^[ \t]*[“”"']+\s*```([a-zA-Z0-9_#+.-]*)\s*[“”"']+[ \t]*$/gm, '```$1');

  return normalized;
}

function normalizeFenceBoundaryLines(text) {
  const lines = String(text || '').replace(/\r\n/g, '\n').split('\n');
  const output = [];
  let inFence = false;

  for (const line of lines) {
    const trimmedStart = line.trimStart();
    const indent = line.slice(0, line.length - trimmedStart.length);

    if (!trimmedStart.startsWith('```')) {
      output.push(line);
      continue;
    }

    const rest = trimmedStart.slice(3);

    // If we are already inside a fence and the line is like
    // "``` Then run...", treat it as a closing fence followed by text.
    if (inFence && rest.trim()) {
      output.push(indent + '```');
      output.push(indent + rest.trimStart());
      inFence = false;
      continue;
    }

    output.push(line);
    inFence = !inFence;
  }

  return output.join('\n');
}

function mergeAdjacentCodeFences(text) {
  let output = String(text || '');
  const adjacentFencePattern = /```([a-zA-Z0-9_#+.-]*)[ \t]*\n([\s\S]*?)\n```[ \t]*\n(?:[ \t]*\n)*```([a-zA-Z0-9_#+.-]*)[ \t]*\n([\s\S]*?)\n```/g;
  const labeledFencePattern = /```([a-zA-Z0-9_#+.-]*)[ \t]*\n([\s\S]*?)\n```[ \t]*\n(?:[ \t]*\n)*(?:[ \t]*(?:#{1,6}[ \t]*)?(?:\*\*|__)?(?:example(?:[ \t]+usage)?|usage(?:[ \t]+example)?|output|result|demo|sample)\b[^`\n]*(?:\*\*|__)?[ \t]*\n)(?:[ \t]*\n)*```([a-zA-Z0-9_#+.-]*)[ \t]*\n([\s\S]*?)\n```/gi;
  const bridgeFencePattern = /```([a-zA-Z0-9_#+.-]*)[ \t]*\n([\s\S]*?)\n```[ \t]*\n(?:[ \t]*\n)*(?:[ \t]*(?:(?:#{1,6}[ \t]*)?(?:\*\*|__)?[A-Za-z][^`\n]{0,90}(?:\*\*|__)?|[-*][ \t]+[^`\n]{0,90}|>[ \t]*[^`\n]{0,90})[ \t]*\n){1,4}(?:[ \t]*\n)*```([a-zA-Z0-9_#+.-]*)[ \t]*\n([\s\S]*?)\n```/g;

  const mergeFencePair = (match, leftLang, leftBody, rightLang, rightBody) => {
    const left = String(leftLang || '').trim().toLowerCase();
    const right = String(rightLang || '').trim().toLowerCase();

    // Merge when both fences are same language, or one side is unlabeled.
    if (left && right && left !== right) return match;

    const mergedLang = left || right;
    return `\`\`\`${mergedLang}\n${leftBody}\n\n${rightBody}\n\`\`\``;
  };

  let previous = '';
  let iterations = 0;
  while (output !== previous && iterations < 3) {
    previous = output;
    output = output.replace(adjacentFencePattern, mergeFencePair);
    output = output.replace(labeledFencePattern, mergeFencePair);
    output = output.replace(bridgeFencePattern, mergeFencePair);
    iterations += 1;
  }

  return output;
}

function preprocess(text) {
  const normalizedText = mergeAdjacentCodeFences(normalizeFenceBoundaryLines(normalizeCodeFenceMarkup(text)))
    .replace(/\[CODE\]/gi, '```')
    .replace(/\[\/CODE\]/gi, '```')
    .replace(/\[code\s+lang=["']?(\w+)["']?\]/gi, '```$1')
    .replace(/[“”]\s*```/g, '```')
    .replace(/```\s*[“”]/g, '```')
    .replace(/([^\n])\s*```(?=\s|$)/g, '$1\n```')
    .replace(/<\/?(s|del|strike)>/gi, "");

  return normalizeMathMarkup(normalizedText);
}

function looksLikeMathExpression(value) {
  if (!value) return false;
  const v = String(value).trim();
  if (!v) return false;

  if (/\\(frac|sqrt|sum|int|prod|lim|theta|alpha|beta|gamma|Delta|lambda|pi|sin|cos|tan)/i.test(v)) return true;
  if (/[∫∑∏√∞≈≤≥≠π]/.test(v)) return true;
  if (/\b[a-zA-Z]\s*\^\s*\d+\b/.test(v)) return true;
  if (/\b[a-zA-Z]\s*_\s*[a-zA-Z0-9]+\b/.test(v)) return true;
  if (/\b(d\/dx|dy\/dx|dx|dy|dz)\b/i.test(v)) return true;
  if (/\$\$?[\s\S]*\$\$?/.test(v)) return true;

  return false;
}

function normalizeMathMarkup(text) {
  if (!text) return text;

  let normalized = String(text);

  // Fix common AI LaTeX mistakes: square brackets used where curly braces are required.
  // \frac[a][b] → \frac{a}{b}  (all four mixed-bracket combos)
  normalized = normalized.replace(/\\frac\[([^\]\n]*)\]\[([^\]\n]*)\]/g, '\\frac{$1}{$2}');
  normalized = normalized.replace(/\\frac\{([^}\n]*)\}\[([^\]\n]*)\]/g, '\\frac{$1}{$2}');
  normalized = normalized.replace(/\\frac\[([^\]\n]*)\]\{([^}\n]*)\}/g, '\\frac{$1}{$2}');
  // _[x] → _{x}  and  ^[x] → ^{x}  (subscript / superscript with square brackets)
  normalized = normalized.replace(/([_^])\[([^\]\n]*)\]/g, '$1{$2}');
  // _{x]  →  _{x}  and  ^{x]  →  ^{x}  (mismatched closing bracket)
  normalized = normalized.replace(/([_^])\{([^{}\]\n]*)\]/g, '$1{$2}');

  // Convert block math \[...\] → $$...$$ as a single-pass (captures full block,
  // prevents the two-pass approach from leaving dangling delimiters on malformed input)
  normalized = normalized.replace(/\\\[([\s\S]+?)\\\]/g, (_, c) => '$$' + c.trim() + '$$');
  // Convert inline math \(...\) → $...$
  normalized = normalized.replace(/\\\(([\s\S]+?)\\\)/g, (_, c) => '$' + c.trim() + '$');

  // Promote inline code `...` to $...$ if it looks like math
  normalized = normalized.replace(/`([^`\n]+)`/g, (full, inner) => {
    if (!looksLikeMathExpression(inner)) return full;
    const candidate = inner.trim().replace(/^\$+|\$+$/g, '');
    return `$${candidate}$`;
  });

  // Shield already-delimited math before the rescue pass so the rescue regex
  // cannot double-wrap content that is already inside $$...$$ or $...$.
  // (Double-wrapping previously caused $$\n$$\int...\n$$\n$$ which breaks shielding.)
  const rescueStore = [];
  let safe = normalized;
  safe = safe.replace(/\$\$([\s\S]+?)\$\$/g, (match) => {
    rescueStore.push(match);
    return '\x02R' + (rescueStore.length - 1) + '\x03';
  });
  safe = safe.replace(/\$([^\$\n]+?)\$/g, (match) => {
    rescueStore.push(match);
    return '\x02R' + (rescueStore.length - 1) + '\x03';
  });

  // Rescue bare LaTeX commands at the start of a line (unshielded text only)
  safe = safe.replace(/(^|\n)([ \t]*(?:[-*] )?)(\\(?:int|sum|prod|frac|sqrt|lim|big[lrmb]?|left|right|begin|end|text|binom|log|ln|exp|sin|cos|tan|sec|csc|cot|theta|alpha|beta|gamma|Delta|delta|lambda|pi|sigma|omega|infty|partial|nabla|forall|exists|mathbb|mathcal|mathrm|mathbf|overline|underline|vec|hat|bar|dot|ddot|tilde|cdot|times|div|pm|leq|geq|neq|approx|equiv|subset|supset|cup|cap|in|notin|to|mapsto|implies|iff|quad|qquad|hbar|ell|Re|Im|det|ker|hom|deg|arg|dim|sup|limsup|liminf|max|min|gcd|pmod|bmod|not|neg|oplus|otimes|langle|rangle|lceil|rceil|lfloor|rfloor|varphi|varepsilon|varnothing)\b[^\n]*)(?=\n|$)/gi, (full, lead, indent, expr) => {
    return `${lead}${indent}$$${expr.trim()}$$`;
  });

  // Rescue \begin{...}...\end{...} environments (unshielded text only)
  safe = safe.replace(/(^|\n)([ \t]*)(\\begin\{[^}]+\}[\s\S]*?\\end\{[^}]+\})(?=\n|$)/g, (full, lead, indent, expr) => {
    return `${lead}${indent}$$${expr.trim()}$$`;
  });

  // Restore the shielded blocks
  for (let i = 0; i < rescueStore.length; i++) {
    safe = safe.split('\x02R' + i + '\x03').join(rescueStore[i]);
  }

  return safe;
}

function promoteInlineCodeMath(container) {
  if (!container) return;

  const codeNodes = container.querySelectorAll('code');
  codeNodes.forEach((node) => {
    if (node.closest('pre')) return;

    const raw = (node.textContent || '').trim();
    if (!looksLikeMathExpression(raw)) return;

    const cleaned = raw.replace(/^\$+|\$+$/g, '');
    const replacement = document.createTextNode(`$${cleaned}$`);
    node.replaceWith(replacement);
  });
}

function sanitizeMarkdownHtml(rawHtml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(`<div>${rawHtml}</div>`, 'text/html');
  const root = doc.body.firstElementChild;
  if (!root) return '';

  const sanitizeNode = (node) => {
    if (node.nodeType === Node.TEXT_NODE) return;
    if (node.nodeType !== Node.ELEMENT_NODE) {
      node.remove();
      return;
    }

    const tag = node.tagName.toLowerCase();
    if (!ALLOWED_TAGS.has(tag)) {
      const text = doc.createTextNode(node.textContent || '');
      node.replaceWith(text);
      return;
    }

    [...node.attributes].forEach((attr) => {
      const name = attr.name.toLowerCase();
      const value = attr.value;
      const allowedForTag = ALLOWED_ATTRS[tag];

      if (name.startsWith('on')) {
        node.removeAttribute(attr.name);
        return;
      }

      if (name === 'style' || name === 'srcset') {
        node.removeAttribute(attr.name);
        return;
      }

      if (name === 'href' || name === 'src') {
        if (!/^(https?:|data:image\/|blob:|\/|#)/i.test(value.trim())) {
          node.removeAttribute(attr.name);
          return;
        }
      }

      if (allowedForTag && allowedForTag.has(name)) return;
      if ((tag === 'a' || tag === 'img') && (name === 'href' || name === 'src')) return;
      node.removeAttribute(attr.name);
    });

    if (tag === 'a') {
      node.setAttribute('target', '_blank');
      node.setAttribute('rel', 'noopener noreferrer nofollow');
    }

    if (tag === 'img') {
      if (!node.getAttribute('alt')) node.setAttribute('alt', 'Generated image');
      node.setAttribute('loading', 'lazy');
      node.setAttribute('decoding', 'async');
    }

    [...node.childNodes].forEach(sanitizeNode);
  };

  [...root.childNodes].forEach(sanitizeNode);
  return root.innerHTML;
}

// Register a custom marked.js extension so $$...$$ and $...$ math blocks
// are treated as first-class tokens and never mangled by the markdown renderer.
function ensureMathExtension() {
  if (!window.marked || window._spectrixMathExt) return;
  try {
    window.marked.use({
      extensions: [
        {
          name: 'blockMath',
          level: 'block',
          start(src) {
            const i = src.indexOf('$$');
            return i === -1 ? Infinity : i;
          },
          tokenizer(src) {
            const m = /^\$\$([\s\S]+?)\$\$/.exec(src);
            if (m) return { type: 'blockMath', raw: m[0], math: m[1] };
          },
          renderer(tok) {
            return '$$' + tok.math + '$$\n';
          }
        },
        {
          name: 'inlineMath',
          level: 'inline',
          start(src) {
            let i = src.indexOf('$');
            // Skip $$ positions (handled by blockMath)
            while (i !== -1 && src[i + 1] === '$') i = src.indexOf('$', i + 2);
            return i === -1 ? Infinity : i;
          },
          tokenizer(src) {
            const m = /^\$(?!\$)([^\$\n]+?)\$(?!\$)/.exec(src);
            if (m) return { type: 'inlineMath', raw: m[0], math: m[1] };
          },
          renderer(tok) {
            return '$' + tok.math + '$';
          }
        }
      ]
    });
    window._spectrixMathExt = true;
  } catch (e) {
    console.warn('Spectrix: marked math extension unavailable:', e);
  }
}

function renderMarkdownSafely(content) {
  const text = preprocess(String(content));
  if (!window.marked) return text;

  ensureMathExtension();

  // If the marked math extension registered, math tokens are handled natively.
  if (window._spectrixMathExt) {
    const parsed = marked.parse(text);
    return sanitizeMarkdownHtml(parsed);
  }

  // Fallback: extract all $$ / $ blocks before marked.parse() so
  // backslashes and braces are never touched by the markdown renderer.
  const mathStore = [];
  let shielded = text;

  shielded = shielded.replace(/\$\$([\s\S]+?)\$\$/g, (match) => {
    mathStore.push(match);
    return 'MATHPH' + (mathStore.length - 1) + 'ENDPH';
  });
  shielded = shielded.replace(/\$([^\$\n]+?)\$/g, (match) => {
    mathStore.push(match);
    return 'MATHPH' + (mathStore.length - 1) + 'ENDPH';
  });

  const parsed = marked.parse(shielded);
  let result = sanitizeMarkdownHtml(parsed);

  for (let i = 0; i < mathStore.length; i++) {
    const escaped = mathStore[i]
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    result = result.split('MATHPH' + i + 'ENDPH').join(escaped);
  }

  return result;
}

function formatCodeLanguageLabel(lang) {
  const key = String(lang || '').toLowerCase().trim();
  const map = {
    javascript: 'JS',
    typescript: 'TS',
    python: 'PY',
    bash: 'SHELL',
    shell: 'SHELL',
    sh: 'SHELL',
    html: 'HTML',
    css: 'CSS',
    json: 'JSON',
    markdown: 'MD',
    md: 'MD',
    jsx: 'JSX',
    tsx: 'TSX',
    csharp: 'C#',
    cpp: 'C++',
    c: 'C',
    java: 'JAVA',
    go: 'GO',
    rust: 'RUST',
    sql: 'SQL',
    yaml: 'YAML',
    yml: 'YAML',
    xml: 'XML',
    plaintext: 'TEXT',
    text: 'TEXT'
  };

  if (map[key]) return map[key];
  if (!key) return 'CODE';
  return key.slice(0, 12).toUpperCase();
}

const HTML_PREVIEW_LANGS = new Set(['html', 'htm', 'xhtml', 'xml', 'markup']);
const HTML_PREVIEW_MAX_CHARS = 120000;
const CODE_HIGHLIGHT_MAX_CHARS = 32000;
const CODE_LINE_GUTTER_MAX_LINES = 1200;

function looksLikeHtmlSnippet(codeText) {
  if (!codeText) return false;
  const snippet = String(codeText).trim();
  if (!snippet) return false;
  return /^<!doctype\s+html/i.test(snippet)
    || /<html[\s>]/i.test(snippet)
    || /<body[\s>]/i.test(snippet)
    || /<(div|section|main|header|footer|article|nav|style|script)[\s>]/i.test(snippet)
    || /<\/\w+>/.test(snippet);
}

function canUseHtmlPreview(resolvedLang, codeText) {
  if (!codeText || codeText.length > HTML_PREVIEW_MAX_CHARS) return false;
  const lang = String(resolvedLang || '').toLowerCase().trim();
  if (HTML_PREVIEW_LANGS.has(lang)) return true;
  return looksLikeHtmlSnippet(codeText);
}

function getOrCreateHtmlPreviewWrap(pre) {
  const sibling = pre.nextElementSibling;
  if (sibling && sibling.classList && sibling.classList.contains('html-preview-wrap')) {
    return sibling;
  }

  const wrap = document.createElement('div');
  wrap.className = 'html-preview-wrap';
  const frame = document.createElement('iframe');
  frame.className = 'html-preview-frame';
  frame.loading = 'lazy';
  frame.referrerPolicy = 'no-referrer';
  // allow-scripts only (no allow-same-origin) so the sandboxed
  // frame cannot access parent DOM or make credentialed requests.
  // srcdoc content comes from model output and is intentionally
  // untrusted. Cross-origin fetch from inside the frame will be
  // blocked by CORS since same-origin is not granted.
  frame.sandbox = 'allow-scripts';
  wrap.appendChild(frame);
  pre.insertAdjacentElement('afterend', wrap);
  return wrap;
}

function buildLineNumberGutter(block, pre) {
  const existing = pre.querySelector('.line-number-gutter');
  if (existing) existing.remove();

  const normalized = String(block.textContent || '').replace(/\r\n/g, '\n').replace(/\n+$/, '');
  const lineCount = normalized ? normalized.split('\n').length : 1;

  if (lineCount > CODE_LINE_GUTTER_MAX_LINES) {
    pre.dataset.linesAvailable = 'false';
    return false;
  }

  pre.dataset.linesAvailable = 'true';

  const gutter = document.createElement('div');
  gutter.className = 'line-number-gutter';

  for (let line = 1; line <= lineCount; line++) {
    const lineEl = document.createElement('span');
    lineEl.textContent = String(line);
    gutter.appendChild(lineEl);
  }

  pre.appendChild(gutter);
  return true;
}

function syncLineNumberGutter(pre) {
  if (!pre) return;
  const gutter = pre.querySelector('.line-number-gutter');
  if (!gutter) return;
  const offsetY = Math.round(pre.scrollTop || 0);
  gutter.style.transform = `translate3d(0, ${-offsetY}px, 0)`;
}

function decorateCodeBlocks(container) {
  if (!window.hljs) return;

  const blocks = container.querySelectorAll("pre code");
  blocks.forEach((block) => {
    // Normalize common markdown fence padding so numbering starts on real content.
    const rawBlockText = String(block.textContent || '');
    const normalizedBlockText = rawBlockText
      .replace(/\r\n/g, '\n')
      .replace(/^\n+/, '')
      .replace(/\n+$/, '');
    if (normalizedBlockText !== rawBlockText) {
      block.textContent = normalizedBlockText;
    }

    const pre = block.parentElement;
    if (!pre) return;
    if (pre.dataset.enhanced === 'true') {
      if (pre.classList.contains('line-numbers')) {
        syncLineNumberGutter(pre);
      }
      return;
    }

    const shouldHighlight = normalizedBlockText.length <= CODE_HIGHLIGHT_MAX_CHARS;
    if (shouldHighlight) {
      hljs.highlightElement(block);
    } else {
      block.classList.remove('hljs');
      block.removeAttribute('data-highlighted');
    }

    const langFromClass = Array.from(block.classList)
      .find((cls) => cls.startsWith('language-'));
    const resolvedLang = langFromClass
      ? langFromClass.replace('language-', '')
      : (block.getAttribute('data-language') || 'code');
    pre.dataset.lang = formatCodeLanguageLabel(resolvedLang);

    const hasLineNumberGutter = buildLineNumberGutter(block, pre);
    pre.scrollTop = 0;
    syncLineNumberGutter(pre);

    if (pre.dataset.lineScrollBound !== 'true') {
      let syncFrameId = 0;
      pre.addEventListener('scroll', () => {
        if (syncFrameId) return;
        syncFrameId = requestAnimationFrame(() => {
          syncFrameId = 0;
          syncLineNumberGutter(pre);
        });
      }, { passive: true });
      pre.dataset.lineScrollBound = 'true';
    }

    pre.dataset.enhanced = 'true';

    const collapseBtn = document.createElement("button");
    collapseBtn.className = "collapse-btn";
    collapseBtn.textContent = "Fold";
    collapseBtn.title = "Collapse code block";
    collapseBtn.onclick = () => {
      pre.classList.toggle("collapsed");
      const isCollapsed = pre.classList.contains("collapsed");
      collapseBtn.textContent = isCollapsed ? "Unfold" : "Fold";
      collapseBtn.title = isCollapsed ? "Expand code block" : "Collapse code block";
    };

    const linesBtn = document.createElement("button");
    linesBtn.className = "lines-btn";
    linesBtn.textContent = "Lines";
    linesBtn.title = hasLineNumberGutter ? "Toggle line numbers" : "Line numbers disabled for very large code blocks";
    linesBtn.setAttribute('aria-pressed', 'false');
    if (!hasLineNumberGutter) {
      linesBtn.disabled = true;
    }
    linesBtn.onclick = () => {
      if (pre.dataset.linesAvailable !== 'true') {
        showStatus('Line numbers are disabled for very large code blocks.');
        return;
      }
      const enabled = pre.classList.toggle("line-numbers");
      linesBtn.classList.toggle('active', enabled);
      linesBtn.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    };

    const copyBtn = document.createElement("button");
    copyBtn.className = "copy-btn";
    copyBtn.textContent = "Copy";
    copyBtn.title = "Copy code";
    copyBtn.onclick = async () => {
      try {
        await navigator.clipboard.writeText(block.textContent || '');
        copyBtn.textContent = "Copied";
      } catch {
        copyBtn.textContent = "Failed";
      }
      setTimeout(() => {
        copyBtn.textContent = "Copy";
      }, 1200);
    };

    if (canUseHtmlPreview(resolvedLang, normalizedBlockText)) {
      const previewBtn = document.createElement('button');
      previewBtn.className = 'preview-btn';
      previewBtn.textContent = 'Live';
      previewBtn.title = 'Show live HTML preview';
      previewBtn.setAttribute('aria-pressed', 'false');
      previewBtn.onclick = () => {
        const wrap = getOrCreateHtmlPreviewWrap(pre);
        const frame = wrap.querySelector('iframe');
        const shouldShow = !wrap.classList.contains('active');

        wrap.classList.toggle('active', shouldShow);
        previewBtn.classList.toggle('active', shouldShow);
        previewBtn.textContent = shouldShow ? 'Hide' : 'Live';
        previewBtn.title = shouldShow ? 'Hide live HTML preview' : 'Show live HTML preview';
        previewBtn.setAttribute('aria-pressed', shouldShow ? 'true' : 'false');

        if (shouldShow && frame && wrap.dataset.loaded !== 'true') {
          const htmlSnapshot = String(block.textContent || '');
          scheduleNonCriticalTask(() => {
            frame.srcdoc = htmlSnapshot;
            wrap.dataset.loaded = 'true';
          }, 60);
        }
      };
      pre.appendChild(previewBtn);
    }

    pre.appendChild(collapseBtn);
    pre.appendChild(linesBtn);
    pre.appendChild(copyBtn);
  });
}

function scheduleNonCriticalTask(task, timeout = 180) {
  if (typeof window.requestIdleCallback === 'function') {
    window.requestIdleCallback(() => task(), { timeout });
    return;
  }
  setTimeout(task, timeout);
}

function queueCodeBlockEnhancement(container) {
  if (!container || !container.querySelector || !container.querySelector('pre code')) return;
  if (container.dataset.codeEnhanceQueued === 'true') return;
  container.dataset.codeEnhanceQueued = 'true';
  scheduleNonCriticalTask(() => {
    container.dataset.codeEnhanceQueued = 'false';
    decorateCodeBlocks(container);
  }, 220);
}

async function fetchWithTimeoutRetry(url, options = {}, retryCount = 1) {
  const timeoutMs = options.timeoutMs || 35000;
  const { timeoutMs: ignored, ...fetchOptions } = options;
  let lastError = null;

  for (let attempt = 0; attempt <= retryCount; attempt++) {
    const controller = new AbortController();
    const timeoutHandle = setTimeout(() => controller.abort(), timeoutMs);

    try {
      const response = await fetch(url, {
        ...fetchOptions,
        signal: controller.signal
      });
      clearTimeout(timeoutHandle);

      // Special handling for 429 — don't retry, the worker already retried
      if (response.status === 429) {
        let retryAfter = 30;
        let providerMessage = '';
        try {
          const errBody = await response.clone().json();
          if (errBody.retryAfter) retryAfter = errBody.retryAfter;
          providerMessage = String(errBody?.error?.message || errBody?.message || '').trim();
        } catch {}
        const message = providerMessage
          ? `HTTP 429: ${providerMessage}`
          : `HTTP 429: Rate limited — please wait ~${retryAfter}s and try again.`;
        const err = new Error(message);
        err.isRateLimit = true;
        err.status = 429;
        err.retryAfter = retryAfter;
        err.providerMessage = providerMessage;
        throw err;
      }

      if (!response.ok) {
        let detail = '';
        try {
          const errBody = await response.clone().json();
          detail = String(errBody?.error?.message || errBody?.message || '').trim();
        } catch {
          try {
            detail = String(await response.clone().text() || '').trim().slice(0, 220);
          } catch {}
        }
        const err = new Error(detail ? `HTTP ${response.status}: ${detail}` : `HTTP ${response.status}`);
        err.status = response.status;
        throw err;
      }

      return response;
    } catch (error) {
      clearTimeout(timeoutHandle);
      // Don't retry rate limit errors — propagate immediately
      if (error.isRateLimit) throw error;
      lastError = error;
      const status = parseHttpStatusFromError(error);
      const shouldRetry = status == null || status >= 500;
      if (attempt < retryCount && shouldRetry) {
        const backoffMs = Math.min(1000 * Math.pow(2, attempt), 8000);
        await new Promise((resolve) => setTimeout(resolve, backoffMs));
      }
    }
  }

  if (lastError && lastError.name === 'AbortError') {
    throw new Error('Request timed out. Please try again.');
  }

  throw lastError || new Error('Request failed');
}

// ===== RENDER MESSAGE =====
function render(role, content, saveIt = true, messageIndex = null) {
  const d = createChatMessageNode(role, content, { saveIt, messageIndex });

  chat.appendChild(d);

  if (chatWindowState.enabled && chatWindowState.sessionId === String(currentId || '')) {
    const overflow = chat.children.length - CHAT_WINDOW_MAX_DOM;
    if (overflow > 0) {
      for (let i = 0; i < overflow; i += 1) {
        if (!chat.firstChild) break;
        chat.removeChild(chat.firstChild);
      }
      chatWindowState.start += overflow;
    }
    chatWindowState.end += 1;
  }

  scrollChatToLatest({ smooth: false });

  if (saveIt) saveMessage(role, content);
  return d;
}

async function streamBotFromSSE(payload, options = {}) {
  const signal = options.signal;
  const streamCandidates = [
    activeChatStreamApiUrl,
    ...CHAT_STREAM_API_URL_CANDIDATES.filter((url) => url !== activeChatStreamApiUrl)
  ];

  const requestBody = JSON.stringify(payload);
  let res = null;
  let lastStreamError = null;

  for (let index = 0; index < streamCandidates.length; index++) {
    const url = streamCandidates[index];
    try {
      const attempt = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: requestBody,
        signal
      });

      const hasNext = index < streamCandidates.length - 1;
      if (hasNext && CHAT_ROUTE_FALLBACK_STATUSES.has(attempt.status)) {
        continue;
      }

      activeChatStreamApiUrl = url;
      res = attempt;
      break;
    } catch (error) {
      if (signal?.aborted) {
        const abortError = new Error('Generation stopped');
        abortError.isUserAbort = true;
        throw abortError;
      }

      lastStreamError = error;
      if (index < streamCandidates.length - 1) continue;
      throw error;
    }
  }

  if (!res) {
    throw lastStreamError || new Error('Streaming endpoint unavailable');
  }

  if (res.status === 429) {
    let retryAfter = 30;
    try {
      const errBody = await res.clone().json();
      if (errBody.retryAfter) retryAfter = errBody.retryAfter;
    } catch {}
    const err = new Error(`Rate limited — please wait ~${retryAfter}s and try again.`);
    err.isRateLimit = true;
    err.retryAfter = retryAfter;
    throw err;
  }

  if (!res.ok) {
    throw new Error(`HTTP ${res.status}`);
  }

  if (!res.body) {
    throw new Error("Streaming is not supported in this browser.");
  }

  const d = document.createElement("div");
  d.className = "msg bot";
  d.innerHTML = '<span class="stream-placeholder">Thinking<span class="stream-dots" aria-hidden="true"></span></span>';
  chat.appendChild(d);
  scrollChatToLatest({ smooth: false, force: true });

  const session = getCurrentSession();
  if (!session) throw new Error("No active chat session");

  let renderedText = "";
  let buffer = "";
  let streamDone = false;
  let abortedByUser = false;
  let frameScheduled = false;
  let streamTextNode = null;
  let pendingDeltaText = "";

  const decoder = new TextDecoder();
  const reader = res.body.getReader();
  const onVisibilityChange = () => {
    if (document.visibilityState === 'hidden' && !streamDone && !abortedByUser) {
      showStatus('Tab backgrounded — stream may stall on some browsers.', 4000);
    }
  };
  document.addEventListener('visibilitychange', onVisibilityChange);
  const isGemmaStream = String(payload?.model || '').toLowerCase().includes('gemma');
  const STREAM_IDLE_TIMEOUT_MS = isGemmaStream ? 45000 : 20000;

  const readChunkWithTimeout = async () => {
    let timeoutId;
    try {
      return await Promise.race([
        reader.read(),
        new Promise((_, reject) => {
          timeoutId = setTimeout(() => reject(new Error('Stream stalled.')), STREAM_IDLE_TIMEOUT_MS);
        })
      ]);
    } finally {
      if (timeoutId) clearTimeout(timeoutId);
    }
  };

  let lastStreamRenderAt = 0;
  const STREAM_RENDER_MIN_INTERVAL_MS = 40;
  const STREAM_RENDER_MIN_INTERVAL_WHILE_REVIEWING_MS = 85;
  const STREAM_RENDER_MIN_INTERVAL_WHILE_POINTER_ACTIVE_MS = 95;
  let streamParseEventsSinceYield = 0;
  let lastStreamParseYieldAt = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
  const STREAM_PARSE_YIELD_EVENT_COUNT = 24;
  const STREAM_PARSE_YIELD_BUDGET_MS = 8;

  streamPaused = false;
  updatePauseButtonUi();

  const renderCurrentState = () => {
    if (streamPaused) return;
    // During stream, append incremental plain text for smoother FPS; finalize markdown once at the end.
    if (!streamTextNode) {
      d.textContent = "";
      streamTextNode = document.createTextNode("");
      d.appendChild(streamTextNode);
    }
    if (pendingDeltaText) {
      streamTextNode.appendData(pendingDeltaText);
      pendingDeltaText = "";
    }
    scrollChatToLatest({ smooth: false });
  };

  streamResumeRenderCallback = () => {
    renderCurrentState();
    scheduleRender();
  };

  const finalizeRenderedMessage = async () => {
    if (pendingDeltaText) {
      if (!streamTextNode) {
        d.textContent = "";
        streamTextNode = document.createTextNode("");
        d.appendChild(streamTextNode);
      }
      streamTextNode.appendData(pendingDeltaText);
      pendingDeltaText = "";
    }

    await ensureMarkdownRuntimeLoaded({ timeoutMs: 1500, silent: true });
    if (window.marked) {
      d.innerHTML = renderMarkdownSafely(renderedText);
      promoteInlineCodeMath(d);
    } else {
      d.textContent = renderedText;
    }
    await renderMath(d);
    queueCodeBlockEnhancement(d);
  };

  const scheduleRender = () => {
    if (streamPaused) return;
    if (frameScheduled) return;
    frameScheduled = true;
    requestAnimationFrame(() => {
      frameScheduled = false;
      const now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
      const baseInterval = autoScrollToLatest
        ? STREAM_RENDER_MIN_INTERVAL_MS
        : STREAM_RENDER_MIN_INTERVAL_WHILE_REVIEWING_MS;
      const pointerBoostActive = now < streamPointerBoostUntil;
      const minInterval = pointerBoostActive
        ? Math.max(baseInterval, STREAM_RENDER_MIN_INTERVAL_WHILE_POINTER_ACTIVE_MS)
        : baseInterval;
      if (now - lastStreamRenderAt < minInterval) return;
      lastStreamRenderAt = now;
      renderCurrentState();
    });
  };

  while (!streamDone) {
    let chunk;
    try {
      chunk = await readChunkWithTimeout();
    } catch (error) {
      if (signal?.aborted) {
        abortedByUser = true;
        break;
      }
      throw error;
    }

    if (chunk.done) break;

    buffer += decoder.decode(chunk.value, { stream: true });
    buffer = buffer.replace(/\r\n/g, "\n");

    let boundaryIndex = buffer.indexOf("\n\n");
    while (boundaryIndex !== -1) {
      const rawEvent = buffer.slice(0, boundaryIndex).trim();
      buffer = buffer.slice(boundaryIndex + 2);

      if (rawEvent) {
        const dataLines = rawEvent
          .split("\n")
          .filter((line) => line.startsWith("data:"))
          .map((line) => line.slice(5).trimStart());

        if (dataLines.length > 0) {
          const dataRaw = dataLines.join("\n").trim();

          if (dataRaw === "[DONE]") {
            streamDone = true;
            break;
          }

          let eventData = null;
          try {
            eventData = JSON.parse(dataRaw);
          } catch {
            eventData = null;
          }

          if (eventData?.type === "error") {
            throw new Error(eventData.message || "Streaming failed");
          }

          const wrappedDelta = (eventData?.type === "delta" && typeof eventData.delta === "string")
            ? eventData.delta
            : "";
          const rawDelta = eventData?.choices?.[0]?.delta?.content;
          const nextDelta = wrappedDelta || (typeof rawDelta === "string" ? rawDelta : "");

          if (nextDelta) {
            renderedText += nextDelta;
            pendingDeltaText += nextDelta;
            if (!streamPaused) scheduleRender();
          }

          if (eventData?.type === "done" || eventData?.choices?.[0]?.finish_reason) {
            streamDone = true;
            break;
          }
        }
      }

      streamParseEventsSinceYield += 1;
      const parseNow = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
      if (
        streamParseEventsSinceYield >= STREAM_PARSE_YIELD_EVENT_COUNT
        || (parseNow - lastStreamParseYieldAt) > STREAM_PARSE_YIELD_BUDGET_MS
      ) {
        streamParseEventsSinceYield = 0;
        lastStreamParseYieldAt = parseNow;
        await new Promise((resolve) => setTimeout(resolve, 0));
        if (signal?.aborted) {
          abortedByUser = true;
          streamDone = true;
          break;
        }
      }

      boundaryIndex = buffer.indexOf("\n\n");
    }
  }

  // Some upstream routes may return a plain JSON body even when stream=true.
  // If that happens, recover the final text instead of failing with "Empty response".
  if (!renderedText.trim() && buffer.trim()) {
    try {
      const parsed = JSON.parse(buffer.trim());
      const recovered = String(parsed?.choices?.[0]?.message?.content || '').trim();
      if (recovered) {
        renderedText = recovered;
        pendingDeltaText = '';
      }
    } catch {
      // Keep normal empty-response behavior.
    }
  }

  if (abortedByUser) {
    if (!renderedText.trim()) {
      d.remove();
      streamResumeRenderCallback = null;
      const abortError = new Error('Generation stopped');
      abortError.isUserAbort = true;
      throw abortError;
    }

    await finalizeRenderedMessage();
    session.messages.push({ role: "bot", content: renderedText });
    session.timestamp = Date.now();
    await saveChat(session);
    renderHistory();
    updateHeaderTitle();
    document.removeEventListener('visibilitychange', onVisibilityChange);
    streamResumeRenderCallback = null;
    showStatus('Generation stopped');
    return renderedText;
  }

  if (!renderedText.trim()) {
    streamResumeRenderCallback = null;
    throw new Error("Empty response from model");
  }

  await finalizeRenderedMessage();

  // Play TTS once final text is complete.
  speakText(renderedText);

  session.messages.push({ role: "bot", content: renderedText });
  session.timestamp = Date.now();
  await saveChat(session);
  renderHistory();
  updateHeaderTitle();
  document.removeEventListener('visibilitychange', onVisibilityChange);
  streamResumeRenderCallback = null;

  return renderedText;
}

// ===== FULL AUTO TITLE =====
async function generateTitle(userPrompt, botReply) {
  try {
    const res = await fetchChatApiWithFallback({
      method: "POST",
      headers: { "Content-Type": "application/json" },
      timeoutMs: 22000,
      body: JSON.stringify({
        model: FIXED_TITLE_MODEL,
        messages: [
          {
            role: "system",
            content: `
You are a smart assistant that generates short chat titles.
- Titles must be 3–5 words.
- Do NOT include quotes, backticks, or phrases like "Here is a chat title".
- Do NOT include "Title:"
- Keep it plain, punchy, and readable.
- Summarize the essence of the conversation, not just copy words.
- Avoid special characters or excessive punctuation.
- Keep it under 30 characters.
`
          },
          {
            role: "user",
            content: `
User said: ${userPrompt}
Assistant replied: ${botReply}

Create a concise title that captures the main topic of this conversation.
`
          }
        ]
      })
    });

    const data = await res.json();
    const rawTitle = data?.choices?.[0]?.message?.content || "";

    // ==== CLEAN & FORMAT ====
    let cleanTitle = rawTitle
      .replace(/["'`\n]/g, "")     // remove quotes, backticks, line breaks
      .replace(/\*{1,2}/g, "")     // remove bold/italic markdown
      .replace(/#{1,6}\s?/g, "")   // remove heading markers
      .replace(/\s+/g, " ")        // collapse multiple spaces
      .trim()
      .split(" ")                  // limit words
      .slice(0, 5)
      .join(" ");

    // Fallback: if title is empty, use first 5 words of user prompt
    if (!cleanTitle) {
      cleanTitle = userPrompt
        .replace(/\s+/g, " ")
        .trim()
        .split(" ")
        .slice(0, 5)
        .join(" ");
    }

    return cleanTitle || "New Chat";
  } catch (err) {
    console.error("Title generation failed:", err);

    // Final fallback
    return userPrompt
      ? userPrompt.replace(/\s+/g, " ").trim().split(" ").slice(0, 5).join(" ")
      : "New Chat";
  }
}

function showStatus(message, timeout = 2600) {
  const banner = document.getElementById('statusBanner');
  if (!banner) return;

  const appHeader = document.querySelector('.app header') || document.querySelector('header');
  if (appHeader) {
    const rect = appHeader.getBoundingClientRect();
    const gap = 8;
    const top = Math.max(8, Math.round(rect.bottom + gap));
    banner.style.top = `${top}px`;
  } else {

  }
  banner.style.left = '50%';

function openAppModal({
  title = 'Notice',
  message = '',
  mode = 'alert',
  defaultValue = '',
  okText = 'OK',
  cancelText = 'Cancel',
  dontAskAgainKey = ''
} = {}) {
  return new Promise((resolve) => {
    const overlay = document.getElementById('appModalOverlay');
    const modal = document.getElementById('appModal');
    const titleEl = document.getElementById('appModalTitle');
    const bodyEl = document.getElementById('appModalBody');
    const auxEl = document.getElementById('appModalAux');
    const dontAsk = document.getElementById('appModalDontAsk');
    const cancelBtn = document.getElementById('appModalCancel');
    const okBtn = document.getElementById('appModalOk');

    if (!overlay || !modal || !titleEl || !bodyEl || !auxEl || !dontAsk || !cancelBtn || !okBtn) {
      resolve(mode === 'confirm' ? false : mode === 'prompt' ? null : true);
      return;
    }

    titleEl.textContent = title;
    bodyEl.textContent = message;
    okBtn.textContent = okText;
    cancelBtn.textContent = cancelText;
    dontAsk.checked = false;

    const isAlert = mode === 'alert';
    const isPrompt = mode === 'prompt';
    const showDontAsk = mode === 'confirm' && !!dontAskAgainKey;

    cancelBtn.style.display = isAlert ? 'none' : 'inline-flex';
    auxEl.classList.toggle('visible', showDontAsk);

    let inputEl = null;
    if (isPrompt) {
      inputEl = document.createElement('input');
      inputEl.type = 'text';
      inputEl.className = 'app-modal-input';
      inputEl.value = String(defaultValue || '');
      bodyEl.appendChild(inputEl);
    }

    const cleanup = () => {
      overlay.classList.remove('visible');
      modal.classList.remove('visible');
      document.removeEventListener('keydown', onKeyDown);
      okBtn.removeEventListener('click', onOk);
      cancelBtn.removeEventListener('click', onCancel);
      overlay.removeEventListener('click', onOverlay);
      if (inputEl) inputEl.remove();
    };

    const onOk = () => {
      if (showDontAsk && dontAsk.checked) {
        localStorage.setItem(dontAskAgainKey, 'true');
      }
      const value = isPrompt ? (inputEl ? inputEl.value : '') : true;
      cleanup();
      resolve(value);
    };

    const onCancel = () => {
      cleanup();
      resolve(isPrompt ? null : false);
    };

    const onOverlay = () => {
      if (isAlert) onOk();
      else onCancel();
    };

    const onKeyDown = (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        if (isAlert) onOk();
        else onCancel();
      }
      if (e.key === 'Enter') {
        e.preventDefault();
        onOk();
      }
    };

    okBtn.addEventListener('click', onOk);
    cancelBtn.addEventListener('click', onCancel);
    overlay.addEventListener('click', onOverlay);
    document.addEventListener('keydown', onKeyDown);

    overlay.classList.add('visible');
    modal.classList.add('visible');
    if (inputEl) inputEl.focus();
    else okBtn.focus();
  });
}

function readCloudSyncQueue() {
  if (incognitoEnabled) return [];
  try {
    const raw = localStorage.getItem(CLOUD_SYNC_QUEUE_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(parsed)) return [];
    return parsed.filter((item) => item && typeof item.type === 'string');
  } catch {
    return [];
  }
}

function writeCloudSyncQueue(queue) {
  if (incognitoEnabled) return;
  const safe = Array.isArray(queue) ? queue.slice(-500) : [];
  localStorage.setItem(CLOUD_SYNC_QUEUE_KEY, JSON.stringify(safe));
}

function queueCloudSyncOperation(op) {
  if (incognitoEnabled || !op || !op.type) return;
  const nextOp = {
    type: String(op.type),
    id: String(op.id || ''),
    payload: op.payload || null,
    ts: Number(op.ts || Date.now())
  };

  let queue = readCloudSyncQueue();

  if (nextOp.type === 'memory_clear_all') {
    queue = queue.filter((item) => !String(item.type || '').startsWith('memory_'));
    queue.push(nextOp);
    writeCloudSyncQueue(queue);
    return;
  }

  const isChatOp = nextOp.type.startsWith('chat_');
  const isMemoryOp = nextOp.type.startsWith('memory_');
  if (isChatOp || isMemoryOp) {
    queue = queue.filter((item) => {
      const sameId = String(item.id || '') === nextOp.id;
      if (!sameId) return true;
      if (isChatOp) return !String(item.type || '').startsWith('chat_');
      if (isMemoryOp) return !String(item.type || '').startsWith('memory_');
      return true;
    });
  }

  queue.push(nextOp);
  writeCloudSyncQueue(queue);
}

function isCloudSyncRetryableError(error) {
  if (!error) return !navigator.onLine;
  if (!navigator.onLine) return true;

  const code = String(error?.code || '').toLowerCase();
  if (code.includes('unavailable') || code.includes('deadline-exceeded') || code.includes('network')) {
    return true;
  }

  const msg = String(error?.message || error || '').toLowerCase();
  return (
    msg.includes('network')
    || msg.includes('failed to fetch')
    || msg.includes('offline')
    || msg.includes('unavailable')
    || msg.includes('timeout')
    || msg.includes('blocked_by_client')
    || msg.includes('blocked by client')
  );
}

function canUseFirebaseStorage() {
  return Boolean(firebase?.storage && typeof firebase.storage === 'function');
}

function inferMediaContentType(blob, mediaType = '') {
  const explicit = String(blob?.type || '').trim();
  if (explicit) return explicit;
  if (mediaType === 'video') return 'video/mp4';
  if (mediaType === 'image') return 'image/png';
  return 'application/octet-stream';
}

async function uploadMediaBlobToCloud(mediaId, blob, options = {}) {
  if (incognitoEnabled) return '';
  const cleanId = String(mediaId || '').trim();
  if (!cleanId || !blob) return '';

  const user = firebase?.auth?.().currentUser;
  if (!user || !canUseFirebaseStorage()) return '';

  const cacheKey = `${user.uid}:${cleanId}`;
  if (cloudMediaUrlCache.has(cacheKey)) {
    return cloudMediaUrlCache.get(cacheKey) || '';
  }
  if (cloudMediaUploadInFlight.has(cacheKey)) {
    return cloudMediaUploadInFlight.get(cacheKey);
  }

  const mediaType = String(options.mediaType || '').trim();
  const uploadPromise = (async () => {
    try {
      const metadata = {
        contentType: inferMediaContentType(blob, mediaType),
        customMetadata: {
          mediaType: mediaType || 'unknown',
          source: 'spectrix'
        }
      };
      const ref = firebase.storage().ref(`users/${user.uid}/media/${cleanId}`);
      const snap = await ref.put(blob, metadata);
      const url = await snap.ref.getDownloadURL();
      const safeUrl = String(url || '');
      if (safeUrl) {
        cloudMediaUrlCache.set(cacheKey, safeUrl);
      }
      return safeUrl;
    } catch (error) {
      console.warn('Media cloud upload skipped:', error);
      return '';
    } finally {
      cloudMediaUploadInFlight.delete(cacheKey);
    }
  })();

  cloudMediaUploadInFlight.set(cacheKey, uploadPromise);
  return uploadPromise;
}

async function buildCloudChatPayload(chatData) {
  if (!chatData || !chatData.id) return null;

  const baseMessages = Array.isArray(chatData.messages) ? chatData.messages : [];
  const hasMediaMessages = baseMessages.some((message) => {
    const type = String(message?.content?.type || '').toLowerCase();
    return type === 'image' || type === 'video';
  });
  if (!hasMediaMessages) return chatData;

  const payload = {
    ...chatData,
    messages: baseMessages.map((message) => ({ ...message }))
  };

  for (let index = 0; index < payload.messages.length; index += 1) {
    const message = payload.messages[index];
    const content = message?.content;
    if (!content || typeof content !== 'object') continue;

    const mediaType = String(content.type || '').toLowerCase();
    if (mediaType !== 'image' && mediaType !== 'video') continue;

    const nextContent = { ...content };
    const mediaId = String(nextContent.mediaId || '').trim();
    let cloudUrl = String(nextContent.cloudUrl || '').trim();

    if (!cloudUrl && typeof nextContent.src === 'string' && /^https?:\/\//i.test(nextContent.src)) {
      cloudUrl = nextContent.src;
    }

    if (!cloudUrl && mediaId) {
      let blob = null;
      try {
        blob = await getMedia(mediaId);
      } catch (error) {
        console.warn('Local media read skipped:', error);
      }

      if (!blob && typeof nextContent.src === 'string' && nextContent.src.startsWith('data:')) {
        try {
          const fetched = await fetch(nextContent.src);
          if (fetched.ok) blob = await fetched.blob();
        } catch (error) {
          console.warn('Data URL to blob conversion skipped:', error);
        }
      }

      if (blob) {
        cloudUrl = await uploadMediaBlobToCloud(mediaId, blob, { mediaType });
      }
    }

    if (cloudUrl) {
      nextContent.cloudUrl = cloudUrl;
      // Keep Firestore docs smaller once Storage has the media bytes.
      if (typeof nextContent.src === 'string' && nextContent.src.startsWith('data:')) {
        nextContent.src = '';
      }
      payload.messages[index] = { ...message, content: nextContent };
    }
  }

  return payload;
}

async function flushCloudSyncQueue(options = {}) {
  const { silent = false } = options;
  if (incognitoEnabled) return;
  if (cloudSyncQueueFlushInFlight) return;
  if (!navigator.onLine) return;

  const user = firebase?.auth?.().currentUser;
  if (!user) return;

  const queue = readCloudSyncQueue();
  if (!queue.length) return;

  cloudSyncQueueFlushInFlight = true;
  const remaining = [];
  let replayed = 0;

  try {
    const dbF = firebase.firestore();
    const userRef = dbF.collection('users').doc(user.uid);

    for (let index = 0; index < queue.length; index += 1) {
      const op = queue[index];
      try {
        if (op.type === 'chat_upsert' && op.id) {
          const sourceChat = op.payload || sessions[op.id] || await getChat(op.id);
          const payload = await buildCloudChatPayload(sourceChat);
          if (payload && payload.id) {
            await userRef.collection('chats').doc(String(op.id)).set(payload, { merge: true });
          }
        } else if (op.type === 'chat_delete' && op.id) {
          await userRef.collection('chats').doc(String(op.id)).delete();
        } else if (op.type === 'memory_upsert' && op.id && op.payload) {
          await userRef.collection('memories').doc(String(op.id)).set(op.payload, { merge: true });
        } else if (op.type === 'memory_delete' && op.id) {
          await userRef.collection('memories').doc(String(op.id)).delete();
        } else if (op.type === 'memory_clear_all') {
          const snap = await userRef.collection('memories').get();
          if (!snap.empty) {
            const batch = dbF.batch();
            snap.docs.forEach((doc) => batch.delete(doc.ref));
            await batch.commit();
          }
        }
        replayed += 1;
      } catch (error) {
        if (isCloudSyncRetryableError(error)) {
          remaining.push(op, ...queue.slice(index + 1));
          break;
        }
        console.warn('Dropping non-retryable queued cloud op:', op, error);
      }
    }
  } finally {
    writeCloudSyncQueue(remaining);
    cloudSyncQueueFlushInFlight = false;
  }

  if (replayed > 0 && !silent) {
    showStatus(`Synced ${replayed} queued cloud change${replayed === 1 ? '' : 's'}.`);
  }
}

  chat.querySelectorAll('.msg.chat-search-match').forEach((node) => {

  });

function updateChatSearchHighlights(query) {
  clearChatSearchHighlights();
  const needle = String(query || '').trim().toLowerCase();
  if (!needle) return 0;

  let firstMatch = null;
  let count = 0;
  chat.querySelectorAll('.msg').forEach((node) => {
    const hay = (node.innerText || node.textContent || '').toLowerCase();
    if (hay.includes(needle)) {
      node.classList.add('chat-search-match');
      if (!firstMatch) firstMatch = node;
      count++;
    }
  });

  if (firstMatch) {
    firstMatch.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  return count;
}
