<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spectrix Ai</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
<meta name="mobile-web-app-capable" content="yes">
<meta id="themeColorMeta" name="theme-color" content="#020617">
<meta name="application-name" content="Spectrix Ai">
<meta name="description" content="Spectrix Ai is a fast voice-enabled AI chat web app with installable offline-ready PWA support.">
<meta name="color-scheme" content="dark light">
<meta name="format-detection" content="telephone=no,email=no,address=no">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spectrix Ai">
<link rel="manifest" href="site.webmanifest">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script src="https://js.puter.com/v2/"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/go.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/contrib/auto-render.min.js"
		onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true},{left: '\\(', right: '\\)', display: false},{left: '$', right: '$', display: false}], throwOnError: false, strict: 'ignore'});"></script>
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true
  },
  options: {
    skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
  },
  startup: {
    typeset: false
  }
};
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap');
*{
	box-sizing:border-box;
	margin:0;
	padding:0;
	transition:
    background-color 0.2s ease,
    border-color 0.2s ease,
    box-shadow 0.2s ease,
    color 0.2s ease,
    opacity 0.2s ease,
    transform 0.15s ease;
}

html, body {
  overflow-x: hidden;
}

	.container,
.app,
#chat {
  overflow-x: hidden;
}

	pre, code {
  max-width: 100%;
  word-break: break-word;
}


:root{
  --bg:#f8f9fa; --panel:#ffffff; --chat:#f1f3f5;
  --border:#e2e8f0; --user:#2563eb; --bot:#ffffff;
  --text:#1a1a2e; --muted:#64748b;
  --link:#2563eb; --sidebar:#f8f9fa;
  --radius-lg:20px;
  --radius-md:14px;
  --radius-sm:10px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.12);
  --shadow-xl:0 24px 80px rgba(0,0,0,0.18);
  --accent-glow:rgba(37,99,235,0.15);
  --safe-top:env(safe-area-inset-top, 0px);
  --safe-right:env(safe-area-inset-right, 0px);
  --safe-bottom:env(safe-area-inset-bottom, 0px);
  --safe-left:env(safe-area-inset-left, 0px);
}

/* ===== CODE BLOCK SCROLLBAR (HORIZONTAL) ===== */
pre::-webkit-scrollbar {
  height: 6px;
}

pre::-webkit-scrollbar-track {
  background: transparent;
}

pre::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.15);
  border-radius: 6px;
}

pre::-webkit-scrollbar-thumb:hover {
  background: rgba(255,255,255,0.25);
}

button.toggle:hover {
  background: var(--accent-glow);
  border-color: var(--user);
  transform: translateY(-1px);
}

body.dark{
  --bg:#0c0c14; --panel:#16161e; --chat:#1a1a24;
  --border:rgba(255,255,255,0.08); --user:#3b82f6; --bot:#1e1e2a;
  --text:#e8e8ed; --muted:#8b8fa3;
  --link:#60a5fa; --sidebar:#111118;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.3);
  --shadow-md:0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.5);
  --shadow-xl:0 28px 90px rgba(0,0,0,0.6);
  --accent-glow:rgba(59,130,246,0.12);
}

body{
  font-family: 'Raleway', -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
  font-size: 16px;
  font-weight: 450;
  letter-spacing: -0.01em;
  line-height: 1.6;
  background:
    radial-gradient(circle at 12% 8%, var(--accent-glow), transparent 38%),
    radial-gradient(circle at 88% 92%, var(--accent-glow), transparent 42%),
    var(--bg);
  display:flex;justify-content:center;align-items:center;
  min-height:100dvh;
  height:100vh;
  color:var(--text);
  overflow: hidden;
  padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

.container{
  width:100%;max-width:1280px;height:calc(100dvh - var(--safe-top) - var(--safe-bottom));
  display:flex;gap:0;
  box-shadow: var(--shadow-xl);
  border-radius:24px;overflow:hidden;
  border: 1px solid var(--border);
  backdrop-filter: blur(14px);
}

.sidebar{
  width:280px;
  background:linear-gradient(180deg, var(--sidebar), var(--panel));
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  position: relative;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s ease;
}

.sidebar-header{
  padding:16px;
  border-bottom:1px solid var(--border);
  font-weight:600;display:flex;
  justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:10px;
  background:var(--sidebar);
  position: sticky;
  top: 0;
  z-index: 5;
}

.sidebar-controls{
  display:flex;gap:6px;width:100%;
}

.new-chat-btn, .import-btn, .export-btn{
  background:var(--user);border:none;color:#fff;
  padding:8px 12px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:12px;font-weight:600;
  font-family:inherit;
  transition:all 0.2s;flex:1;
}

.new-chat-btn:hover, .import-btn:hover, .export-btn:hover{
  filter:brightness(1.1);
  transform:translateY(-1px);
  box-shadow:0 4px 12px var(--accent-glow);
}
.export-btn{background:#10b981;}
.export-btn:hover{background:#059669;}

.search-box{
  width:100%;padding:10px 12px;
  background:var(--chat);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);
  outline:none;font-size:13px;
  font-family:inherit;
  transition:border-color 0.2s, box-shadow 0.2s;
}

.search-box:focus{
  border-color:var(--user);
  box-shadow:0 0 0 3px var(--accent-glow);
}

.history-list{
  flex:1;overflow-y:auto;padding:8px;
  display:flex;flex-direction:column;gap:4px;
}

.history-group{
  margin-bottom:12px;
}

.history-group-title{
  font-size:10px;
  color:var(--muted);
  padding:6px 14px 4px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.8px;
}

.history-item{
  padding:10px 14px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:13px;
  font-weight:500;
  border:1px solid transparent;
  display:flex;justify-content:space-between;
  align-items:center;transition:all 0.15s;
  position:relative;
  background: transparent;
}

.history-item:hover{
  background:var(--accent-glow);
  border-color:transparent;
}

.history-item.active{
  background:var(--user);color:#fff;
  box-shadow: 0 2px 12px var(--accent-glow);
}

.history-item .title{
  flex:1;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
  cursor:text;
}

.title-input{
  flex:1;
  background:transparent;
  border:1px solid var(--border);
  color:inherit;
  padding:2px 6px;
  border-radius:4px;
  font-size:14px;
  outline:none;
}

.history-item-actions{
  display:flex;gap:4px;opacity:0;
  transition:opacity 0.2s;
}

.history-item:hover .history-item-actions{opacity:1;}

.pin-chat, .delete-chat{
  background:none;border:none;
  color:inherit;cursor:pointer;
  font-size:14px;padding:2px 4px;
}

.history-item.pinned .pin-chat{opacity:1;color:#fbbf24;}

.history-list::-webkit-scrollbar {width: 4px;}
.history-list::-webkit-scrollbar-track {background: transparent;}
.history-list::-webkit-scrollbar-thumb {background: var(--border);border-radius: 4px;}

.app{
  flex:1;
  background:linear-gradient(180deg, var(--panel), var(--chat));
  display:flex;flex-direction:column;
  overflow: hidden;
  position:relative;
}

header{
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  font-weight:600;
  flex-shrink: 0;
  background:rgba(15, 23, 42, 0.04);
  min-height:56px;
  backdrop-filter: blur(14px);
  position: sticky;
  top: 0;
  z-index: 4;
}

body.dark header {
  background: rgba(15, 23, 42, 0.32);
}

.title-edit{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text);
  padding:4px 10px;
  border-radius:var(--radius-sm);
  font-size:14px;
  font-weight:600;
  font-family:inherit;
  outline:none;
}

.title-edit:focus{
  border-color:var(--user);
  box-shadow:0 0 0 3px var(--accent-glow);
}

.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

.menu-btn{
  background:transparent;border:1px solid var(--border);
  color:var(--text);padding:6px 10px;border-radius:var(--radius-sm);
  cursor:pointer;display:none;
  font-size:16px;
}

select,button.toggle{
  background:transparent;border:1px solid var(--border);
  color:var(--text);padding:7px 11px;border-radius:var(--radius-sm);
  cursor:pointer;
  font-family:inherit;
  font-size:14px;
  transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s, background-color 0.2s;
}

#chat{
  flex:1;padding:24px 20px;overflow-y:auto;
  display:flex;flex-direction:column;gap:12px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.04)),
    var(--chat);
  position:relative;
}

.msg{
  max-width:720px;
  padding:14px 18px;
  border-radius:var(--radius-md);
  line-height:1.7;
  opacity:0;animation:fadeIn .2s ease forwards;
  position:relative;
  word-wrap: break-word;
  overflow-wrap: anywhere;
  font-size:15px;
  border:1px solid transparent;
  backdrop-filter: blur(6px);
}

.msg:hover .msg-actions{opacity:1;}

.msg-actions{
  position:absolute;top:6px;right:6px;
  display:flex;gap:4px;opacity:0;
  transition:opacity 0.2s;
}

.msg-btn{
  background:var(--chat);
  border:1px solid var(--border);
  color:var(--text);
  padding:4px 10px;border-radius:6px;
  cursor:pointer;font-size:11px;
  font-family:inherit;
  font-weight:600;
  transition:all 0.15s;
}

.msg-btn:hover{
  border-color:var(--user);
  background:var(--accent-glow);
}

.user{
	align-self:flex-end;
  background:linear-gradient(180deg, var(--user), var(--user));
	color:#fff;
	box-shadow: var(--shadow-sm);
	border-bottom-right-radius: 4px;
  border-color: transparent;
}
.bot{
	align-self:flex-start;
	background:var(--bot);
	color:var(--text);
  box-shadow: var(--shadow-md);
	border: 1px solid var(--border);
	border-bottom-left-radius: 4px;
}

body.dark .bot {
  border-color: rgba(255,255,255,0.06);
}

.msg a{color: var(--link);text-decoration: none;font-weight:600;}
.msg a:hover{text-decoration:underline;opacity:0.85;}

.timestamp{font-size:10px;color:var(--muted);margin-top:8px;font-weight:500;opacity:0.7;}

.user .timestamp {
  color: #fff;
  opacity: 0.92;
}

#input {
  width: 100%;
  min-height: 42px;
  max-height: 120px;
  resize: none;
  padding: 10px 14px;
  font-size: 15px;
  font-family: inherit;
  line-height: 1.5;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--chat);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  overflow: auto;
  scrollbar-width: none;
}

#input:focus {
  border-color: var(--user);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

#input::placeholder {
  color: var(--muted);
  font-weight: 400;
}

#input::-webkit-scrollbar {
  display: none;
}

pre{
  position:relative;
  background:#1e1e2e;
  border-radius:var(--radius-sm);
  padding:16px;
  margin-top:10px;
  overflow-x:auto;
  max-height:400px;
  transition:max-height 0.3s;
  border: 1px solid rgba(255,255,255,0.06);
}

pre.collapsed{max-height:80px;overflow:hidden;}

pre code{
  font-size:13px;
  font-family:'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  line-height:1.6;
}

.copy-btn, .collapse-btn{
  position:absolute;top:8px;
  background:rgba(255,255,255,0.1);border:none;color:#e8e8ed;
  font-size:11px;padding:5px 10px;
  border-radius:6px;cursor:pointer;
  font-family:inherit;
  font-weight:600;
  transition:background 0.15s;
}

.copy-btn:hover, .collapse-btn:hover{
  background:rgba(255,255,255,0.2);
}

.copy-btn{right:6px;}
.collapse-btn{right:60px;}

.scroll-bottom{
  position:absolute;
  bottom:calc(102px + var(--safe-bottom));
  left:50%;
  transform:translateX(-50%);
  background:var(--panel);border:1px solid var(--border);color:var(--text);
  padding:10px 14px;border-radius:50%;
  cursor:pointer;box-shadow:var(--shadow-md);
  opacity:0;pointer-events:none;
  transition:opacity 0.2s, transform 0.2s ease;
  z-index:30;
}

.scroll-bottom:hover{
  background:var(--accent-glow);
  border-color:var(--user);
  transform:translateX(-50%) translateY(-1px);
}

.scroll-bottom.visible{opacity:1;pointer-events:all;}

footer{
  display:flex;
  gap:8px;
  padding:10px 16px;
  border-top:1px solid var(--border);
  background:rgba(15, 23, 42, 0.04);
  flex-shrink: 0;
  padding-bottom: calc(10px + var(--safe-bottom));
  align-items:stretch;
  backdrop-filter: blur(14px);
}

body.dark footer {
  background: rgba(15, 23, 42, 0.28);
}

.input-container{
  flex:1;display:flex;flex-direction:column;min-width:0;
  position:relative;
}

button:focus-visible,
input:focus-visible,
textarea:focus-visible,
select:focus-visible {
  outline: 2px solid var(--user);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

.status-banner {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  top: calc(10px + var(--safe-top));
  z-index: 1200;
  padding: 8px 18px;
  border-radius: 999px;
  background: var(--panel);
  color: var(--text);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
  backdrop-filter: blur(16px);
  font-size: 13px;
  font-weight: 600;
}

.ios-install-hint {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: calc(12px + var(--safe-bottom));
  z-index: 1200;
  width: min(92vw, 420px);
  background: var(--panel);
  color: var(--text);
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  box-shadow: var(--shadow-lg);
  font-size: 13px;
}

.ios-install-hint button {
  background: var(--user);
  border: none;
  color: #fff;
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
}

input{
  width:100%;padding:12px;border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:transparent;color:var(--text);
  outline:none;
  min-width: 0;
  box-sizing: border-box;
  font-family:inherit;
}

.char-counter{
  position:absolute;
  bottom:6px;
  right:10px;
  font-size:10px;
  color:var(--muted);
  padding:2px 5px;
  pointer-events:none;
  background:var(--chat);
  border-radius:4px;
  opacity:0.85;
}

button.send{
  min-height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 18px;border-radius:var(--radius-sm);
  border:none;background:var(--user);
  color:#fff;font-weight:700;cursor:pointer;
  font-family:inherit;
  font-size:14px;
  transition:all 0.15s;
  white-space:nowrap;
  flex-shrink:0;
}

button.send:hover{
  filter:brightness(1.1);
  transform:translateY(-1px);
}

button.send:active{
  transform:translateY(0);
}

.spinner{
  width:20px;height:20px;
  border:2.5px solid var(--border);
  border-top:2.5px solid var(--user);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{to{opacity:1;}}

#chat::-webkit-scrollbar {width: 6px;}
#chat::-webkit-scrollbar-track {background: transparent;}
#chat::-webkit-scrollbar-thumb {background-color: var(--border);border-radius: 6px;}
#chat::-webkit-scrollbar-thumb:hover {background-color: var(--muted);}

/* ===== MARKDOWN TYPOGRAPHY ===== */
.msg p { margin: 0 0 10px 0; }
.msg p:last-child { margin-bottom: 0; }

.msg strong { font-weight: 700; }
.msg em { font-style: italic; }

.msg ul, .msg ol { padding-left: 22px; margin: 8px 0; }
.msg li { margin-bottom: 4px; line-height: 1.6; }
.msg li::marker { color: var(--muted); }

.msg code:not(pre code) {
  background: rgba(127,127,127,0.12);
  padding: 2px 6px;
  border-radius: 5px;
  font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  font-size: 0.88em;
  font-weight: 500;
  word-break: break-word;
}
body.dark .msg code:not(pre code) {
  background: rgba(255,255,255,0.08);
}
.user code:not(pre code) {
  background: rgba(255,255,255,0.18);
}

.msg blockquote {
  margin: 10px 0;
  padding: 8px 14px;
  border-left: 3px solid var(--user);
  background: rgba(127,127,127,0.06);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: var(--muted);
  font-style: italic;
}
.msg blockquote p { margin: 0; }

.msg h1, .msg h2, .msg h3, .msg h4, .msg h5, .msg h6 {
  margin: 16px 0 8px 0;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.02em;
}
.msg h1 { font-size: 1.5em; }
.msg h2 { font-size: 1.3em; }
.msg h3 { font-size: 1.15em; }
.msg h4 { font-size: 1.05em; }
.msg h5, .msg h6 { font-size: 1em; color: var(--muted); }
.msg h1:first-child, .msg h2:first-child, .msg h3:first-child { margin-top: 0; }

.msg hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 14px 0;
}

.msg table {
  width: 100%;
  border-collapse: collapse;
  margin: 10px 0;
  font-size: 0.9em;
  overflow-x: auto;
  display: block;
}
.msg th, .msg td {
  padding: 8px 12px;
  border: 1px solid var(--border);
  text-align: left;
}
.msg th {
  background: rgba(127,127,127,0.08);
  font-weight: 700;
  font-size: 0.85em;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
}
.msg tr:nth-child(even) {
  background: rgba(127,127,127,0.04);
}

.msg img {
  max-width: 100%;
  border-radius: var(--radius-sm);
  margin: 6px 0;
}

.msg del, .msg s { text-decoration: line-through; color: var(--muted); }

<script>
// ===== INDEXEDDB SETUP =====
const DB_NAME = 'Spectrix_DB';
const DB_VERSION = 1;
let db = null;

async function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    
    request.onerror = () => reject(request.error);
    request.onsuccess = () => {
      db = request.result;
      resolve(db);
    };
    
    request.onupgradeneeded = (e) => {
      const database = e.target.result;
      
      if (!database.objectStoreNames.contains('chats')) {
        const chatStore = database.createObjectStore('chats', { keyPath: 'id' });
        chatStore.createIndex('timestamp', 'timestamp', { unique: false });
        chatStore.createIndex('pinned', 'pinned', { unique: false });
      }
      
      if (!database.objectStoreNames.contains('media')) {
        database.createObjectStore('media', { keyPath: 'id' });
      }
    };
  });
}

async function saveChat(chatData) {
  if (!db) await openDB();
  const tx = db.transaction('chats', 'readwrite');
  const store = tx.objectStore('chats');
  store.put(chatData);
  return new Promise((resolve, reject) => {
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function getChat(id) {
  if (!db) await openDB();
  const tx = db.transaction('chats', 'readonly');
  const store = tx.objectStore('chats');
  return new Promise((resolve, reject) => {
    const request = store.get(id);
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function getAllChats() {
  if (!db) await openDB();
  const tx = db.transaction('chats', 'readonly');
  const store = tx.objectStore('chats');
  return new Promise((resolve, reject) => {
    const request = store.getAll();
    request.onsuccess = () => resolve(request.result || []);
    request.onerror = () => reject(request.error);
  });
}

async function deleteChatFromDB(id) {
  if (!db) await openDB();
  const tx = db.transaction('chats', 'readwrite');
  const store = tx.objectStore('chats');
  store.delete(id);
  return new Promise((resolve, reject) => {
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function saveMedia(id, blob) {
  if (!db) await openDB();
  const tx = db.transaction('media', 'readwrite');
  const store = tx.objectStore('media');
  store.put({ id, blob });
  return new Promise((resolve, reject) => {
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function getMedia(id) {
  if (!db) await openDB();
  const tx = db.transaction('media', 'readonly');
  const store = tx.objectStore('media');
  return new Promise((resolve, reject) => {
    const request = store.get(id);
    request.onsuccess = () => resolve(request.result?.blob);
    request.onerror = () => reject(request.error);
  });
}

// ===== GLOBALS =====
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sidebar = document.getElementById("sidebar");
const historyList = document.getElementById("historyList");
const searchBox = document.getElementById("searchBox");
const scrollBottom = document.getElementById("scrollBottom");
const charCounter = document.getElementById("charCounter");
const headerTitle = document.getElementById("headerTitle");
const CURRENT_KEY = "Spectrix_current";
const PREPOPUP_KEY = "spectrix_prepopup_clicked";
const THEME_KEY = "Spectrix_theme";
const TTS_KEY = 'Spectrix_tts';
const IOS_HINT_KEY = 'Spectrix_ios_hint_dismissed';
const MAX_PROMPT_CHARS = 8000;
const MATH_FORMAT_SYSTEM_PROMPT = `When writing mathematical expressions, always use LaTeX delimiters.
- Inline math: $...$
- Display math: $$...$$
- Never wrap math in backticks.
- Keep normal code snippets in fenced code blocks only when it is actual code.`;
const API_WORKER_HOST = ['hac', 'koai-worker.tariqmtaezeem.workers.dev'].join('');
const CHAT_API_URL = `https://${API_WORKER_HOST}/chat`;
const FIXED_TEXT_MODEL = "google/gemma-3-27b-it";
const FIXED_VIDEO_MODEL = "ByteDance/Seedance-1.0-lite";

let sessions = {};
let currentId = localStorage.getItem(CURRENT_KEY) || null;
let lastUserPrompt = null;
let isGenerating = false;
let installPrompt;
const themeColorMeta = document.getElementById('themeColorMeta');
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

// ===== VOICE GLOBALS =====
let recognition = null;
let ttsEnabled = localStorage.getItem(TTS_KEY) === 'true';
let currentUtterance = null;

const ALLOWED_TAGS = new Set([
  'a', 'p', 'br', 'strong', 'em', 'code', 'pre', 'blockquote', 'ul', 'ol', 'li',
  'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'hr', 'table', 'thead', 'tbody', 'tr', 'th', 'td',
  'img', 'del', 's', 'mark', 'sup', 'sub', 'span'
]);

const ALLOWED_ATTRS = {
  a: new Set(['href', 'title', 'target', 'rel']),
  img: new Set(['src', 'alt', 'title', 'loading', 'decoding']),
  code: new Set(['class']),
  span: new Set(['class'])
};

// ===== INIT =====
async function initApp() {
  await openDB();
  await loadAllSessions();
  applySavedTheme();

  // 🔥 HARD SAFETY CHECK
  if (!currentId || !sessions[currentId]) {
    currentId = Object.keys(sessions)[0] || null;
    if (!currentId) {
      await createNewChat();
    } else {
      localStorage.setItem(CURRENT_KEY, currentId);
    }
  }

  renderHistory();
  updateHeaderTitle();
  loadChatMessages();
  initVoice();
  initEventListeners();
  initCompatibilityEnhancements();
  updateThemeColorMeta();
}


async function loadAllSessions() {
  const allChats = await getAllChats();
  sessions = {};
  allChats.forEach(chat => {
    sessions[chat.id] = chat;
  });
  
  if (Object.keys(sessions).length === 0) {
    await createNewChat();
  }
}

async function createNewChat() {
  currentId = Date.now().toString();
  const newSession = {
    id: currentId,
    title: "New Chat",
    messages: [],
    timestamp: Date.now(),
    pinned: false,
    autoTitled: false
  };
  sessions[currentId] = newSession;
  await saveChat(newSession);
  localStorage.setItem(CURRENT_KEY, currentId);
}

function getCurrentSession() {
  if (sessions[currentId]) return sessions[currentId];

  const first = Object.keys(sessions)[0];
  if (first) {
    currentId = first;
    localStorage.setItem(CURRENT_KEY, first);
    return sessions[first];
  }

  return null;
}

async function saveSessions() {
  const session = getCurrentSession();
  if (session) {
    await saveChat(session);
    renderHistory();
    updateHeaderTitle();
  }
}

async function saveMessage(role, content) {
  const session = getCurrentSession();
  session.messages.push({ role, content });
  session.timestamp = Date.now();
  await saveSessions();
}

// ===== VOICE SETUP =====
function initVoice() {
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      input.value = transcript;
      charCounter.textContent = `${transcript.length} chars`;
      document.getElementById('voiceBtn').classList.remove('recording');
      document.getElementById('voiceBtn').textContent = '🎤';
    };

    recognition.onerror = (event) => {
  console.error('Speech recognition error:', event.error);
  const btn = document.getElementById('voiceBtn');
  btn.classList.remove('recording');
  btn.textContent = '🎤';
  
  if (event.error === 'no-speech') {
    // Don't alert for "no speech detected" - it's annoying
    return;
  }
  if (event.error === 'not-allowed') {
    alert('Mic permission denied, dawg. Check browser settings 🎤❌');
  } else {
    alert(`Voice input error: ${event.error}`);
  }
};
    recognition.onend = () => {
      document.getElementById('voiceBtn').classList.remove('recording');
      document.getElementById('voiceBtn').textContent = '🎤';
    };
  }
  
  const btn = document.getElementById('ttsToggle');
  if (btn) {
    btn.classList.toggle('active', ttsEnabled);
    btn.textContent = ttsEnabled ? '🔊' : '🔇';
  }
}

function toggleVoiceInput() {
  if (!recognition) {
    alert('Speech recognition not supported in your browser 😢');
    return;
  }

  const btn = document.getElementById('voiceBtn');
  
  if (btn.classList.contains('recording')) {
    recognition.stop();
    btn.classList.remove('recording');
    btn.textContent = '🎤';
  } else {
    btn.classList.add('recording');
    btn.textContent = '⏺️';
    recognition.start();
  }
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  localStorage.setItem(TTS_KEY, ttsEnabled);
  const btn = document.getElementById('ttsToggle');
  btn.classList.toggle('active', ttsEnabled);
  btn.textContent = ttsEnabled ? '🔊' : '🔇';
  
  if (!ttsEnabled && currentUtterance) {
    window.speechSynthesis.cancel();
  }
}

function speakText(text) {
  if (!ttsEnabled || !('speechSynthesis' in window)) return;
  
  window.speechSynthesis.cancel();
  
  const cleanText = text
    .replace(/\*\*/g, ' ')
    .replace(/\*/g, ' ')
    .replace(/```[\s\S]*?```/g, '[code block]')
    .replace(/`[^`]+`/g, '')
    .replace(/#{1,6}\s/g, '')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/<[^>]+>/g, '')
    .trim();

  if (!cleanText) return;
  
  // 🔥 Limit TTS to first 500 chars for sanity
  const maxLength = 500;
  const finalText = cleanText.length > maxLength 
    ? cleanText.slice(0, maxLength) + '... response truncated for audio'
    : cleanText;

  currentUtterance = new SpeechSynthesisUtterance(finalText);
  currentUtterance.rate = 1.1;
  currentUtterance.pitch = 1;
  currentUtterance.volume = 0.9;
  
  const voices = speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en')) || voices[0];
  if (enVoice) currentUtterance.voice = enVoice;

  window.speechSynthesis.speak(currentUtterance);
}

// ===== MATH RENDERING =====
function renderMath(d) {
  if (!d || !d.textContent) return;
  const hasMath = /(\$\$[\s\S]+?\$\$|\\\([\s\S]+?\\\)|\\\[[\s\S]+?\\\]|\$[^$\n]+\$)/.test(d.textContent);
  if (!hasMath) return;

  if (window.renderMathInElement) {
    try {
      renderMathInElement(d, {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "\\(", right: "\\)", display: false },
          { left: "$", right: "$", display: false }
        ],
        throwOnError: false,
        strict: "ignore"
      });
    } catch (error) {
      console.warn('KaTeX render warning:', error);
    }
  }

  if (window.MathJax?.typesetPromise) {
    window.MathJax.typesetClear?.([d]);
    window.MathJax.typesetPromise([d]).catch((error) => {
      console.warn('MathJax render warning:', error);
    });
  }
}

// ===== RETRY/EDIT =====
async function retryLast() {
  if (isGenerating) {
    showStatus("Please wait for current generation to finish.");
    return;
  }

  isGenerating = false;

  const session = getCurrentSession();
  if (!session || !Array.isArray(session.messages) || session.messages.length === 0) return;

  let lastBotIndex = -1;
  for (let i = session.messages.length - 1; i >= 0; i--) {
    if (session.messages[i].role === "bot" && typeof session.messages[i].content === "string") {
      lastBotIndex = i;
      break;
    }
  }

  if (lastBotIndex === -1) {
    showStatus("Nothing to retry yet.");
    return;
  }

  session.messages.splice(lastBotIndex, 1);

  let retryPrompt = null;
  for (let i = lastBotIndex - 1; i >= 0; i--) {
    const message = session.messages[i];
    if (message.role === "user" && typeof message.content === "string") {
      retryPrompt = message.content;
      break;
    }
  }

  if (!retryPrompt) {
    showStatus("Could not find a user message to retry.");
    return;
  }

  lastUserPrompt = retryPrompt;
  session.autoTitled = false;
  session.timestamp = Date.now();
  await saveSessions();
  await loadChatMessages();

  await send({
    promptOverride: retryPrompt,
    skipUserRender: true,
    skipUserSave: true
  });
}

async function editMessage(messageIndex, oldContent) {
  if (isGenerating) {
    showStatus("Please wait for current generation to finish.");
    return;
  }

  const edited = window.prompt("Edit your message", String(oldContent || ""));
  if (edited === null) return;

  const updatedContent = edited.trim();
  if (!updatedContent) {
    showStatus("Message cannot be empty.");
    return;
  }

  const session = getCurrentSession();
  if (!session || !Array.isArray(session.messages)) return;
  if (!Number.isInteger(messageIndex) || !session.messages[messageIndex] || session.messages[messageIndex].role !== "user") {
    showStatus("Unable to edit this message.");
    return;
  }

  session.messages[messageIndex].content = updatedContent;
  session.messages = session.messages.slice(0, messageIndex + 1);
  session.autoTitled = false;
  session.timestamp = Date.now();
  lastUserPrompt = updatedContent;

  await saveSessions();
  await loadChatMessages();

  await send({
    promptOverride: updatedContent,
    skipUserRender: true,
    skipUserSave: true
  });
}

// ===== CHAT HISTORY =====
function groupByTime(sessions) {
  const now = Date.now();
  const day = 86400000;
  
  const groups = {
    pinned: [],
    today: [],
    yesterday: [],
    week: [],
    older: []
  };
  
  sessions.forEach(s => {
    if (s.pinned) {
      groups.pinned.push(s);
      return;
    }
    const diff = now - s.timestamp;
    if (diff < day) groups.today.push(s);
    else if (diff < day * 2) groups.yesterday.push(s);
    else if (diff < day * 7) groups.week.push(s);
    else groups.older.push(s);
  });
  
  return groups;
}

function renderHistory() {
  const query = searchBox.value.toLowerCase().trim();
  let filtered = Object.values(sessions);
  
  if (query) {
    filtered = filtered.filter(s =>
      s.title.toLowerCase().includes(query) ||
      s.messages.some(m =>
        typeof m.content === "string" &&
        m.content.toLowerCase().includes(query)
      )
    );
  }
  
  const sorted = filtered.sort((a, b) => b.timestamp - a.timestamp);
  const groups = groupByTime(sorted);
  
  historyList.innerHTML = "";
  
  const renderGroup = (title, items) => {
    if (items.length === 0) return;
    
    const groupDiv = document.createElement("div");
    groupDiv.className = "history-group";
    
    const titleDiv = document.createElement("div");
    titleDiv.className = "history-group-title";
    titleDiv.textContent = title;
    groupDiv.appendChild(titleDiv);
    
    items.forEach(s => {
      const div = document.createElement("div");
      div.className = "history-item" + (s.id === currentId ? " active" : "") + (s.pinned ? " pinned" : "");
      
      const title = document.createElement("span");
      title.className = "title";
      title.textContent = s.title;
      title.ondblclick = (e) => {
        e.stopPropagation();
        editChatTitle(s.id, title, div);
      };
      
      const actions = document.createElement("div");
      actions.className = "history-item-actions";
      
      const pin = document.createElement("button");
      pin.className = "pin-chat";
      pin.textContent = s.pinned ? "⭐" : "☆";
      pin.onclick = (e) => {
        e.stopPropagation();
        togglePin(s.id);
      };
      
      const del = document.createElement("button");
      del.className = "delete-chat";
      del.textContent = "✕";
      del.onclick = (e) => {
        e.stopPropagation();
        deleteChatHandler(s.id);
      };
      
      actions.appendChild(pin);
      actions.appendChild(del);
      
      div.appendChild(title);
      div.appendChild(actions);
      div.onclick = () => loadChatHandler(s.id);
      
      groupDiv.appendChild(div);
    });
    
    historyList.appendChild(groupDiv);
  };
  
  renderGroup("📌 PINNED", groups.pinned);
  renderGroup("TODAY", groups.today);
  renderGroup("YESTERDAY", groups.yesterday);
  renderGroup("THIS WEEK", groups.week);
  renderGroup("OLDER", groups.older);
}

function editChatTitle(id, titleSpan, parentDiv) {
  const session = sessions[id];
  const oldTitle = session.title;
  
  const input = document.createElement("input");
  input.type = "text";
  input.className = "title-input";
  input.value = oldTitle;
  
  input.onclick = (e) => e.stopPropagation();
  
  titleSpan.replaceWith(input);
  input.focus();
  input.select();
  
  const save = async () => {
    const newTitle = input.value.trim();
    if (newTitle && newTitle !== oldTitle) {
      session.title = newTitle;
      if (id === currentId) {
        updateHeaderTitle();
      }
      await saveSessions();
    }
    
    const newSpan = document.createElement("span");
    newSpan.className = "title";
    newSpan.textContent = session.title;
    newSpan.ondblclick = (e) => {
      e.stopPropagation();
      editChatTitle(id, newSpan, parentDiv);
    };
    input.replaceWith(newSpan);
  };
  
  input.onblur = save;
  input.onkeydown = (e) => {
    e.stopPropagation();
    if (e.key === "Enter") {
      e.preventDefault();
      input.blur();
    }
    if (e.key === "Escape") {
      input.value = oldTitle;
      input.blur();
    }
  };
}

async function loadChatMessages() {
  chat.innerHTML = "";
  const session = getCurrentSession();
  if (!session) return;

  for (let idx = 0; idx < session.messages.length; idx++) {
    const m = session.messages[idx];
    if (typeof m.content === "object" && m.content.mediaId) {
      const blob = await getMedia(m.content.mediaId);
      if (blob) {
        const url = URL.createObjectURL(blob);
        render(m.role, { ...m.content, src: url }, false, idx);
      }
    } else {
      render(m.role, m.content, false, idx);
    }
  }

  scrollToBottom();
}

function time() {
  const d = new Date();
  return d.getHours().toString().padStart(2, '0') + ":" +
         d.getMinutes().toString().padStart(2, '0');
}

function preprocess(text) {
  const normalizedText = text
    .replace(/\[CODE\]/gi, '```')
    .replace(/\[\/CODE\]/gi, '```')
    .replace(/\[code\s+lang=["']?(\w+)["']?\]/gi, '```$1')
    .replace(/<\/?(s|del|strike)>/gi, "");

  return normalizeMathMarkup(normalizedText);
}

function looksLikeMathExpression(value) {
  if (!value) return false;
  const v = String(value).trim();
  if (!v) return false;

  if (/\\(frac|sqrt|sum|int|prod|lim|theta|alpha|beta|gamma|Delta|lambda|pi|sin|cos|tan)/i.test(v)) return true;
  if (/[∫∑∏√∞≈≤≥≠π]/.test(v)) return true;
  if (/\b[a-zA-Z]\s*\^\s*\d+\b/.test(v)) return true;
  if (/\b[a-zA-Z]\s*_\s*[a-zA-Z0-9]+\b/.test(v)) return true;
  if (/\b(d\/dx|dy\/dx|dx|dy|dz)\b/i.test(v)) return true;
  if (/\$\$?[\s\S]*\$\$?/.test(v)) return true;

  return false;
}

function normalizeMathMarkup(text) {
  if (!text) return text;

  let normalized = String(text);

  normalized = normalized.replace(/`([^`\n]+)`/g, (full, inner) => {
    if (!looksLikeMathExpression(inner)) return full;
    const candidate = inner.trim().replace(/^\$+|\$+$/g, '');
    return `$${candidate}$`;
  });

  normalized = normalized.replace(/(^|\n)(\s*)(\\(?:int|sum|prod|frac|sqrt|lim|theta|alpha|beta|gamma|Delta|lambda|pi)\b[^\n]*)(?=\n|$)/gi, (full, lead, indent, expr) => {
    const cleaned = expr.trim().replace(/^\$\$?|\$\$?$/g, '');
    return `${lead}${indent}$$${cleaned}$$`;
  });

  return normalized;
}

function promoteInlineCodeMath(container) {
  if (!container) return;

  const codeNodes = container.querySelectorAll('code');
  codeNodes.forEach((node) => {
    if (node.closest('pre')) return;

    const raw = (node.textContent || '').trim();
    if (!looksLikeMathExpression(raw)) return;

    const cleaned = raw.replace(/^\$+|\$+$/g, '');
    const replacement = document.createTextNode(`$${cleaned}$`);
    node.replaceWith(replacement);
  });
}

function sanitizeMarkdownHtml(rawHtml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(`<div>${rawHtml}</div>`, 'text/html');
  const root = doc.body.firstElementChild;
  if (!root) return '';

  const sanitizeNode = (node) => {
    if (node.nodeType === Node.TEXT_NODE) return;
    if (node.nodeType !== Node.ELEMENT_NODE) {
      node.remove();
      return;
    }

    const tag = node.tagName.toLowerCase();
    if (!ALLOWED_TAGS.has(tag)) {
      const text = doc.createTextNode(node.textContent || '');
      node.replaceWith(text);
      return;
    }

    [...node.attributes].forEach((attr) => {
      const name = attr.name.toLowerCase();
      const value = attr.value;
      const allowedForTag = ALLOWED_ATTRS[tag];

      if (name.startsWith('on')) {
        node.removeAttribute(attr.name);
        return;
      }

      if (name === 'style' || name === 'srcset') {
        node.removeAttribute(attr.name);
        return;
      }

      if (name === 'href' || name === 'src') {
        if (!/^(https?:|data:image\/|blob:|\/|#)/i.test(value.trim())) {
          node.removeAttribute(attr.name);
          return;
        }
      }

      if (allowedForTag && allowedForTag.has(name)) return;
      if ((tag === 'a' || tag === 'img') && (name === 'href' || name === 'src')) return;
      node.removeAttribute(attr.name);
    });

    if (tag === 'a') {
      node.setAttribute('target', '_blank');
      node.setAttribute('rel', 'noopener noreferrer nofollow');
    }

    if (tag === 'img') {
      if (!node.getAttribute('alt')) node.setAttribute('alt', 'Generated image');
      node.setAttribute('loading', 'lazy');
      node.setAttribute('decoding', 'async');
    }

    [...node.childNodes].forEach(sanitizeNode);
  };

  [...root.childNodes].forEach(sanitizeNode);
  return root.innerHTML;
}

function renderMarkdownSafely(content) {
  const text = preprocess(String(content));
  if (!window.marked) return text;
  const parsed = marked.parse(text);
  return sanitizeMarkdownHtml(parsed);
}

function decorateCodeBlocks(container) {
  if (!window.hljs) return;

  const blocks = container.querySelectorAll("pre code");
  blocks.forEach((block) => {
    hljs.highlightElement(block);
    const pre = block.parentElement;
    if (!pre || pre.dataset.enhanced === 'true') return;
    pre.dataset.enhanced = 'true';

    const collapseBtn = document.createElement("button");
    collapseBtn.className = "collapse-btn";
    collapseBtn.textContent = "▼";
    collapseBtn.onclick = () => {
      pre.classList.toggle("collapsed");
      collapseBtn.textContent = pre.classList.contains("collapsed") ? "▶" : "▼";
    };

    const copyBtn = document.createElement("button");
    copyBtn.className = "copy-btn";
    copyBtn.textContent = "COPY";
    copyBtn.onclick = async () => {
      try {
        await navigator.clipboard.writeText(block.textContent || '');
        copyBtn.textContent = "COPIED";
      } catch {
        copyBtn.textContent = "FAILED";
      }
      setTimeout(() => {
        copyBtn.textContent = "COPY";
      }, 1200);
    };

    pre.appendChild(collapseBtn);
    pre.appendChild(copyBtn);
  });
}

async function fetchWithTimeoutRetry(url, options = {}, retryCount = 1) {
  const timeoutMs = options.timeoutMs || 35000;
  const { timeoutMs: ignored, ...fetchOptions } = options;
  let lastError = null;

  for (let attempt = 0; attempt <= retryCount; attempt++) {
    const controller = new AbortController();
    const timeoutHandle = setTimeout(() => controller.abort(), timeoutMs);

    try {
      const response = await fetch(url, {
        ...fetchOptions,
        signal: controller.signal
      });
      clearTimeout(timeoutHandle);

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      return response;
    } catch (error) {
      clearTimeout(timeoutHandle);
      lastError = error;
      if (attempt < retryCount) {
        await new Promise((resolve) => setTimeout(resolve, 500 * (attempt + 1)));
      }
    }
  }

  if (lastError && lastError.name === 'AbortError') {
    throw new Error('Request timed out. Please try again.');
  }

  throw lastError || new Error('Request failed');
}

// ===== RENDER MESSAGE =====
function render(role, content, saveIt = true, messageIndex = null) {
  const d = document.createElement("div");
  d.className = "msg " + role;

  if (typeof content === "object" && content.type === "image") {
    const img = document.createElement("img");
    img.src = content.src;
    img.className = "ai-img";
    d.appendChild(img);
  } 
  else if (typeof content === "object" && content.type === "video") {
    const video = document.createElement("video");
    video.src = content.src;
    video.controls = true;
    video.autoplay = true;
    video.loop = true;
    video.style.maxWidth = "100%";
    video.style.borderRadius = "12px";
    d.appendChild(video);
  } 
  else {
	if (window.marked) {
      d.innerHTML = renderMarkdownSafely(content);
      promoteInlineCodeMath(d);
    }
	else {
  	d.textContent = String(content);
	}
    renderMath(d);
  }

  if (role === "user" && typeof content === "string") {
    const actions = document.createElement("div");
    actions.className = "msg-actions";

    const editBtn = document.createElement("button");
    editBtn.className = "msg-btn";
    editBtn.textContent = "✏️ Edit";
    editBtn.onclick = () => {
      let resolvedIndex = messageIndex;
      if (!Number.isInteger(resolvedIndex)) {
        const session = getCurrentSession();
        if (session?.messages) {
          for (let i = session.messages.length - 1; i >= 0; i--) {
            const msg = session.messages[i];
            if (msg.role === "user" && msg.content === content) {
              resolvedIndex = i;
              break;
            }
          }
        }
      }
      editMessage(resolvedIndex, content);
    };

    actions.appendChild(editBtn);
    d.appendChild(actions);
  }

  if (role === "bot" && typeof content === "string") {
    const actions = document.createElement("div");
    actions.className = "msg-actions";

    const retryBtn = document.createElement("button");
    retryBtn.className = "msg-btn";
    retryBtn.textContent = "🔄 Retry";
    retryBtn.onclick = retryLast;

    actions.appendChild(retryBtn);
    d.appendChild(actions);
  }

  setTimeout(() => decorateCodeBlocks(d), 80);

  const t = document.createElement("div");
  t.className = "timestamp";
  t.textContent = time();
  d.appendChild(t);

  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;

  if (saveIt) saveMessage(role, content);
  return d;
}

// ===== STREAMING =====
async function streamBotInChunks(fullText, baseChunkSize = 50) {
  const d = document.createElement("div");
  d.className = "msg bot";
  chat.appendChild(d);

  let renderedText = "";
  const session = getCurrentSession();
  await saveMessage("bot", "");
  const botIndex = session.messages.length - 1;

  const totalLength = fullText.length;
  let chunkSize = baseChunkSize;
  
  // 🔥 Adaptive chunking - bigger chunks for long responses
  if (totalLength > 5000) chunkSize = 100;
  if (totalLength > 10000) chunkSize = 200;

  for (let i = 0; i < fullText.length; i += chunkSize) {
    const chunk = fullText.slice(i, i + chunkSize);
    renderedText += chunk;
    
    if (window.marked) {
      d.innerHTML = renderMarkdownSafely(renderedText);
      promoteInlineCodeMath(d);
    } else {
      d.textContent = renderedText;
    }
    renderMath(d);
    chat.scrollTop = chat.scrollHeight;

    session.messages[botIndex].content = renderedText;
    
    // Save less frequently for long responses
    if (i % (chunkSize * 5) === 0 || i + chunkSize >= fullText.length) {
      await saveChat(session);
    }

    await new Promise(r => setTimeout(r, totalLength > 5000 ? 5 : 15));
  }

  speakText(renderedText)
  
  setTimeout(() => decorateCodeBlocks(d), 80);

  await saveSessions();
}

// ===== FULL AUTO TITLE =====
async function generateTitle(userPrompt, botReply) {
  try {
    const res = await fetchWithTimeoutRetry(CHAT_API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      timeoutMs: 22000,
      body: JSON.stringify({
        model: FIXED_TEXT_MODEL,
        messages: [
          {
            role: "system",
            content: `
You are a smart assistant that generates short chat titles.
- Titles must be 3–5 words.
- Do NOT include quotes, backticks, or phrases like "Here is a chat title".
- Do NOT include "Title:"
- Keep it plain, punchy, and readable.
- Summarize the essence of the conversation, not just copy words.
- Avoid special characters or excessive punctuation.
- Keep it under 4 characters.
`
          },
          {
            role: "user",
            content: `
User said: ${userPrompt}
Assistant replied: ${botReply}

Create a concise title that captures the main topic of this conversation.
`
          }
        ]
      })
    });

    const data = await res.json();
    const rawTitle = data?.choices?.[0]?.message?.content || "";

    // ==== CLEAN & FORMAT ====
    let cleanTitle = rawTitle
      .replace(/["'`\n]/g, "")     // remove quotes, backticks, line breaks
      .replace(/\*{1,2}/g, "")     // remove bold/italic markdown
      .replace(/#{1,6}\s?/g, "")   // remove heading markers
      .replace(/\s+/g, " ")        // collapse multiple spaces
      .trim()
      .split(" ")                  // limit words
      .slice(0, 5)
      .join(" ");

    // Fallback: if title is empty, use first 5 words of user prompt
    if (!cleanTitle) {
      cleanTitle = userPrompt
        .replace(/\s+/g, " ")
        .trim()
        .split(" ")
        .slice(0, 5)
        .join(" ");
    }

    return cleanTitle || "New Chat";
  } catch (err) {
    console.error("Title generation failed:", err);

    // Final fallback
    return userPrompt
      ? userPrompt.replace(/\s+/g, " ").trim().split(" ").slice(0, 5).join(" ")
      : "New Chat";
  }
}

// ===== SEND MESSAGE =====
async function send(options = {}) {
  const {
    promptOverride = null,
    skipUserRender = false,
    skipUserSave = false
  } = options;

  if (isGenerating) {
    alert("Generation already in progress");
    return;
  }

  let prompt = String(promptOverride ?? input.value).trim();
  if (!prompt) return;
  if (prompt.length > MAX_PROMPT_CHARS) {
    showStatus(`Message too long. Max ${MAX_PROMPT_CHARS} characters.`);
    return;
  }

  isGenerating = true;
  lastUserPrompt = prompt;

  const firstUserPrompt = prompt;
  const session = getCurrentSession();
  const shouldAutoTitle =
    !skipUserSave &&
    !session.autoTitled &&
    session.messages.filter(m => m.role === "user").length === 0 &&
    !prompt.startsWith("/img") &&
    !prompt.startsWith("/vid");

  input.value = "";
  input.style.height = "";
  charCounter.textContent = "0 chars";

  const isImage = prompt.startsWith("/img ");
  const isVideo = prompt.startsWith("/vid ");

  if (isImage || isVideo) prompt = prompt.slice(5);

  if (!skipUserRender) {
    render("user", prompt);
  }

  const loading = document.createElement("div");
  loading.className = "msg bot";
  loading.innerHTML = "<div class='spinner'></div>";
  chat.appendChild(loading);
  chat.scrollTop = chat.scrollHeight;

  try {
    if (isImage) {
      if (!window.puter?.ai) {
        throw new Error("Puter SDK not loaded");
      }

      const model = document.getElementById("imageModel").value;
      const img = await puter.ai.txt2img(prompt, { model, disable_safety_checker: true });
      loading.remove();
      isGenerating = false;

      img.classList.add("ai-img");
      img.onload = async () => {
        const canvas = document.createElement("canvas");
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        canvas.getContext("2d").drawImage(img, 0, 0);
        const base64 = canvas.toDataURL();

        const mediaId = `img_${Date.now()}`;
        const blob = await (await fetch(base64)).blob();
        await saveMedia(mediaId, blob);
        await saveMessage("bot", { type: "image", src: base64, mediaId });
      };

      const div = document.createElement("div");
      div.className = "msg bot";
      div.appendChild(img);
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
    else if (isVideo) {
      if (!window.puter?.ai) {
        throw new Error("Puter SDK not loaded");
      }

      const video = await puter.ai.txt2vid(prompt, { model: FIXED_VIDEO_MODEL, seconds: 8 });
      loading.remove();
      isGenerating = false;

      const blob = await fetch(video.src).then(r => r.blob());
      const reader = new FileReader();
      reader.onloadend = async () => {
        const div = document.createElement("div");
        div.className = "msg bot";

        const savedVideo = document.createElement("video");
        savedVideo.src = reader.result;
        savedVideo.controls = true;
        savedVideo.autoplay = true;
        savedVideo.loop = true;
        savedVideo.style.maxWidth = "100%";
        savedVideo.style.borderRadius = "12px";

        div.appendChild(savedVideo);
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;

        const mediaId = `vid_${Date.now()}`;
        await saveMedia(mediaId, blob);
        await saveMessage("bot", { type: "video", src: reader.result, mediaId });
      };
      reader.readAsDataURL(blob);
    }
    else {
      const model = FIXED_TEXT_MODEL;

      const messages = session.messages
        .filter(m => typeof m.content === "string")
        .map(m => ({ role: m.role === "bot" ? "assistant" : "user", content: m.content }));

      messages.unshift({ role: "system", content: MATH_FORMAT_SYSTEM_PROMPT });

      if (!skipUserSave) {
        messages.push({ role: "user", content: prompt });
      }

      const res = await fetchWithTimeoutRetry(CHAT_API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        timeoutMs: 30000,
        body: JSON.stringify({ model: model, messages: messages })
      }, 1);

      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch { throw new Error("Server returned invalid response"); }

      const answer = data.choices?.[0]?.message?.content || `💀 Empty response from ${model}`;
      loading.remove();
      await streamBotInChunks(answer);
      isGenerating = false;

      if (shouldAutoTitle) {
        try {
          const title = await generateTitle(firstUserPrompt, answer);
          session.title = title;
          session.autoTitled = true;
          await saveSessions();
          updateHeaderTitle();
        } catch (err) {
          console.error("Auto-title fallback:", err);
        }
      }
    }
  } catch (err) {
    console.error("Send error:", err);
    isGenerating = false;
    loading.remove();
    render("bot", "**Error generating response 💀** " + err.message);
  }
}

function toggleTheme() {
  document.body.classList.toggle("dark");
  localStorage.setItem(THEME_KEY, document.body.classList.contains('dark') ? 'dark' : 'light');
  updateThemeColorMeta();
}

function updateThemeColorMeta() {
  if (!themeColorMeta) return;
  themeColorMeta.setAttribute('content', document.body.classList.contains('dark') ? '#020617' : '#f4f4f5');
}

function showStatus(message, timeout = 2600) {
  const banner = document.getElementById('statusBanner');
  if (!banner) return;
  banner.textContent = message;
  banner.style.display = 'block';
  clearTimeout(showStatus._timer);
  showStatus._timer = setTimeout(() => {
    banner.style.display = 'none';
  }, timeout);
}

function showIOSInstallHint() {
  if (!isIOS || isStandalone || localStorage.getItem(IOS_HINT_KEY) === 'true') return;
  if (document.getElementById('iosInstallHint')) return;

  const hint = document.createElement('div');
  hint.id = 'iosInstallHint';
  hint.className = 'ios-install-hint';
  hint.innerHTML = '<span>Install on iPhone/iPad: tap Share, then Add to Home Screen.</span>';

  const dismissBtn = document.createElement('button');
  dismissBtn.textContent = 'OK';
  dismissBtn.setAttribute('aria-label', 'Dismiss iOS install hint');
  dismissBtn.onclick = () => {
    localStorage.setItem(IOS_HINT_KEY, 'true');
    hint.remove();
  };

  hint.appendChild(dismissBtn);
  document.body.appendChild(hint);
}

function initCompatibilityEnhancements() {
  const announceNetworkState = () => {
    showStatus(navigator.onLine ? 'Back online' : 'You are offline. Local chat history still works.');
  };

  window.addEventListener('online', announceNetworkState);
  window.addEventListener('offline', announceNetworkState);
  showIOSInstallHint();
}

async function applyLaunchParams() {
  const params = new URLSearchParams(window.location.search);
  const action = params.get('action');
  const promptParam = params.get('prompt');
  const sharedText = params.get('text');
  const sharedTitle = params.get('title');
  const sharedUrl = params.get('url');

  if (action === 'new-chat') {
    await newChat();
    showStatus('New chat ready');
  }

  if (action === 'voice') {
    showStatus('Tap 🎤 to start voice input');
  }

  const launchText = [sharedTitle, sharedText, sharedUrl, promptParam]
    .filter(Boolean)
    .join('\n')
    .trim();

  if (launchText) {
    input.value = launchText;
    input.dispatchEvent(new Event('input'));
    input.focus();
  }
}

// ===== EVENT LISTENERS =====
function initEventListeners() {
  function resizeInput() {
    input.style.height = "";
    input.style.height = input.scrollHeight + "px";
  }

  input.addEventListener("input", () => {
    const len = input.value.length;
    charCounter.textContent = `${len} chars`;
    charCounter.style.color = len > 4000 ? "#ef4444" : len > 2000 ? "#f59e0b" : "var(--muted)";
    resizeInput();
  });

  input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    if (!e.shiftKey) {
      e.preventDefault();
      send();
    } 
    // else: shift+Enter => newline, do nothing
  }
});

  searchBox.addEventListener("input", renderHistory);

  chat.addEventListener("scroll", () => {
    const atBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 50;
    scrollBottom.classList.toggle("visible", !atBottom);
  });

  document.addEventListener("keydown", (e) => {
    if (e.ctrlKey && e.key === "b") {
      e.preventDefault();
      newChat();
    }
    if (e.ctrlKey && e.key === "/") {
      e.preventDefault();
      searchBox.focus();
    }
  });
}

// ===== PWA INSTALL =====
window.addEventListener('beforeinstallprompt', e => {
  if (window.innerWidth > 768) return; // hide on desktop

  e.preventDefault();
  if (document.getElementById("installBtn")) return;

  installPrompt = e;

  const btn = document.createElement('button');
  btn.id = "installBtn";
  btn.textContent = '📲 Install App';

  btn.style.cssText = `
    position:fixed;bottom:calc(80px + env(safe-area-inset-bottom, 0px));right:20px;
    background:#2563eb;color:#fff;border:none;
    padding:10px 20px;border-radius:50px;
    font-weight:600;cursor:pointer;
    box-shadow:0 10px 30px rgba(37,99,235,0.5);
    z-index:999;
  `;

  btn.onclick = async () => {
    installPrompt.prompt();
    await installPrompt.userChoice;
    installPrompt = null;
    btn.remove();
  };

  document.body.appendChild(btn);

  setTimeout(() => {
    if (btn.parentNode) btn.remove();
  }, 10000);
});

// ===== SHARE TARGET =====
if (window.location.pathname === '/share') {
  window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const sharedText = params.get('text');
    const sharedUrl = params.get('url');
    const sharedTitle = params.get('title');
    
    if (sharedText || sharedUrl || sharedTitle) {
      let content = '';
      if (sharedTitle) content += sharedTitle + '\n';
      if (sharedText) content += sharedText + '\n';
      if (sharedUrl) content += sharedUrl;
      
      input.value = content.trim();
      input.focus();
    }
  });
}

if ('launchQueue' in window) {
  launchQueue.setConsumer((launchParams) => {
    if (launchParams.files && launchParams.files.length) {
      launchParams.files[0].getFile().then(file => {
        file.text().then(content => {
          input.value = content;
        });
      });
    }
  });
}

// ===== PRE-POPUP =====
const prePopup = document.getElementById("prePopup");
const goToPuter = document.getElementById("goToPuter");

if (prePopup && localStorage.getItem(PREPOPUP_KEY) === "true") {
  prePopup.style.display = "none";
}

if (goToPuter && prePopup) {
  goToPuter.addEventListener("click", () => {
    localStorage.setItem(PREPOPUP_KEY, "true");
    prePopup.style.display = "none";
    window.open("https://puter.com/dashboard", "_blank");
  });
}
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then((registration) => {
        console.log('🔥 Spectrix SW registered', registration.scope);

        const activateUpdate = () => {
          if (!registration.waiting) return;
          showStatus('Updating app…');
          registration.waiting.postMessage({ type: 'SKIP_WAITING' });
        };

        if (registration.waiting) {
          activateUpdate();
        }

        registration.addEventListener('updatefound', () => {
          const newWorker = registration.installing;
          if (!newWorker) return;

          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showStatus('New version found. Applying update…');
              activateUpdate();
            }
          });
        });

        setInterval(() => {
          registration.update().catch(() => {});
        }, 60 * 60 * 1000);
      })
      .catch(err => console.error('SW failed:', err));

    navigator.serviceWorker.addEventListener('message', (event) => {
      if (!event.data || typeof event.data.type !== 'string') return;
      if (event.data.type === 'SW_ACTIVE') {
        showStatus('Offline caching is ready');
      }
      if (event.data.type === 'SW_CACHE_CLEARED') {
        showStatus('App cache cleared');
      }
    });

    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (window.__spectrixReloading) return;
      window.__spectrixReloading = true;
      window.location.reload();
    });
  });
}
// ===== INIT APP ON LOAD =====
document.addEventListener("DOMContentLoaded", async () => {
  await initApp();
  await applyLaunchParams();
});
</script>
