<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spectrix AI</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
<meta name="mobile-web-app-capable" content="yes">
<meta id="themeColorMeta" name="theme-color" content="#020617">
<meta name="application-name" content="Spectrix AI">
<meta name="description" content="Spectrix AI is a fast voice-enabled AI chat web app with installable offline-ready PWA support made by Muhammad Taezeem Tariq Matta.">
<meta name="color-scheme" content="dark light">
<meta name="format-detection" content="telephone=no,email=no,address=no">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spectrix AI">
<link rel="manifest" href="/site.webmanifest">
<meta name="google-site-verification" content="JhkPJl6nEawBgQ9fu1ExQ6RrsLKD0XNVLIzmC-_uD_E" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap">
<script src="https://js.puter.com/v2/"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/go.min.js"></script>
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true
  },
  options: {
    skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
  },
  startup: {
    typeset: false
  }
};
</script>

<style>
*{
	box-sizing:border-box;
	margin:0;
	padding:0;
}

html, body {
  overflow-x: hidden;
}

	.container,
.app,
#chat {
  overflow-x: hidden;
}

	pre, code {
  max-width: 100%;
  word-break: break-word;
}


:root{
  --bg:#f8f9fa; --panel:#ffffff; --chat:#f1f3f5;
  --border:#e2e8f0; --user:#2563eb; --bot:#ffffff;
  --text:#1a1a2e; --muted:#64748b;
  --code-bg:#0f172a; --code-bg-2:#1e293b;
  --code-border:rgba(15,23,42,0.28);
  --code-toolbar:rgba(15,23,42,0.58);
  --code-text:#e2e8f0;
  --link:#2563eb; --sidebar:#f8f9fa;
  --radius-lg:20px;
  --radius-md:14px;
  --radius-sm:10px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.12);
  --shadow-xl:0 24px 80px rgba(0,0,0,0.18);
  --accent-glow:rgba(37,99,235,0.15);
  --safe-top:env(safe-area-inset-top, 0px);
  --safe-right:env(safe-area-inset-right, 0px);
  --safe-bottom:env(safe-area-inset-bottom, 0px);
  --safe-left:env(safe-area-inset-left, 0px);
}

/* ===== CODE BLOCK SCROLLBAR (HORIZONTAL) ===== */
pre::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

pre::-webkit-scrollbar-track {
  background: rgba(148,163,184,0.08);
  border-radius: 10px;
}

pre::-webkit-scrollbar-thumb {
  background: rgba(148,163,184,0.38);
  border-radius: 10px;
}

pre::-webkit-scrollbar-thumb:hover {
  background: rgba(148,163,184,0.6);
}

pre {
  scrollbar-width: thin;
  scrollbar-color: rgba(148,163,184,0.55) rgba(148,163,184,0.1);
}

button.toggle:hover {
  background: var(--accent-glow);
  border-color: var(--user);
  transform: translateY(-1px);
}

body.dark{
  --bg:#0c0c14; --panel:#16161e; --chat:#1a1a24;
  --border:rgba(255,255,255,0.08); --user:#3b82f6; --bot:#1e1e2a;
  --text:#e8e8ed; --muted:#8b8fa3;
  --code-bg:#0b1020; --code-bg-2:#11192e;
  --code-border:rgba(148,163,184,0.24);
  --code-toolbar:rgba(2,6,23,0.64);
  --code-text:#e2e8f0;
  --link:#60a5fa; --sidebar:#111118;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.3);
  --shadow-md:0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.5);
  --shadow-xl:0 28px 90px rgba(0,0,0,0.6);
  --accent-glow:rgba(59,130,246,0.12);
}

body{
  font-family: 'Raleway', -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
  font-size: 16px;
  font-weight: 450;
  letter-spacing: -0.01em;
  line-height: 1.6;
  background:
    radial-gradient(circle at 12% 8%, var(--accent-glow), transparent 38%),
    radial-gradient(circle at 88% 92%, var(--accent-glow), transparent 42%),
    var(--bg);
  display:flex;justify-content:center;align-items:center;
  min-height:100dvh;
  height:100vh;
  color:var(--text);
  overflow: hidden;
  padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

.container{
  width:100%;max-width:1280px;height:calc(100dvh - var(--safe-top) - var(--safe-bottom));
  display:flex;gap:0;
  box-shadow: var(--shadow-xl);
  border-radius:24px;overflow:hidden;
  border: 1px solid var(--border);
  backdrop-filter: blur(14px);
}

.sidebar{
  width:280px;
  background:linear-gradient(180deg, var(--sidebar), var(--panel));
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  position: relative;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s ease;
}

.sidebar-header{
  padding:16px;
  border-bottom:1px solid var(--border);
  font-weight:600;display:flex;
  justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:10px;
  background:var(--sidebar);
  position: sticky;
  top: 0;
  z-index: 5;
}

.sidebar-controls{
  display:flex;gap:6px;width:100%;
}

.new-chat-btn, .import-btn, .export-btn{
  background:var(--user);border:none;color:#fff;
  padding:8px 12px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:12px;font-weight:600;
  font-family:inherit;
  transition:all 0.2s;flex:1;
}

.new-chat-btn:hover, .import-btn:hover, .export-btn:hover{
  filter:brightness(1.1);
  transform:translateY(-1px);
  box-shadow:0 4px 12px var(--accent-glow);
}
.export-btn{background:#10b981;}
.export-btn:hover{background:#059669;}

.search-box{
  width:100%;padding:10px 12px;
  background:var(--chat);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);
  outline:none;font-size:13px;
  font-family:inherit;
  transition:border-color 0.2s, box-shadow 0.2s;
}

.search-box:focus{
  border-color:var(--user);
  box-shadow:0 0 0 3px var(--accent-glow);
}

.history-list{
  flex:1;overflow-y:auto;padding:8px;
  display:flex;flex-direction:column;gap:4px;
  scroll-behavior: smooth;
}

.history-group{
  margin-bottom:12px;
}

.history-group-title{
  font-size:10px;
  color:var(--muted);
  padding:6px 14px 4px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.8px;
}

.history-item{
  padding:10px 14px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:13px;
  font-weight:500;
  border:1px solid transparent;
  display:flex;justify-content:space-between;
  align-items:center;transition:all 0.15s;
  position:relative;
  background: transparent;
}

.history-item:hover{
  background:var(--accent-glow);
  border-color:transparent;
}

.history-item.active{
  background:var(--user);color:#fff;
  box-shadow: 0 2px 12px var(--accent-glow);
}

.history-item .title{
  flex:1;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
  cursor:text;
}

.title-input{
  flex:1;
  background:transparent;
  border:1px solid var(--border);
  color:inherit;
  padding:2px 6px;
  border-radius:4px;
  font-size:14px;
  outline:none;
}

.history-item-actions{
  display:flex;gap:4px;opacity:0;
  transition:opacity 0.2s;
}

.history-item:hover .history-item-actions{opacity:1;}

.pin-chat, .delete-chat{
  background:none;border:none;
  color:inherit;cursor:pointer;
  font-size:14px;padding:2px 4px;
}

.history-item.pinned .pin-chat{opacity:1;color:#fbbf24;}

.history-list::-webkit-scrollbar {width: 4px;}
.history-list::-webkit-scrollbar-track {background: transparent;}
.history-list::-webkit-scrollbar-thumb {background: var(--border);border-radius: 4px;}

.app{
  flex:1;
  background:linear-gradient(180deg, var(--panel), var(--chat));
  display:flex;flex-direction:column;
  overflow: hidden;
  position:relative;
}

header{
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  font-weight:600;
  flex-shrink: 0;
  background:rgba(15, 23, 42, 0.04);
  min-height:56px;
  backdrop-filter: blur(14px);
  position: sticky;
  top: 0;
  z-index: 4;
}

body.dark header {
  background: rgba(15, 23, 42, 0.32);
}

.title-edit{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text);
  padding:4px 10px;
  border-radius:var(--radius-sm);
  font-size:14px;
  font-weight:600;
  font-family:inherit;
  outline:none;
}

.title-edit:focus{
  border-color:var(--user);
  box-shadow:0 0 0 3px var(--accent-glow);
}

.controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.controls > * { flex-shrink: 0; }

.menu-btn{
  background:transparent;border:1px solid var(--border);
  color:var(--text);padding:6px 10px;border-radius:var(--radius-sm);
  cursor:pointer;display:none;
  font-size:16px;
}

select,button.toggle{
  background:transparent;border:1px solid var(--border);
  color:var(--text);padding:7px 11px;border-radius:var(--radius-sm);
  cursor:pointer;
  font-family:inherit;
  font-size:14px;
  transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s, background-color 0.2s;
}

#chat{
  flex:1;padding:24px 20px;overflow-y:auto;
  display:flex;flex-direction:column;gap:12px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.04)),
    var(--chat);
  position:relative;
  scroll-behavior: auto;
}

.msg{
  max-width:720px;
  padding:14px 18px;
  border-radius:var(--radius-md);
  line-height:1.7;
  opacity:0;animation:fadeIn .2s ease forwards;
  position:relative;
  word-wrap: break-word;
  overflow-wrap: anywhere;
  font-size:15px;
  border:1px solid transparent;
  backdrop-filter: none;
  content-visibility:auto;
  contain-intrinsic-size: 0 170px;
}

.msg:hover .msg-actions{opacity:1;}

.msg-actions{
  position:static;
  display:inline-flex;
  justify-content:flex-end;
  gap:6px;
  opacity:1;
  padding:0;
  border:none;
  background:transparent;
  backdrop-filter:none;
  transition:none;
  transform:none;
  margin-left:auto;
}

.msg-btn{
  display:inline-flex;
  align-items:center;
  gap:5px;
  background:linear-gradient(180deg, rgba(15,23,42,0.88), rgba(15,23,42,0.62));
  border:1px solid rgba(148,163,184,0.34);
  color:#e2e8f0;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:10px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  font-family:inherit;
  font-weight:700;
  transition:transform 0.12s, border-color 0.12s, background 0.12s;
  box-shadow:none;
}

.msg-btn:hover{
  transform:translateY(-1px);
  border-color:rgba(191,219,254,0.44);
}

.msg:hover .msg-actions{
  transform: none;
}

.msg-meta{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:6px;
  line-height:1;
}

.user .msg-meta {
  margin-top: 0;
  gap: 6px;
}

.msg-meta .timestamp{
  margin-top:0;
}

.msg-btn:focus-visible {
  outline: 2px solid var(--user);
  outline-offset: 1px;
}

.msg-btn.edit-btn {
  border-color: rgba(56,189,248,0.42);
  color: #dbeafe;
}

.msg-btn.retry-btn {
  border-color: rgba(34,197,94,0.44);
  color: #dcfce7;
}

.msg-btn.edit-btn::before {
  content: "✎";
  font-size: 11px;
  line-height: 1;
}

.msg-btn.retry-btn::before {
  content: "↻";
  font-size: 12px;
  line-height: 1;
}

.user{
	align-self:flex-end;
  background:linear-gradient(180deg, var(--user), var(--user));
	color:#fff;
	box-shadow: var(--shadow-sm);
	border-bottom-right-radius: 4px;
  border-color: transparent;
  padding:10px 14px;
  line-height:1.5;
}
.bot{
	align-self:flex-start;
	background:var(--bot);
	color:var(--text);
  box-shadow: var(--shadow-md);
	border: 1px solid var(--border);
	border-bottom-left-radius: 4px;
}

body.dark .bot {
  border-color: rgba(255,255,255,0.06);
}

.msg a{color: var(--link);text-decoration: none;font-weight:600;}
.msg a:hover{text-decoration:underline;opacity:0.85;}

.timestamp{font-size:10px;color:var(--muted);margin-top:8px;font-weight:500;opacity:0.7;line-height:1.1;display:inline-flex;align-items:center;}

.user .timestamp {
  color: #fff;
  opacity: 0.92;
  margin-top: 0;
}

.user .msg-btn {
  min-height: 20px;
  padding: 3px 8px;
  font-size: 9px;
}

#input {
  width: 100%;
  min-height: 42px;
  max-height: 120px;
  resize: none;
  padding: 10px 14px;
  font-size: 15px;
  font-family: inherit;
  line-height: 1.5;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--chat);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  overflow: auto;
  scrollbar-width: none;
}

#input:focus {
  border-color: var(--user);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

#input::placeholder {
  color: var(--muted);
  font-weight: 400;
}

#input::-webkit-scrollbar {
  display: none;
}

pre{
  position:relative;
  background:
    linear-gradient(180deg, var(--code-toolbar), rgba(0,0,0,0) 54px),
    linear-gradient(180deg, var(--code-bg-2), var(--code-bg));
  border-radius:var(--radius-sm);
  padding:44px 14px 14px;
  margin-top:10px;
  overflow-x:auto;
  max-height:400px;
  transition:max-height 0.26s ease;
  border:1px solid var(--code-border);
  box-shadow: 0 12px 30px rgba(2,6,23,0.24);
  overscroll-behavior: contain;
}

pre.collapsed{max-height:80px;overflow:hidden;}

pre.collapsed::after{
  content:"";
  position:absolute;
  left:0;right:0;bottom:0;
  height:42px;
  pointer-events:none;
  background:linear-gradient(180deg, rgba(15,23,42,0), var(--code-bg));
}

pre::before{
  content:attr(data-lang);
  position:absolute;
  top:9px;
  left:12px;
  font-size:10px;
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:#cbd5e1;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(15,23,42,0.36);
}

pre code{
  display:block;
  width:max-content;
  min-width:100%;
  font-size:13px;
  font-family:'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  line-height:1.7;
  color:var(--code-text);
  white-space:pre;
}

pre .line-number-gutter{
  position:absolute;
  top:44px;
  left:0;
  bottom:14px;
  width:42px;
  padding:0 8px 0 10px;
  border-right:1px solid rgba(255,255,255,0.08);
  color:rgba(203,213,225,0.72);
  font-size:13px;
  font-family:'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  font-variant-numeric: tabular-nums;
  line-height:1.7;
  text-align:right;
  overflow:hidden;
  user-select:none;
  pointer-events:none;
  display:none;
  background:linear-gradient(180deg, rgba(15,23,42,0.16), rgba(15,23,42,0.05));
  will-change: transform;
}

pre .line-number-gutter span{
  display:block;
  height:1.7em;
}

pre.line-numbers{
  padding-left:56px;
}

pre.line-numbers .line-number-gutter{
  display:block;
}

pre code.hljs,
pre .hljs {
  background: transparent !important;
  color: var(--code-text);
  padding: 0 !important;
  margin: 0 !important;
  line-height: 1.7 !important;
}

.copy-btn, .collapse-btn, .lines-btn, .preview-btn{
  position:absolute;
  top:8px;
  min-height:24px;
  background:linear-gradient(180deg, rgba(15,23,42,0.86), rgba(15,23,42,0.64));
  border:1px solid rgba(148,163,184,0.34);
  color:#e8e8ed;
  font-size:10px;
  letter-spacing:0.05em;
  text-transform:uppercase;
  padding:4px 9px;
  border-radius:7px;
  cursor:pointer;
  font-family:inherit;
  font-weight:700;
  transition:background 0.15s, transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  backdrop-filter: none;
  box-shadow:none;
}

.copy-btn:hover, .collapse-btn:hover, .lines-btn:hover, .preview-btn:hover{
  background:linear-gradient(180deg, rgba(30,41,59,0.92), rgba(15,23,42,0.8));
  border-color:rgba(191,219,254,0.44);
  transform: translateY(-1px);
  box-shadow:none;
}

.lines-btn.active, .preview-btn.active{
  background:linear-gradient(180deg, rgba(14,116,144,0.56), rgba(15,23,42,0.9));
  border-color:rgba(56,189,248,0.52);
  color:#dbeafe;
}

.lines-btn:disabled{
  opacity:0.5;
  cursor:not-allowed;
  transform:none !important;
  box-shadow:none !important;
}

.copy-btn{right:8px;}
.lines-btn{right:72px;}
.collapse-btn{right:136px;}
.preview-btn{right:204px;}

.html-preview-wrap{
  display:none;
  margin-top:9px;
  border:1px solid var(--code-border);
  border-radius:var(--radius-sm);
  overflow:hidden;
  background:linear-gradient(180deg, rgba(15,23,42,0.38), rgba(2,6,23,0.62));
}

.html-preview-wrap.active{
  display:block;
}

.html-preview-frame{
  display:block;
  width:100%;
  height:300px;
  border:0;
  background:#ffffff;
}

.scroll-bottom{
  position:absolute;
  bottom:calc(102px + var(--safe-bottom));
  left:50%;
  transform:translateX(-50%);
  background:var(--panel);border:1px solid var(--border);color:var(--text);
  padding:10px 14px;border-radius:50%;
  cursor:pointer;box-shadow:var(--shadow-md);
  opacity:0;pointer-events:none;
  transition:opacity 0.2s, transform 0.2s ease;
  z-index:30;
}

.scroll-bottom:hover{
  background:var(--accent-glow);
  border-color:var(--user);
  transform:translateX(-50%) translateY(-1px);
}

.scroll-bottom.visible{opacity:1;pointer-events:all;}

footer{
  display:flex;
  gap:8px;
  padding:10px 16px;
  border-top:1px solid var(--border);
  background:rgba(15, 23, 42, 0.04);
  flex-shrink: 0;
  padding-bottom: calc(10px + var(--safe-bottom));
  align-items:stretch;
  backdrop-filter: blur(14px);
}

body.dark footer {
  background: rgba(15, 23, 42, 0.28);
}

.input-container{
  flex:1;display:flex;flex-direction:column;min-width:0;
  position:relative;
}

button:focus-visible,
input:focus-visible,
textarea:focus-visible,
select:focus-visible {
  outline: 2px solid var(--user);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

.status-banner {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  top: calc(10px + var(--safe-top));
  z-index: 1200;
  padding: 8px 18px;
  border-radius: 999px;
  background: var(--panel);
  color: var(--text);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
  backdrop-filter: blur(16px);
  font-size: 13px;
  font-weight: 600;
}

.ios-install-hint {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: calc(12px + var(--safe-bottom));
  z-index: 1200;
  width: min(92vw, 420px);
  background: var(--panel);
  color: var(--text);
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  box-shadow: var(--shadow-lg);
  font-size: 13px;
}

.ios-install-hint button {
  background: var(--user);
  border: none;
  color: #fff;
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
}

input{
  width:100%;padding:12px;border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:transparent;color:var(--text);
  outline:none;
  min-width: 0;
  box-sizing: border-box;
  font-family:inherit;
}

.char-counter{
  position:absolute;
  bottom:6px;
  right:10px;
  font-size:10px;
  color:var(--muted);
  padding:2px 5px;
  pointer-events:none;
  background:var(--chat);
  border-radius:4px;
  opacity:0.85;
}

button.send{
  min-height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 18px;border-radius:var(--radius-sm);
  border:none;background:var(--user);
  color:#fff;font-weight:700;cursor:pointer;
  font-family:inherit;
  font-size:14px;
  transition:all 0.15s;
  white-space:nowrap;
  flex-shrink:0;
}

button.send:hover{
  filter:brightness(1.1);
  transform:translateY(-1px);
}

button.send:active{
  transform:translateY(0);
}

.stop-btn {
  min-height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 16px;
  border-radius: var(--radius-sm);
  border: none;
  background: #ef4444;
  color: #fff;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  transition: all 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}

.stop-btn:hover {
  background: #dc2626;
  transform: translateY(-1px);
}

.stop-btn:active {
  transform: translateY(0);
}

.stop-btn.hidden {
  display: none;
}

.spinner{
  width:20px;height:20px;
  border:2.5px solid var(--border);
  border-top:2.5px solid var(--user);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

.stream-placeholder {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  color: var(--muted);
  font-weight: 600;
  letter-spacing: 0.01em;
}

.stream-dots {
  display: inline-block;
  min-width: 1.6em;
  text-align: left;
}

.stream-dots::after {
  content: '';
  animation: thinkingDots 1.1s steps(4, end) infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{to{opacity:1;}}
@keyframes thinkingDots {
  0% { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
  100% { content: ''; }
}

#chat::-webkit-scrollbar {width: 6px;}
#chat::-webkit-scrollbar-track {background: transparent;}
#chat::-webkit-scrollbar-thumb {background-color: var(--border);border-radius: 6px;}
#chat::-webkit-scrollbar-thumb:hover {background-color: var(--muted);}

/* ===== MARKDOWN TYPOGRAPHY ===== */
.msg p { margin: 0 0 10px 0; }
.msg p:last-child { margin-bottom: 0; }
.msg p:last-of-type { margin-bottom: 0; }
.msg p:last-of-type + .msg-meta { margin-top: 4px; }

.user p:last-of-type + .msg-meta {
  margin-top: 2px;
}

.msg strong { font-weight: 700; }
.msg em { font-style: italic; }

.msg ul, .msg ol { padding-left: 22px; margin: 8px 0; }
.msg li { margin-bottom: 4px; line-height: 1.6; }
.msg li::marker { color: var(--muted); }

.msg code:not(pre code) {
  background: rgba(127,127,127,0.12);
  padding: 2px 6px;
  border-radius: 5px;
  font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  font-size: 0.88em;
  font-weight: 500;
  word-break: break-word;
}
body.dark .msg code:not(pre code) {
  background: rgba(255,255,255,0.08);
}
.user code:not(pre code) {
  background: rgba(255,255,255,0.18);
}

.msg blockquote {
  margin: 10px 0;
  padding: 8px 14px;
  border-left: 3px solid var(--user);
  background: rgba(127,127,127,0.06);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: var(--muted);
  font-style: italic;
}
.msg blockquote p { margin: 0; }

.msg h1, .msg h2, .msg h3, .msg h4, .msg h5, .msg h6 {
  margin: 16px 0 8px 0;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.02em;
}
.msg h1 { font-size: 1.5em; }
.msg h2 { font-size: 1.3em; }
.msg h3 { font-size: 1.15em; }
.msg h4 { font-size: 1.05em; }
.msg h5, .msg h6 { font-size: 1em; color: var(--muted); }
.msg h1:first-child, .msg h2:first-child, .msg h3:first-child { margin-top: 0; }

@media (max-width: 900px) {
  .container,
  header,
  .msg {
    backdrop-filter: none;
  }
}

.msg hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 14px 0;
}

.msg table {
  width: 100%;
  border-collapse: collapse;
  margin: 10px 0;
  font-size: 0.9em;
  overflow-x: auto;
  display: block;
}
.msg th, .msg td {
  padding: 8px 12px;
  border: 1px solid var(--border);
  text-align: left;
}
.msg th {
  background: rgba(127,127,127,0.08);
  font-weight: 700;
  font-size: 0.85em;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
}
.msg tr:nth-child(even) {
  background: rgba(127,127,127,0.04);
}

.msg img {
  max-width: 100%;
  border-radius: var(--radius-sm);
  margin: 6px 0;
}

.msg del, .msg s { text-decoration: line-through; color: var(--muted); }
.msg mark { background: rgba(250,204,21,0.25); padding: 1px 4px; border-radius: 3px; }
.msg sup { font-size: 0.75em; }
.msg sub { font-size: 0.75em; }

.sidebar.is-hidden {
  transform: translateX(-100%);
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 998;
  transition: opacity 0.25s;
}

@media (min-width: 769px) {
  .sidebar.is-hidden {
    width: 0;
    min-width: 0;
    padding: 0;
    border-right: none;
    overflow: hidden;
  }
}

.menu-close-btn {
  display: none;
  position: absolute;
  top: 14px;
  right: 14px;
  margin: 0;
  background: var(--chat);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 9px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  cursor: pointer;
  z-index: 20;
}

.bot img.ai-img {
  max-width: 100%;
  border-radius: var(--radius-sm);
  margin-top: 8px;
  display: block;
}

.controls select {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0)) ,
    linear-gradient(180deg, var(--chat), var(--panel));
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 38px 8px 12px;
  min-height: 36px;
  font-size: 13px;
  font-weight: 650;
  letter-spacing: 0.01em;
  font-family: inherit;
  cursor: pointer;
  outline: none;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    0 4px 14px rgba(2, 6, 23, 0.18);
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  backdrop-filter: blur(8px);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
}

.controls select:hover {
  border-color: var(--user);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.1),
    0 8px 20px rgba(2, 6, 23, 0.24);
  transform: translateY(-1px);
}

.controls select:focus {
  border-color: var(--user);
  box-shadow: 0 0 0 3px var(--accent-glow), 0 10px 26px rgba(2, 6, 23, 0.3);
}

.controls select:focus-visible {
  border-color: var(--user);
  box-shadow: 0 0 0 3px var(--accent-glow), 0 10px 26px rgba(2, 6, 23, 0.3);
}

.controls select option {
  background: var(--panel);
  color: var(--text);
}

body.dark .controls select {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)),
    linear-gradient(180deg, rgba(21,24,36,0.98), rgba(14,16,28,0.98));
}

.auth-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(180deg, var(--chat), var(--panel));
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 7px 12px;
  min-height: 34px;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  line-height: 1;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}

.controls .auth-pill {
  margin-left: 0 !important;
}

.auth-pill:hover {
  border-color: var(--user);
}

.auth-pill:focus-visible {
  border-color: var(--user);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.auth-pill.signed-in {
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.auth-pill.signed-out {
  max-width: 138px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.auth-pill-avatar {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid var(--border);
  flex-shrink: 0;
}

.select-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
}

.native-select-hidden {
  display: none !important;
}

.custom-select-wrap::after {
  display: none;
}

.custom-select-trigger {
  min-height: 36px;
  max-width: 158px;
  display: inline-flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 8px 10px 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0)),
    linear-gradient(180deg, var(--chat), var(--panel));
  color: var(--text);
  font-size: 13px;
  font-weight: 650;
  letter-spacing: 0.01em;
  font-family: inherit;
  cursor: pointer;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    0 4px 14px rgba(2, 6, 23, 0.18);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
}

.custom-select-trigger:hover {
  border-color: var(--user);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.1),
    0 8px 20px rgba(2, 6, 23, 0.24);
  transform: translateY(-1px);
}

.custom-select-wrap.open .custom-select-trigger,
.custom-select-trigger:focus-visible {
  border-color: var(--user);
  box-shadow: 0 0 0 3px var(--accent-glow), 0 10px 26px rgba(2, 6, 23, 0.3);
}

.custom-select-label {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.custom-select-caret {
  width: 18px;
  height: 18px;
  border-radius: 999px;
  background: rgba(127,127,127,0.16);
  display: grid;
  place-items: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
}

.custom-select-wrap.open .custom-select-caret {
  color: var(--user);
}

.custom-select-panel {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  width: max(100%, 280px);
  max-height: 280px;
  overflow-y: auto;
  padding: 6px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: linear-gradient(180deg, var(--panel), var(--chat));
  box-shadow: var(--shadow-lg);
  backdrop-filter: blur(14px);
  z-index: 90;
  opacity: 0;
  transform: translateY(-6px) scale(0.98);
  pointer-events: none;
  transition: opacity 0.18s ease, transform 0.18s ease;
}

.custom-select-wrap.open .custom-select-panel {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

.custom-select-option {
  width: 100%;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  font-weight: 550;
  text-align: left;
  padding: 9px 10px;
  cursor: pointer;
  transition: background-color 0.15s, border-color 0.15s, color 0.15s;
}

.custom-select-option:hover {
  background: var(--accent-glow);
  border-color: rgba(59,130,246,0.34);
}

.custom-select-option.active {
  background: rgba(59,130,246,0.18);
  border-color: rgba(59,130,246,0.44);
  color: #dbeafe;
}

.custom-select-panel::-webkit-scrollbar {
  width: 6px;
}

.custom-select-panel::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 6px;
}

body.dark .custom-select-trigger {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)),
    linear-gradient(180deg, rgba(21,24,36,0.98), rgba(14,16,28,0.98));
}

body.dark .custom-select-panel {
  background: linear-gradient(180deg, rgba(18,20,31,0.98), rgba(14,16,26,0.98));
}

.select-wrap::after {
  content: "▾";
  position: absolute;
  right: 10px;
  width: 18px;
  height: 18px;
  border-radius: 999px;
  background: rgba(127,127,127,0.16);
  display: grid;
  place-items: center;
  pointer-events: none;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
}

.select-wrap:hover::after {
  color: var(--user);
}

/* ===== VOICE CONTROLS ===== */
.voice-btn {
  position: relative;
  min-height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  padding: 0 16px;
  border-radius: var(--radius-sm);
  border: none;
  background: #10b981;
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
  box-shadow: 0 8px 20px var(--accent-glow);
}

.voice-btn:hover {
  background: #059669;
}

.voice-btn.recording {
  background: #ef4444;
  animation: pulse 1.5s infinite;
}

body.dark .voice-btn.recording {
  background: #ef4444;
}

.voice-btn.disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* ===== SEARCH TOGGLE ===== */
.search-toggle-btn {
  position: relative;
  min-height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  padding: 0 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--chat);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s;
}

.search-toggle-btn:hover {
  border-color: var(--user);
}

.search-toggle-btn.active {
  background: var(--user);
  color: #fff;
  border-color: var(--user);
  box-shadow: 0 4px 12px var(--accent-glow);
}

.chat-search-bar {
  position: sticky;
  top: 0;
  z-index: 35;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--panel);
  box-shadow: var(--shadow-sm);
}

.chat-search-input {
  flex: 1;
  min-width: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--chat);
  color: var(--text);
  padding: 8px 10px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
}

.chat-search-input:focus {
  border-color: var(--user);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.chat-search-close {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--chat);
  color: var(--text);
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
}

.chat-search-close:hover {
  border-color: var(--user);
  background: var(--accent-glow);
}

.msg.chat-search-match {
  border-color: #f59e0b;
  box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.25), var(--shadow-sm);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.tts-toggle {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
}

.tts-toggle:hover {
  border-color: #8b5cf6;
  color: #8b5cf6;
}

.tts-toggle.active {
  border-color: #10b981;
  color: #10b981;
  background: rgba(16,185,129,0.08);
}

#incognitoToggle.active {
  border-color: #f59e0b;
  color: #f59e0b;
  background: rgba(245,158,11,0.12);
}

#imageModel {
  max-width: 158px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#textModelSelect {
  max-width: 158px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

async function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    
    request.onerror = () => reject(request.error);
    request.onsuccess = () => {
      db = request.result;
      resolve(db);
    };
    
    request.onupgradeneeded = (e) => {
      const database = e.target.result;
      
      if (!database.objectStoreNames.contains('chats')) {
        const chatStore = database.createObjectStore('chats', { keyPath: 'id' });
        chatStore.createIndex('timestamp', 'timestamp', { unique: false });
        chatStore.createIndex('pinned', 'pinned', { unique: false });
      }
      
      if (!database.objectStoreNames.contains('media')) {
        database.createObjectStore('media', { keyPath: 'id' });
      }

      // v2: AI Memory store
      if (!database.objectStoreNames.contains('memories')) {
        const memStore = database.createObjectStore('memories', { keyPath: 'id' });
        memStore.createIndex('timestamp', 'timestamp', { unique: false });
        memStore.createIndex('category', 'category', { unique: false });
      }
    };
  });
}

async function saveChatLocal(chatData) {
  if (incognitoEnabled) return;
  if (!db) await openDB();
  const tx = db.transaction('chats', 'readwrite');
  const store = tx.objectStore('chats');
  store.put(chatData);
  return new Promise((resolve, reject) => {
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

}

function normalizeOrigin(origin) {
  return String(origin || '').trim().replace(/\/+$/, '');
}

function isLocalHost(hostname) {
  return hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '0.0.0.0' || hostname === '::1';
}

function buildChatApiCandidates(pathSuffixes) {
  const candidates = [];
  const primaryOrigin = normalizeOrigin(API_BASE_URL);

  pathSuffixes.forEach((suffix) => {
    candidates.push(primaryOrigin + suffix);
  });

  // In local static dev, allow a configurable remote fallback origin.
  if (isLocalHost(window.location.hostname)) {
    const fallbackOrigin = normalizeOrigin(localStorage.getItem(API_FALLBACK_ORIGIN_KEY) || DEFAULT_API_FALLBACK_ORIGIN);
    if (fallbackOrigin && fallbackOrigin !== primaryOrigin) {
      pathSuffixes.forEach((suffix) => {
        candidates.push(fallbackOrigin + suffix);
      });
    }
  }

  return [...new Set(candidates)];
}

function parseHttpStatusFromError(error) {
  const match = /HTTP\s+(\d{3})/i.exec(String(error?.message || ''));
  if (!match) return null;
  const status = Number.parseInt(match[1], 10);
  return Number.isFinite(status) ? status : null;
}

function shouldFallbackToNextChatRoute(error) {
  if (!error) return false;
  if (error.isRateLimit || error.isUserAbort) return false;
  const status = parseHttpStatusFromError(error);
  if (status == null) return true;
  return CHAT_ROUTE_FALLBACK_STATUSES.has(status);
}

function withRetryQuery(url) {
  const sep = url.includes('?') ? '&' : '?';
  return `${url}${sep}spectrix_retry=${Date.now()}`;
}

function appendExternalScript(src) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = src;
    script.defer = true;
    script.async = true;
    script.onload = () => resolve();
    script.onerror = () => reject(new Error(`Failed to load script: ${src}`));
    document.head.appendChild(script);
  });
}

async function loadScriptFromCandidates(candidates, isReady) {
  if (isReady()) return true;

  for (const baseUrl of candidates) {
    try {
      await appendExternalScript(withRetryQuery(baseUrl));
      if (isReady()) return true;
    } catch {
      // Try next candidate.
    }
  }

  return isReady();
}

async function ensureHighlightStylesheet() {

  for (const href of HLJS_STYLE_CANDIDATES) {
    try {
      await ensureStylesheetLoaded(href);
      return true;
    } catch {
      // Try next CDN.
    }
  }

  return false;
}

async function ensureMarkdownRuntimeLoaded(options = {}) {
  const { timeoutMs = 2200, silent = false } = options;
  if (window.marked && window.hljs) return true;

  if (!markdownRuntimeLoadPromise) {
    const activePromise = (async () => {
      if (!window.marked) {
        await loadScriptFromCandidates(MARKED_SCRIPT_CANDIDATES, () => Boolean(window.marked));
      }

      if (!window.hljs) {
        await ensureHighlightStylesheet();
        await loadScriptFromCandidates(HLJS_SCRIPT_CANDIDATES, () => Boolean(window.hljs));
      }

      if (window.hljs?.getLanguage && !window.hljs.getLanguage('go')) {
        await loadScriptFromCandidates(
          HLJS_GO_LANG_SCRIPT_CANDIDATES,
          () => Boolean(window.hljs?.getLanguage && window.hljs.getLanguage('go'))
        );
      }

      return Boolean(window.marked);
    })();

    markdownRuntimeLoadPromise = activePromise;
    activePromise.finally(() => {
      if (markdownRuntimeLoadPromise === activePromise) {
        markdownRuntimeLoadPromise = null;
      }
    });
  }

  try {
    if (timeoutMs > 0) {
      return await Promise.race([
        markdownRuntimeLoadPromise,
        new Promise((resolve) => setTimeout(() => resolve(false), timeoutMs))
      ]);
    }
    return await markdownRuntimeLoadPromise;
  } catch (error) {
    if (!silent) {
      console.warn('Markdown runtime load warning:', error);
    }
    return false;
  }
}

async function fetchChatApiWithFallback(options = {}, retryCount = 1) {
  const orderedCandidates = [
    activeChatApiUrl,
    ...CHAT_API_URL_CANDIDATES.filter((url) => url !== activeChatApiUrl)
  ];

  let lastError = null;

  for (let index = 0; index < orderedCandidates.length; index++) {
    const url = orderedCandidates[index];

    try {
      const response = await fetchWithTimeoutRetry(url, options, retryCount);
      activeChatApiUrl = url;
      return response;
    } catch (error) {
      lastError = error;
      const hasNext = index < orderedCandidates.length - 1;
      if (hasNext && shouldFallbackToNextChatRoute(error)) {
        continue;
      }
      throw error;
    }
  }

  throw lastError || new Error('Chat request failed');
}

function stopCloudAutoSync() {
  if (cloudSyncTimer) {
    clearInterval(cloudSyncTimer);
    cloudSyncTimer = null;
  }
  if (typeof cloudSyncUnsubscribe === 'function') {
    cloudSyncUnsubscribe();
    cloudSyncUnsubscribe = null;
  }
  if (typeof cloudMemorySyncUnsubscribe === 'function') {
    cloudMemorySyncUnsubscribe();
    cloudMemorySyncUnsubscribe = null;
  }
}

function startCloudAutoSync() {
  stopCloudAutoSync();
  if (incognitoEnabled) return;
  const user = firebase?.auth?.().currentUser;
  if (!user) return;

  const runSync = () => {
    if (cloudSyncInFlight || cloudMemorySyncInFlight) return;
    cloudSyncInFlight = true;
    cloudMemorySyncInFlight = true;
    Promise.all([syncChats(user.uid), syncMemories(user.uid)])
      .catch((err) => console.warn('Auto-sync failed:', err))
      .finally(() => {
        cloudSyncInFlight = false;
        cloudMemorySyncInFlight = false;
      });
  };

  // Primary auto-sync path: realtime firestore listener.
  try {
    const ref = firebase.firestore().collection('users').doc(user.uid).collection('chats');
    cloudSyncUnsubscribe = ref.onSnapshot(
      (snapshot) => {
        if (cloudSyncInFlight) return;
        cloudSyncInFlight = true;
        handleRealtimeSync(snapshot).catch(err => console.warn('Realtime sync failed:', err)).finally(() => {
          cloudSyncInFlight = false;
        });
      },
      (err) => {
        console.warn('Realtime sync listener error:', err);
        const msg = String(err?.message || err || '').toLowerCase();
        if (msg.includes('blocked_by_client') || msg.includes('blocked by client')) {
          showStatus('Realtime cloud sync blocked by extension. Falling back to timer sync.');
        }
      }
    );
  } catch (err) {
    console.warn('Realtime sync setup failed:', err);
  }

  try {
    const memRef = firebase.firestore().collection('users').doc(user.uid).collection('memories');
    cloudMemorySyncUnsubscribe = memRef.onSnapshot(
      (snapshot) => {
        if (cloudMemorySyncInFlight) return;
        cloudMemorySyncInFlight = true;
        handleMemoryRealtimeSync(snapshot).catch(err => console.warn('Realtime memory sync failed:', err)).finally(() => {
          cloudMemorySyncInFlight = false;
        });
      },
      (err) => {
        console.warn('Realtime memory listener error:', err);
        const msg = String(err?.message || err || '').toLowerCase();
        if (msg.includes('blocked_by_client') || msg.includes('blocked by client')) {
          showStatus('Realtime memory sync blocked by extension. Falling back to timer sync.');
        }
      }
    );
  } catch (err) {
    console.warn('Realtime memory sync setup failed:', err);
  }

  // Fallback/backup sync path.
  cloudSyncTimer = setInterval(runSync, 30000);
}

  incognitoEnabled = !incognitoEnabled;
  localStorage.setItem(INCOGNITO_KEY, incognitoEnabled ? 'true' : 'false');

    stopCloudAutoSync();

    updateHeaderTitle();
    await loadChatMessages();
    showStatus('Incognito ON: chats, memory, and profile changes will not be saved.');

    currentId = Object.keys(sessions)[0] || null;
    if (currentId) {
      localStorage.setItem(CURRENT_KEY, currentId);

  }
  renderHistory();

  await loadChatMessages();

  const user = firebase?.auth?.().currentUser;
  if (user) {
    await syncChats(user.uid);
    await syncMemories(user.uid);
  }
  startCloudAutoSync();
  showStatus('Incognito OFF: persistence restored.');
}

async function loadAllSessions() {
  const allChats = await getAllChats();
  sessions = {};
  allChats.forEach(chat => {
    sessions[chat.id] = chat;
  });
  
  if (Object.keys(sessions).length === 0) {
    await createNewChat();
  }
}

async function createNewChat() {
  let nextId = '';
  do {
    nextId = Date.now().toString() + Math.floor(Math.random() * 1000).toString().padStart(3, '0');
  } while (sessions[nextId]);
  currentId = nextId;
  if (deletedChatTombstones.has(currentId)) {
    deletedChatTombstones.delete(currentId);
    persistDeletedChatTombstones();
  }
  const newSession = {
    id: currentId,
    title: "New Chat",
    messages: [],
    timestamp: Date.now(),
    pinned: false,
    autoTitled: false
  };
  sessions[currentId] = newSession;
  await saveChat(newSession);
  if (!incognitoEnabled) localStorage.setItem(CURRENT_KEY, currentId);
}

function getCurrentSession() {
  if (sessions[currentId]) return sessions[currentId];

  const first = Object.keys(sessions)[0];
  if (first) {
    currentId = first;
    if (!incognitoEnabled) localStorage.setItem(CURRENT_KEY, first);
    return sessions[first];
  }

  return null;
}

async function saveSessions() {
  const session = getCurrentSession();
  if (session) {
    await saveChat(session);
    renderHistory();
    updateHeaderTitle();
  }
}

async function saveMessage(role, content) {
  const session = getCurrentSession();
  session.messages.push({ role, content });
  session.timestamp = Date.now();
  await saveSessions();
}

      charCounter.textContent = `${transcript.length} chars`;
      document.getElementById('voiceBtn').classList.remove('recording');
      document.getElementById('voiceBtn').textContent = '🎤';
    };

    recognition.onerror = (event) => {
      console.error('Speech recognition error:', event.error);
      const btn = document.getElementById('voiceBtn');
      btn.classList.remove('recording');
      btn.textContent = '🎤';
      
      if (event.error === 'no-speech') return;
      if (event.error === 'not-allowed') {
        showAppAlert('Mic permission denied, dawg. Check browser settings 🎤❌', 'Voice Permission');
      } else {
        showAppAlert(`Voice input error: ${event.error}`, 'Voice Error');
      }
    };
    recognition.onend = () => {
      document.getElementById('voiceBtn').classList.remove('recording');
      document.getElementById('voiceBtn').textContent = '🎤';
    };
  }
  
  const btn = document.getElementById('ttsToggle');
  if (btn) {
    btn.classList.toggle('active', ttsEnabled);
    btn.textContent = ttsEnabled ? '🔊' : '🔇';
  }

  // Force voices to load immediately in the background
  if ('speechSynthesis' in window) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
}

async function toggleVoiceInput() {

    window.speechSynthesis.cancel();
  } else if (ttsEnabled && 'speechSynthesis' in window) {
    // 🗣️ Speak a confirmation! This physically proves to the browser 
    // that the user clicked a button to request audio.
    const u = new SpeechSynthesisUtterance('Voice enabled');
    u.volume = 1;
    window.speechSynthesis.speak(u);

}

function speakText(text) {
  if (!ttsEnabled || !('speechSynthesis' in window)) return;

  // Clear any stuck queue, but only if it's currently busy
  if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
    window.speechSynthesis.cancel();
  }

  const cleanText = text
    .replace(/\*\*/g, ' ')
    .replace(/\*/g, ' ')
    .replace(/```[\s\S]*?```/g, ' code snippet ')
    .replace(/`[^`]+`/g, '')
    .replace(/#{1,6}\s/g, '')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/<[^>]+>/g, '')
    .replace(/[\$\\]/g, '') // strip math formatting so it doesn't read formulas weirdly
    .trim();

  if (!cleanText) return;

  const maxLength = 500;
  const finalText = cleanText.length > maxLength
    ? cleanText.slice(0, maxLength) + '... response truncated for audio'
    : cleanText;

  currentUtterance = new SpeechSynthesisUtterance(finalText);
  currentUtterance.rate = 1.05;
  currentUtterance.pitch = 1;
  currentUtterance.volume = 1;

  // Synchronously grab voices (already preloaded by Step 1)
  const voices = window.speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en') && v.localService)
               || voices.find(v => v.lang.startsWith('en'))
               || voices[0];
  if (enVoice) currentUtterance.voice = enVoice;
  
  window.speechSynthesis.speak(currentUtterance);
  
  // Force resume if mobile browser tries to automatically pause background audio
  if (window.speechSynthesis.state === 'paused') {
    window.speechSynthesis.resume();
  }
}

// ===== MATH RENDERING =====
const MATH_RENDER_DELIMITERS = [
  { left: "$$", right: "$$", display: true },
  { left: "\\(", right: "\\)", display: false },
  { left: "$", right: "$", display: false }
];
const KATEX_CSS_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.css';
const KATEX_JS_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.js';
const KATEX_AUTORENDER_JS_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/contrib/auto-render.min.js';
const MATHJAX_JS_URL = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js';
let mathEngineLoadPromise = null;

function hasMathSyntax(text) {
  return /(\$\$[\s\S]+?\$\$|\\\([\s\S]+?\\\)|\\\[[\s\S]+?\\\]|\$[^$\n]+\$)/.test(text);
}

function ensureStylesheetLoaded(href) {
  const existing = document.querySelector(`link[rel="stylesheet"][href="${href}"]`);
  if (existing) return Promise.resolve();

  return new Promise((resolve, reject) => {
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = href;
    link.onload = () => resolve();
    link.onerror = () => reject(new Error(`Failed to load stylesheet: ${href}`));
    document.head.appendChild(link);
  });
}

function ensureScriptLoaded(src) {
  const existing = document.querySelector(`script[src="${src}"]`);
  if (existing) {
    if (existing.dataset.loaded === 'true') return Promise.resolve();
    return new Promise((resolve, reject) => {
      existing.addEventListener('load', () => resolve(), { once: true });
      existing.addEventListener('error', () => reject(new Error(`Failed to load script: ${src}`)), { once: true });
    });
  }

  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = src;
    script.defer = true;
    script.onload = () => {
      script.dataset.loaded = 'true';
      resolve();
    };
    script.onerror = () => reject(new Error(`Failed to load script: ${src}`));
    document.head.appendChild(script);
  });
}

async function ensureMathEnginesLoaded() {
  if (window.renderMathInElement && window.MathJax?.typesetPromise) return;
  if (mathEngineLoadPromise) {
    await mathEngineLoadPromise;
    return;
  }

  mathEngineLoadPromise = (async () => {
    await ensureStylesheetLoaded(KATEX_CSS_URL);
    await ensureScriptLoaded(KATEX_JS_URL);
    await ensureScriptLoaded(KATEX_AUTORENDER_JS_URL);
    await ensureScriptLoaded(MATHJAX_JS_URL);
    if (window.MathJax?.startup?.promise) {
      await window.MathJax.startup.promise;
    }
  })();

  try {
    await mathEngineLoadPromise;
  } finally {
    mathEngineLoadPromise = null;
  }
}

async function renderMath(d) {
  if (!d || !d.textContent) return;
  const hasMath = hasMathSyntax(d.textContent);
  if (!hasMath) return;

  try {
    await ensureMathEnginesLoaded();
  } catch (error) {
    console.warn('Math engine lazy-load warning:', error);
    return;
  }

  if (window.renderMathInElement) {
    try {
      renderMathInElement(d, {
        delimiters: MATH_RENDER_DELIMITERS,
        throwOnError: false,
        strict: "ignore"
      });
    } catch (error) {
      console.warn('KaTeX render warning:', error);
    }
  }

  // Restore KaTeX failures back to delimited text so MathJax can try
  d.querySelectorAll('.katex-error').forEach(errEl => {
    const raw = errEl.textContent;
    const isDisplay = !!errEl.closest('.katex-display');
    const delim = isDisplay ? '$$' : '$';
    errEl.replaceWith(document.createTextNode(delim + raw + delim));
  });

  if (window.MathJax?.typesetPromise) {
    window.MathJax.typesetClear?.([d]);
    window.MathJax.typesetPromise([d]).catch((error) => {
      console.warn('MathJax render warning:', error);
    });
  }
}

// ===== RETRY/EDIT =====
async function retryLast() {
  if (isGenerating) {
    showStatus("Please wait for current generation to finish.");
    return;
  }

  const session = getCurrentSession();
  if (!session || !Array.isArray(session.messages) || session.messages.length === 0) return;

  let lastBotIndex = -1;
  for (let i = session.messages.length - 1; i >= 0; i--) {
    if (session.messages[i].role === "bot" && typeof session.messages[i].content === "string") {
      lastBotIndex = i;
      break;
    }
  }

  if (lastBotIndex === -1) {
    showStatus("Nothing to retry yet.");
    return;
  }

  session.messages.splice(lastBotIndex, 1);

  let retryPrompt = null;
  for (let i = lastBotIndex - 1; i >= 0; i--) {
    const message = session.messages[i];
    if (message.role === "user" && typeof message.content === "string") {
      retryPrompt = message.content;
      break;
    }
  }

  if (!retryPrompt) {
    showStatus("Could not find a user message to retry.");
    return;
  }

  lastUserPrompt = retryPrompt;
  session.autoTitled = false;
  session.timestamp = Date.now();
  await saveSessions();
  await loadChatMessages();

  await send({
    promptOverride: retryPrompt,
    skipUserRender: true,
    skipUserSave: true
  });
}

async function editMessage(messageIndex, oldContent) {
  if (isGenerating) {
    showStatus("Please wait for current generation to finish.");
    return;
  }

  const edited = await showAppPrompt("Edit your message", String(oldContent || ""), { title: 'Edit Message', okText: 'Update' });
  if (edited === null) return;

  const updatedContent = edited.trim();
  if (!updatedContent) {
    showStatus("Message cannot be empty.");
    return;
  }

  const session = getCurrentSession();
  if (!session || !Array.isArray(session.messages)) return;
  if (!Number.isInteger(messageIndex) || !session.messages[messageIndex] || session.messages[messageIndex].role !== "user") {
    showStatus("Unable to edit this message.");
    return;
  }

  session.messages[messageIndex].content = updatedContent;
  session.messages = session.messages.slice(0, messageIndex + 1);
  session.autoTitled = false;
  session.timestamp = Date.now();
  lastUserPrompt = updatedContent;

  await saveSessions();
  await loadChatMessages();

  await send({
    promptOverride: updatedContent,
    skipUserRender: true,
    skipUserSave: true
  });
}

// ===== CHAT HISTORY =====
function groupByTime(sessions) {
  const now = Date.now();
  const day = 86400000;
  
  const groups = {
    pinned: [],
    today: [],
    yesterday: [],
    week: [],
    older: []
  };
  
  sessions.forEach(s => {
    if (s.pinned) {
      groups.pinned.push(s);
      return;
    }
    const diff = now - s.timestamp;
    if (diff < day) groups.today.push(s);
    else if (diff < day * 2) groups.yesterday.push(s);
    else if (diff < day * 7) groups.week.push(s);
    else groups.older.push(s);
  });
  
  return groups;
}

function renderHistory() {
  const query = searchBox.value.toLowerCase().trim();
  let filtered = Object.values(sessions);
  
  if (query) {
    filtered = filtered.filter(s =>
      s.title.toLowerCase().includes(query) ||
      s.messages.some(m =>
        typeof m.content === "string" &&
        m.content.toLowerCase().includes(query)
      )
    );
  }
  
  const sorted = filtered.sort((a, b) => b.timestamp - a.timestamp);
  const groups = groupByTime(sorted);
  
  historyList.innerHTML = "";
  
  const renderGroup = (title, items) => {
    if (items.length === 0) return;
    
    const groupDiv = document.createElement("div");
    groupDiv.className = "history-group";
    
    const titleDiv = document.createElement("div");
    titleDiv.className = "history-group-title";
    titleDiv.textContent = title;
    groupDiv.appendChild(titleDiv);
    
    items.forEach(s => {
      const div = document.createElement("div");
      div.className = "history-item" + (s.id === currentId ? " active" : "") + (s.pinned ? " pinned" : "");
      
      const title = document.createElement("span");
      title.className = "title";
      title.textContent = s.title;
      title.ondblclick = (e) => {
        e.stopPropagation();
        editChatTitle(s.id, title, div);
      };
      
      const actions = document.createElement("div");
      actions.className = "history-item-actions";
      
      const pin = document.createElement("button");
      pin.className = "pin-chat";
      pin.textContent = s.pinned ? "⭐" : "☆";
      pin.onclick = (e) => {
        e.stopPropagation();
        togglePin(s.id);
      };
      
      const del = document.createElement("button");
      del.className = "delete-chat";
      del.textContent = "✕";
      del.onclick = (e) => {
        e.stopPropagation();
        deleteChatHandler(s.id);
      };
      
      actions.appendChild(pin);
      actions.appendChild(del);
      
      div.appendChild(title);
      div.appendChild(actions);
      div.onclick = () => loadChatHandler(s.id);
      
      groupDiv.appendChild(div);
    });
    
    historyList.appendChild(groupDiv);
  };
  
  renderGroup("📌 PINNED", groups.pinned);
  renderGroup("TODAY", groups.today);
  renderGroup("YESTERDAY", groups.yesterday);
  renderGroup("THIS WEEK", groups.week);
  renderGroup("OLDER", groups.older);
}

async function togglePin(id) {

  await saveSessions();
}

function editChatTitle(id, titleSpan, parentDiv) {
  const session = sessions[id];
  const oldTitle = session.title;
  
  const input = document.createElement("input");
  input.type = "text";
  input.className = "title-input";
  input.value = oldTitle;
  
  input.onclick = (e) => e.stopPropagation();
  
  titleSpan.replaceWith(input);
  input.focus();
  input.select();
  
  const save = async () => {
    const newTitle = input.value.trim();
    if (newTitle && newTitle !== oldTitle) {
      session.title = newTitle;
      if (id === currentId) {
        updateHeaderTitle();
      }
      await saveSessions();
    }
    
    const newSpan = document.createElement("span");
    newSpan.className = "title";
    newSpan.textContent = session.title;
    newSpan.ondblclick = (e) => {
      e.stopPropagation();
      editChatTitle(id, newSpan, parentDiv);
    };
    input.replaceWith(newSpan);
  };
  
  input.onblur = save;
  input.onkeydown = (e) => {
    e.stopPropagation();
    if (e.key === "Enter") {
      e.preventDefault();
      input.blur();
    }
    if (e.key === "Escape") {
      input.value = oldTitle;
      input.blur();
    }
  };
}

async function loadChatMessages() {
  hideChatSearchBar();
  cleanupActiveMediaUrls();
  chat.innerHTML = "";
  const session = getCurrentSession();
  if (!session) return;

  for (let idx = 0; idx < session.messages.length; idx++) {
    const m = session.messages[idx];
    if (typeof m.content === "object" && m.content.mediaId) {
      const blob = await getMedia(m.content.mediaId);
      if (blob) {
        const url = URL.createObjectURL(blob);
        activeMediaObjectUrls.push(url);
        render(m.role, { ...m.content, src: url }, false, idx);
      }
    } else {
      render(m.role, m.content, false, idx);
    }
  }

  scrollToBottom();
}

function cleanupActiveMediaUrls() {
  for (const url of activeMediaObjectUrls) {
    URL.revokeObjectURL(url);

  activeMediaObjectUrls = [];
}

      okText: 'Delete',
      dontAskAgainKey: DELETE_CONFIRM_SKIP_KEY

  deletedChatTombstones.add(String(id));
  persistDeletedChatTombstones();
  
  await deleteChatFromDB(id);
  await deleteChatFromCloud(id);
  delete sessions[id];
  
  if (id === currentId) {
    const remaining = Object.keys(sessions);
    if (remaining.length > 0) {

    } else {
